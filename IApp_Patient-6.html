    const patients = await sbGet("iapp_patients");

      p.patientCode?.toLowerCase() === code.trim().toLowerCase() &&
      p.name?.trim() === name.trim()

function getAvailableDates(clinic) {
  const dates = [];
  const now = new Date();
  for(let i=1; i<=30; i++) {
    const d = new Date(now);
    d.setDate(now.getDate() + i);
    const dayOfWeek = d.getDay(); // 0=أحد
    let available = false;
    if(clinic.days) {
      available = clinic.days.includes(dayOfWeek);
    } else if(clinic.schedule) {
      available = clinic.schedule[dayOfWeek] !== undefined;
    }
    if(available) {
      dates.push({
        date: d.toISOString().slice(0,10),
        dayName: ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"][dayOfWeek],
        dayOfWeek
      });
    }
  }
  return dates;
}

function getSlots(clinic, dayOfWeek) {
  if(clinic.sessions) return clinic.sessions[0].slots;
  if(clinic.schedule) return clinic.schedule[dayOfWeek]?.slots || [];
  return [];
}

  useEffect(()=>{
    (async()=>{
      const [apts, rxs, exs] = await Promise.all([
        sbGet("iapp_appointments"),
        sbGet("iapp_prescriptions"),
        sbGet("iapp_exams")
      ]);
      if(apts) setAppointments((apts).filter(a=>a.patientId===patient.id || a.patient===patient.name));
      if(rxs) setPrescriptions((rxs).filter(r=>r.patientId===patient.id));
      if(exs) setExams((exs).filter(e=>e.patientId===patient.id));
      setLoading(false);
    })();
  },[]);

  const upcomingApts = appointments.filter(a=>a.date>=today).sort((a,b)=>a.date.localeCompare(b.date));
  const pastApts = appointments.filter(a=>a.date<today).sort((a,b)=>b.date.localeCompare(a.date));

  const TABS = patient.isGuest ? [
    {id:"book", label:"احجز موعد", icon:"➕"},
  ] : [
    {id:"home", label:"الرئيسية", icon:"🏠"},
    {id:"book", label:"احجز موعد", icon:"➕"},
    {id:"apts", label:"مواعيدي", icon:"📅"},
    {id:"rx", label:"روشتاتي", icon:"💊"},
    {id:"exams", label:"فحوصاتي", icon:"🔬"},
  ];

  return (
    <div style={{height:"100%",background:C.bg,direction:"rtl",display:"flex",flexDirection:"column"}}>

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,"+C.surface+",#0D1929)",borderBottom:"1px solid "+C.border,padding:"0 16px",display:"flex",alignItems:"center",justifyContent:"space-between",height:60,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,"+C.accent+","+C.teal+")",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:C.bg,fontSize:14}}>
            {patient.isGuest ? "🆕" : patient.name?.charAt(0)}
          </div>
          <div>
            <div style={{color:C.text,fontWeight:700,fontSize:13}}>{patient.isGuest ? "مريض جديد" : patient.name}</div>
            <div style={{color:C.muted,fontSize:10}}>{patient.isGuest ? "احجز موعدك الأول" : patient.patientCode}</div>
          </div>
        </div>
        <button onClick={onLogout} style={{background:"transparent",border:"1px solid "+C.border,borderRadius:8,padding:"6px 12px",color:C.muted,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>خروج</button>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:"auto",padding:"16px"}}>
        {loading && <div style={{color:C.muted,textAlign:"center",padding:40}}>جاري التحميل...</div>}

        {/* Home Tab */}
        {!loading && tab==="home" && (
          <div>
            <div style={{color:C.text,fontWeight:800,fontSize:18,marginBottom:4}}>أهلاً {patient.name?.split(" ")[0]} 👋</div>
            <div style={{color:C.muted,fontSize:12,marginBottom:20}}>عيادة د. عبدالستار صقر</div>

            {/* Stats */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
              {[
                {icon:"📅",label:"مواعيد قادمة",val:upcomingApts.length,color:C.accent},
                {icon:"💊",label:"روشتات",val:prescriptions.length,color:C.teal},
                {icon:"🔬",label:"فحوصات",val:exams.length,color:C.gold},
                {icon:"🗓",label:"زيارات سابقة",val:pastApts.length,color:C.muted},
              ].map((s,i)=>(
                <div key={i} style={{background:C.card,borderRadius:14,padding:"14px",border:"1px solid "+C.border}}>
                  <div style={{fontSize:24,marginBottom:6}}>{s.icon}</div>
                  <div style={{color:s.color,fontSize:22,fontWeight:800}}>{s.val}</div>
                  <div style={{color:C.muted,fontSize:11}}>{s.label}</div>
                </div>
              ))}
            </div>

            {/* Next appointment */}
            {upcomingApts.length > 0 && (
              <div style={{background:"linear-gradient(135deg,"+C.accent+"22,"+C.teal+"11)",border:"1px solid "+C.accent+"44",borderRadius:16,padding:"16px",marginBottom:16}}>
                <div style={{color:C.accent,fontWeight:700,fontSize:13,marginBottom:10}}>📅 موعدك القادم</div>
                <div style={{color:C.text,fontWeight:800,fontSize:16}}>{upcomingApts[0].date}</div>
                <div style={{color:C.muted,fontSize:13,marginTop:4}}>{upcomingApts[0].time} · {upcomingApts[0].type}</div>
                <div style={{color:C.muted,fontSize:12,marginTop:2}}>{upcomingApts[0].doctor} · غرفة {upcomingApts[0].room}</div>
                {upcomingApts[0].confirmed && <div style={{color:C.success,fontSize:11,marginTop:8}}>✓ مؤكد</div>}
              </div>
            )}

            {/* معلومات التواصل */}
            <div style={{background:C.card,borderRadius:14,padding:"14px",border:"1px solid "+C.border}}>
              <div style={{color:C.text,fontWeight:700,fontSize:13,marginBottom:10}}>📞 تواصل معنا</div>
              <div style={{color:C.muted,fontSize:12,marginBottom:6}}>📍 دمنهور - برج المنتزه</div>
              <div style={{color:C.muted,fontSize:12,marginBottom:6}}>📍 الرحمانية - ش أحمد محمود</div>
              <div style={{color:C.accent,fontSize:12,marginBottom:4}}>☎️ دمنهور: 0453333313</div>
              <div style={{color:C.accent,fontSize:12}}>☎️ الرحمانية: 01111480137</div>
            </div>
          </div>
        )}

        {/* Booking Tab */}
        {!loading && tab==="book" && (
          <div>
            <div style={{color:C.text,fontWeight:700,fontSize:16,marginBottom:4}}>➕ احجز موعد</div>
            <div style={{color:C.muted,fontSize:12,marginBottom:16}}>اختر المكان والوقت المناسب</div>

            {bookDone ? (
              <div style={{background:C.success+"22",border:"1px solid "+C.success,borderRadius:16,padding:"30px 20px",textAlign:"center"}}>
                <div style={{fontSize:48,marginBottom:12}}>✅</div>
                <div style={{color:C.success,fontWeight:800,fontSize:18,marginBottom:8}}>تم إرسال طلب الحجز!</div>
                <div style={{color:C.muted,fontSize:13,marginBottom:4}}>المكان: {bookForm.clinic}</div>
                <div style={{color:C.muted,fontSize:13,marginBottom:4}}>التاريخ: {bookForm.date}</div>
                <div style={{color:C.muted,fontSize:13,marginBottom:20}}>الوقت: {bookForm.time}</div>
                <div style={{color:C.muted,fontSize:11,marginBottom:20}}>سيتم التواصل معك لتأكيد الموعد</div>
                <button onClick={()=>{setBookDone(false);setBookForm({clinic:"",date:"",time:"",type:"فحص روتيني",notes:"",isNew:false,newName:"",newPhone:""});}}
                  style={{background:"linear-gradient(135deg,"+C.accent+","+C.teal+")",border:"none",borderRadius:10,padding:"10px 24px",color:C.bg,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
                  حجز موعد آخر
                </button>
              </div>
            ) : (
              <BookingForm
                patient={patient}
                bookForm={bookForm}
                setBookForm={setBookForm}
                booking={booking}
                onBook={async()=>{
                  if(!bookForm.clinic){alert("اختر المكان");return;}
                  if(!bookForm.date){alert("اختر التاريخ");return;}
                  if(!bookForm.time){alert("اختر الوقت");return;}
                  if(bookForm.isNew && !bookForm.newName?.trim()){alert("اكتب اسمك");return;}
                  if(bookForm.isNew && !bookForm.newPhone?.trim()){alert("اكتب رقم هاتفك");return;}
                  setBooking(true);
                  const allApts = await sbGet("iapp_appointments") || [];
                  const newApt = {
                    id: Date.now(),
                    patientId: bookForm.isNew ? null : patient.id,
                    patient: bookForm.isNew ? bookForm.newName : patient.name,
                    phone: bookForm.isNew ? bookForm.newPhone : patient.phone,
                    date: bookForm.date,
                    time: bookForm.time,
                    type: bookForm.type,
                    notes: (bookForm.notes||"") + (bookForm.clinic?" | مكان: "+bookForm.clinic:""),
                    doctor: "د. عبدالستار",
                    room: "1",
                    clinic: bookForm.clinic,
                    confirmed: false,
                    fromPatient: true
                  };
                  await sbSet("iapp_appointments", [...allApts, newApt]);
                  if(!bookForm.isNew) setAppointments(prev=>[...prev,newApt]);
                  setBooking(false);
                  setBookDone(true);
                }}
              />
            )}
          </div>
        )}

        {/* Appointments Tab */}
        {!loading && tab==="apts" && (
          <div>
            <div style={{color:C.text,fontWeight:700,fontSize:16,marginBottom:16}}>📅 مواعيدي</div>
            {upcomingApts.length > 0 && (
              <>
                <div style={{color:C.accent,fontSize:12,fontWeight:700,marginBottom:10}}>القادمة</div>
                {upcomingApts.map(a=>(
                  <div key={a.id} style={{background:C.card,border:"1px solid "+(a.confirmed?C.success:C.border),borderRadius:14,padding:"14px",marginBottom:10,borderRight:"4px solid "+(a.confirmed?C.success:C.accent)}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div>
                        <div style={{color:C.text,fontWeight:700,fontSize:15}}>{a.date}</div>
                        <div style={{color:C.muted,fontSize:12,marginTop:4}}>{a.type}</div>
                        <div style={{color:C.muted,fontSize:12}}>{a.doctor} · غرفة {a.room}</div>
                      </div>
                      <div style={{background:C.accent+"22",borderRadius:10,padding:"8px 12px",textAlign:"center"}}>
                        <div style={{color:C.accent,fontSize:16,fontWeight:800}}>{a.time}</div>
                      </div>
                    </div>
                    {a.confirmed && <div style={{color:C.success,fontSize:11,marginTop:8}}>✓ مؤكد من العيادة</div>}
                    {a.notes && <div style={{color:C.muted,fontSize:11,marginTop:6}}>📝 {a.notes}</div>}
                  </div>
                ))}
              </>
            )}
            {pastApts.length > 0 && (
              <>
                <div style={{color:C.muted,fontSize:12,fontWeight:700,marginTop:16,marginBottom:10}}>السابقة</div>
                {pastApts.map(a=>(
                  <div key={a.id} style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:"12px 14px",marginBottom:8,opacity:0.7}}>
                    <div style={{color:C.text,fontSize:13}}>{a.date} · {a.time}</div>
                    <div style={{color:C.muted,fontSize:12}}>{a.type} · {a.doctor}</div>
                  </div>
                ))}
              </>
            )}
            {appointments.length === 0 && <div style={{color:C.muted,textAlign:"center",padding:40}}>لا توجد مواعيد</div>}
          </div>
        )}

        {/* Prescriptions Tab */}
        {!loading && tab==="rx" && (
          <div>
            <div style={{color:C.text,fontWeight:700,fontSize:16,marginBottom:16}}>💊 روشتاتي</div>
            {prescriptions.length === 0 && <div style={{color:C.muted,textAlign:"center",padding:40}}>لا توجد روشتات</div>}
            {prescriptions.map(rx=>(
              <div key={rx.id} style={{background:C.card,border:"1px solid "+C.border,borderRadius:16,padding:"16px",marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <div style={{color:C.accent,fontWeight:700,fontSize:14}}>{rx.date}</div>
                  <div style={{color:C.muted,fontSize:11,background:C.bg,padding:"4px 10px",borderRadius:8}}>{rx.eye}</div>
                </div>

                {/* جدول النظارة */}
                <div style={{background:C.bg,borderRadius:10,padding:"10px",marginBottom:12,border:"1px solid "+C.border}}>
                  <div style={{color:C.text,fontSize:11,fontWeight:700,marginBottom:8}}>كشف النظارة</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,fontSize:10,textAlign:"center"}}>
                    <div style={{color:C.muted}}>العين</div>
                    <div style={{color:C.muted}}>SPH</div>
                    <div style={{color:C.muted}}>CYL</div>
                    <div style={{color:C.muted}}>AX</div>
                    <div style={{color:C.text,fontWeight:700}}>يمنى</div>
                    <div style={{color:C.text}}>{rx.sphR||"-"}</div>
                    <div style={{color:C.text}}>{rx.cylR||"-"}</div>
                    <div style={{color:C.text}}>{rx.axisR||"-"}</div>
                    <div style={{color:C.text,fontWeight:700}}>يسرى</div>
                    <div style={{color:C.text}}>{rx.sphL||"-"}</div>
                    <div style={{color:C.text}}>{rx.cylL||"-"}</div>
                    <div style={{color:C.text}}>{rx.axisL||"-"}</div>
                  </div>
                  {rx.add && <div style={{color:C.gold,fontSize:11,marginTop:8}}>ADD: {rx.add}</div>}
                </div>

                {rx.medicines && (
                  <div style={{background:C.teal+"11",borderRadius:10,padding:"10px",border:"1px solid "+C.teal+"33"}}>
                    <div style={{color:C.teal,fontSize:11,fontWeight:700,marginBottom:6}}>💊 الأدوية</div>
                    {rx.medicines.split("\n").filter(Boolean).map((m,i)=>(
                      <div key={i} style={{color:C.text,fontSize:12,marginBottom:4}}>• {m}</div>
                    ))}
                  </div>
                )}
                {rx.notes && <div style={{color:C.muted,fontSize:11,marginTop:10}}>📝 {rx.notes}</div>}
              </div>
            ))}
          </div>
        )}

        {/* Exams Tab */}
        {!loading && tab==="exams" && (
          <div>
            <div style={{color:C.text,fontWeight:700,fontSize:16,marginBottom:16}}>🔬 نتائج فحوصاتي</div>
            {exams.length === 0 && <div style={{color:C.muted,textAlign:"center",padding:40}}>لا توجد فحوصات</div>}
            {exams.map(ex=>(
              <div key={ex.id} style={{background:C.card,border:"1px solid "+C.border,borderRadius:16,padding:"16px",marginBottom:14}}>
                <div style={{color:C.accent,fontWeight:700,fontSize:14,marginBottom:12}}>{ex.date} · {ex.doctor}</div>
                {ex.chiefComplaint && (
                  <div style={{marginBottom:10}}>
                    <div style={{color:C.muted,fontSize:11,marginBottom:4}}>الشكوى</div>
                    <div style={{color:C.text,fontSize:13}}>{ex.chiefComplaint}</div>
                  </div>
                )}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                  {[["حدة الإبصار يمنى",ex.visualAcuityR],["حدة الإبصار يسرى",ex.visualAcuityL],["ضغط العين يمنى",ex.iopR+" mm"],["ضغط العين يسرى",ex.iopL+" mm"]].map(([l,v])=>v&&(
                    <div key={l} style={{background:C.bg,borderRadius:8,padding:"8px"}}>
                      <div style={{color:C.muted,fontSize:10}}>{l}</div>
                      <div style={{color:C.text,fontWeight:700,fontSize:13}}>{v}</div>
                    </div>
                  ))}
                </div>
                {ex.diagnosis && (
                  <div style={{background:C.accent+"11",borderRadius:10,padding:"10px",border:"1px solid "+C.accent+"33"}}>
                    <div style={{color:C.accent,fontSize:11,fontWeight:700,marginBottom:4}}>التشخيص</div>
                    <div style={{color:C.text,fontSize:13}}>{ex.diagnosis}</div>
                  </div>
                )}
                {ex.treatmentPlan && (
                  <div style={{marginTop:10}}>
                    <div style={{color:C.muted,fontSize:11,marginBottom:4}}>خطة العلاج</div>
                    <div style={{color:C.text,fontSize:12}}>{ex.treatmentPlan}</div>
                  </div>
                )}
                {ex.followUp && <div style={{color:C.gold,fontSize:11,marginTop:8}}>📅 موعد المتابعة: {ex.followUp}</div>}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Bottom Nav */}
      <div style={{background:C.surface,borderTop:"1px solid "+C.border,display:"flex",justifyContent:"space-around",padding:"8px 0 20px",flexShrink:0}}>
        {TABS.map(t=>(
          <div key={t.id} onClick={()=>setTab(t.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer",padding:"4px 12px",borderRadius:10,background:tab===t.id?C.accent+"22":"transparent"}}>
            <div style={{fontSize:20}}>{t.icon}</div>
            <div style={{color:tab===t.id?C.accent:C.muted,fontSize:9,fontWeight:tab===t.id?700:400}}>{t.label}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [patient, setPatient] = useState(()=>{
    try { const p = sessionStorage.getItem("iapp_patient"); return p ? JSON.parse(p) : null; } catch { return null; }
  });

  const login = p => { sessionStorage.setItem("iapp_patient", JSON.stringify(p)); setPatient(p); };
  const logout = () => { sessionStorage.removeItem("iapp_patient"); setPatient(null); };

  if(!patient) return <Login onLogin={login}/>;
  return <PatientApp patient={patient} onLogout={logout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
