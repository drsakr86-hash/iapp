    const val = data.value;
    if (val === null || val === undefined) return null;
    if (typeof val === "string" || typeof val === "number" || typeof val === "boolean") return val;
    if (Array.isArray(val) || (typeof val === "object")) {
      try { return JSON.parse(JSON.stringify(val)); } catch{ return val; }
    }
    return val;
  } catch(e) { console.warn("sbGet exception:", e.message||e); return undefined; }
}

async function sbSet(key, value) {
  try {
    const sb = getSB();
    if (!sb) return false;
    const { error } = await sb
      .from("iapp_store")
      .upsert({ key, value }, { onConflict: "key" });
    if (error) { console.warn("sbSet error:", error.message); return false; }
    return true;
  } catch(e) { console.warn("sbSet exception:", e); return false; }
}

function useDB(key, seed) {
  const [data, setData] = useState(() => {
    try {
      const local = localStorage.getItem(key);
      if (local) return JSON.parse(local);
    } catch {}
    return seed;
  });
  const [ready, setReady] = useState(false);

  useEffect(() => {
    setReady(true);
    (async () => {
      const remote = await sbGet(key);
      if (remote === undefined) {
        console.log(`[${key}] offline — using localStorage`);
      } else if (remote === null) {
        const local = localStorage.getItem(key);
        const toUpload = local ? JSON.parse(local) : seed;
        await sbSet(key, toUpload);
        console.log(`[${key}] first sync ✓`);
      } else {
        setData(remote);
        try { localStorage.setItem(key, JSON.stringify(remote)); } catch {}
        console.log(`[${key}] loaded from Supabase ✓`);
      }
    })();
  }, [key]);

  const persist = useCallback(async val => {
    setData(val);
    try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
    await sbSet(key, val);
  }, [key]);

  return [data, persist, ready];
}

// ── Patient Code Generator ────────────────────────────────────
function genCode(patients) {
  const nums = patients.map(p => parseInt((p.patientCode||"P-0000").replace("P-",""))||0);
  const next = Math.max(0, ...nums) + 1;
  return "P-" + String(next).padStart(4, "0");
}

// ── PIN Lock ──────────────────────────────────────────────────
function getPin() { try { return localStorage.getItem("iapp_pin")||"1234"; } catch { return "1234"; } }
function savePin(p) { try { localStorage.setItem("iapp_pin", p); } catch {} }
function PinLock({onUnlock}) {
  const [pin,setPin]=useState("");
  const [error,setError]=useState(false);
  const press = d => {
    if(pin.length>=4) return;
    const next = pin+d;
    setPin(next);
    if(next.length===4){
      if(next===getPin()){ onUnlock(); }
      else { setError(true); setTimeout(()=>{setPin("");setError(false);},600); }
    }
  };
  const del = () => setPin(p=>p.slice(0,-1));
  return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",direction:"rtl",fontFamily:"'Segoe UI','Tahoma',Arial,sans-serif"}}>

        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,maxWidth:240,direction:"ltr"}}>
        {[1,2,3,4,5,6,7,8,9,"⌫",0,""].map((d,i)=>(

  );
}

  const aRes = trimmed ? appointments.filter(a=>(a.patient||"").includes(trimmed)).slice(0,3) : [];

function VisitForm({initial,patientId,onSave,onClose,doctorNames=["د. عبدالستار","د. سلمى","د. ليلى"],prices=[]}) {
  const blank={date:new Date().toISOString().slice(0,10),type:"فحص روتيني",doctor:"د. عبدالستار",complaint:"",result:"",cost:"350",paid:false,nextVisit:"",notes:""};
  const [f,setF]=useState(initial?{...initial}:blank);
  const [customComplaint,setCustomComplaint]=useState("");
  const s=k=>e=>setF(v=>({...v,[k]:e.target.value}));
  const TYPES=["فحص روتيني","متابعة","فحص شبكية","قياس نظر","استشارة","عملية","طوارئ"];
  const COMPLAINTS=["ضعف النظر","التهاب العين","تغيير النظارة","صعوبة في القراءة","صداع","ألم في العين","عين حمراء","إفرازات من العين","رؤية مزدوجة","وميض أو بقع سوداء","أخرى..."];

  const handleTypeChange = e => {
    const type = e.target.value;
    const matched = prices.find(p => (p.name||"") === type || type.includes(p.name||"") || (p.name||"").includes(type));
    setF(v => ({...v, type, cost: matched ? matched.price : v.cost}));
  };

  const handleComplaintSelect = e => {
    const val = e.target.value;
    if(val==="أخرى...") { setCustomComplaint(""); setF(v=>({...v,complaint:""})); }
    else { setF(v=>({...v,complaint:val})); setCustomComplaint(""); }
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Field label="تاريخ الزيارة"><input style={inp()} type="date" value={f.date} onChange={s("date")}/></Field>
        <Field label="الطبيب"><select style={inp()} value={f.doctor} onChange={s("doctor")}>{doctorNames.map(d=><option key={d}>{d}</option>)}</select></Field>
      </div>
      <Field label="نوع الزيارة">
        <select style={inp()} value={f.type} onChange={handleTypeChange}>
          {(prices.length>0 ? prices.map(p=>p.name) : TYPES).map(t=><option key={t}>{t}</option>)}
        </select>
        {prices.length>0&&prices.find(p=>p.name===f.type)&&(
          <div style={{color:C.gold,fontSize:11,marginTop:4}}>💰 السعر المرجعي: {Number((prices.find(p=>p.name===f.type)||{}).price||0).toLocaleString()} ج.م</div>
        )}
      </Field>
      <Field label="الشكوى">
        <select style={inp()} value={COMPLAINTS.includes(f.complaint)?f.complaint:"أخرى..."} onChange={handleComplaintSelect}>
          <option value="">— اختر الشكوى —</option>
          {COMPLAINTS.map(c=><option key={c}>{c}</option>)}
        </select>
        {(f.complaint==="أخرى..."||(!COMPLAINTS.includes(f.complaint)&&f.complaint!=="")||(!COMPLAINTS.slice(0,-1).includes(f.complaint)))&&(
          <input style={{...inp(),marginTop:6}} value={f.complaint==="أخرى..."?"":f.complaint} onChange={e=>setF(v=>({...v,complaint:e.target.value}))} placeholder="اكتب الشكوى..."/>
        )}
        {f.complaint&&f.complaint!=="— اختر الشكوى —"&&COMPLAINTS.slice(0,-1).includes(f.complaint)&&(
          <div style={{background:C.accent+"22",border:`1px solid ${C.accent}33`,borderRadius:8,padding:"6px 10px",marginTop:6,color:C.accent,fontSize:12}}>✓ {f.complaint}</div>
        )}
      </Field>
      <Field label="نتيجة الزيارة / التشخيص"><textarea style={{...inp(),resize:"none"}} rows={2} value={f.result} onChange={s("result")} placeholder="نتيجة الكشف..."/></Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Field label="التكلفة (ج.م)"><input style={inp({textAlign:"center"})} type="number" value={f.cost} onChange={s("cost")} placeholder="350"/></Field>
        <Field label="موعد المتابعة"><input style={inp()} type="date" value={f.nextVisit} onChange={s("nextVisit")}/></Field>
      </div>
      <div onClick={()=>setF(v=>({...v,paid:!v.paid}))} style={{display:"flex",alignItems:"center",gap:10,background:C.card,border:`1px solid ${f.paid?C.success:C.border}`,borderRadius:10,padding:"10px 14px",cursor:"pointer"}}>
        <div style={{width:20,height:20,borderRadius:6,background:f.paid?C.success:C.bg,border:`2px solid ${f.paid?C.success:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:C.bg,fontWeight:700}}>{f.paid?"✓":""}</div>
        <span style={{color:f.paid?C.success:C.muted,fontSize:13,fontWeight:600}}>تم الدفع</span>
      </div>
      <Field label="ملاحظات"><textarea style={{...inp(),resize:"none"}} rows={2} value={f.notes} onChange={s("notes")} placeholder="ملاحظات إضافية..."/></Field>
      <div style={{display:"flex",gap:10,marginTop:8}}><Btn outline full onClick={onClose}>إلغاء</Btn><Btn full onClick={()=>onSave({...f,patientId,id:f.id||Date.now(),cost:f.cost})}>حفظ الزيارة</Btn></div>
    </div>
  );
}

function PatientFile({patient,allExams,allRx,allVisits,onClose,onUpdatePatient,onSaveExam,onDelExam,onSaveVisit,onDelVisit,onSaveRx,doctorNames=[],primaryDoctor,prices=[],clinic}) {
  const [tab,setTab]=useState("info");
  const [modal,setModal]=useState(null);
  const [delTarget,setDelTarget]=useState(null);
  const exams=allExams.filter(e=>e.patientId===patient.id);
  const rxList=allRx.filter(r=>r.patientId===patient.id);
  const visits=allVisits.filter(v=>v.patientId===patient.id).sort((a,b)=>b.date.localeCompare(a.date));
  const totalSpent=visits.reduce((s,v)=>s+(v.paid?Number(v.cost||0):0),0);
  const TABS=[{id:"info",label:"الملف",icon:"👤"},{id:"visits",label:"الزيارات",icon:"🗓"},{id:"exams",label:"الفحوصات",icon:"🔍"},{id:"treatment",label:"العلاج",icon:"💊"},{id:"rx",label:"الوصفات",icon:"🔬"},{id:"images",label:"إشعاعات",icon:"oct"}];
  const [curPatient,setCurPatient]=useState(patient);
  const [viewImg,setViewImg]=useState(null);

  // ── Images via Cloudinary ────────────────────────────────────
  const CLD_CLOUD   = "daihhusnc";
  const CLD_PRESET  = "iapp_clinic";
  const CLD_API_KEY = "867911722563378";
  const metaKey     = "iapp_imgmeta_" + patient.id;

  const [images, setImages]           = useState([]);
  const [imgLoading, setImgLoading]   = useState(false);
  const [uploadProgress, setUploadProgress] = useState(null);
  const [imgError, setImgError]       = useState(null);
  const [aiAnalysis, setAiAnalysis]   = useState({}); // {imgId: {loading, result, error}}

  // AI Analysis function using Claude API
  const analyzeImage = async (img) => {
    if(!img.src) return;
    setAiAnalysis(prev => ({...prev, [img.id]: {loading:true, result:null, error:null}}));
    try {
      // Convert image URL to base64
      const res = await fetch(img.src);
      const blob = await res.blob();
      const base64 = await new Promise(resolve => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result.split(",")[1]);
        reader.readAsDataURL(blob);
      });
      const mtype = blob.type || "image/jpeg";

      const apiRes = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          system:"أنت مساعد طبي متخصص في طب وجراحة العيون. حلّل الصورة الطبية المرفوعة وقدّم تقريراً موجزاً باللغة العربية يتضمن: 1) نوع الصورة (قاع عين، OCT، أشعة، إلخ) 2) الملاحظات الرئيسية 3) أي علامات تستدعي الانتباه. الرد يجب أن يكون موجزاً ومنظماً. تنبيه: هذا التحليل للمساعدة فقط وليس تشخيصاً نهائياً.",
          messages:[{
            role:"user",
            content:[
              {type:"image", source:{type:"base64", media_type:mtype, data:base64}},
              {type:"text", text:"حلّل هذه الصورة الطبية للعين وأعطني تقريراً موجزاً."}
            ]
          }]
        })
      });
      const data = await apiRes.json();
      const result = data.content?.[0]?.text || "لم يتم الحصول على نتيجة";
      setAiAnalysis(prev => ({...prev, [img.id]: {loading:false, result, error:null}}));
    } catch(e) {
      setAiAnalysis(prev => ({...prev, [img.id]: {loading:false, result:null, error:"فشل التحليل: "+e.message}}));
    }
  };

  // Save metadata list to Supabase + localStorage cache
  const persistMeta = async (imgs) => {
    const meta = imgs.map(i => ({id:i.id, public_id:i.public_id, name:i.name, date:i.date, src:i.src, notes:i.notes||""}));
    try { localStorage.setItem(metaKey, JSON.stringify(meta)); } catch{}
    await sbSet(metaKey, meta);
  };

  // Load image list on mount from Supabase metadata
  useEffect(() => {
    (async () => {
      setImgLoading(true);
      // 1. Show local cache immediately
      try {
        const cached = localStorage.getItem(metaKey);
        if (cached) setImages(JSON.parse(cached));
      } catch{}
      // 2. Fetch fresh from Supabase
      try {
        const remote = await sbGet(metaKey);
        if (remote && Array.isArray(remote)) {
          setImages(remote);
          try { localStorage.setItem(metaKey, JSON.stringify(remote)); } catch{}
        }
      } catch(e) { console.warn("img meta load:", e); }
      setImgLoading(false);
    })();
  }, [patient.id]);

  const uploadOneFile = function(file) {
    setUploadProgress({ name: file.name, pct: 10 });
    var folder = "iapp/patient_" + patient.id;
    var formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", CLD_PRESET);
    formData.append("folder", folder);
    formData.append("api_key", CLD_API_KEY);
    return fetch(
      "https://api.cloudinary.com/v1_1/" + CLD_CLOUD + "/image/upload",
      { method: "POST", body: formData }
    ).then(function(res) {
      setUploadProgress({ name: file.name, pct: 80 });
      return res.json().then(function(data) {
        if (!res.ok) {
          setImgError("فشل الرفع: " + ((data&&data.error&&data.error.message)||res.status));
          return;
        }
        var newImg = {
          id: data.public_id, public_id: data.public_id,
          name: file.name, date: new Date().toISOString().slice(0,10),
          src: data.secure_url, notes: ""
        };
        setUploadProgress({ name: file.name, pct: 100 });
        setImages(function(prev) {
          var updated = [newImg].concat(prev);
          persistMeta(updated);
          return updated;
        });
      });
    }).catch(function(err) { setImgError("خطأ في الرفع: " + err.message); });
  };

  const handleImgUpload = function(e) {
    var files = Array.from(e.target.files).filter(function(f){ return f.type.startsWith("image/"); });
    e.target.value = "";
    if (!files.length) return;
    setImgError(null);
    // Upload sequentially using promise chain
    var chain = Promise.resolve();
    files.forEach(function(file) {
      chain = chain.then(function() { return uploadOneFile(file); });
    });
    chain.then(function() { setUploadProgress(null); });
  };

  const delImage = async id => {
    // Remove from local list & metadata
    setImages(prev => {
      const updated = prev.filter(i => i.id !== id);
      persistMeta(updated);
      return updated;
    });
    // Delete from Cloudinary via API (requires signed request — skipped client-side for security)
    // The image will remain on Cloudinary but won't appear in the app
  };

  const updateImgNotes = (id, notes) => {
    setImages(prev => {
      const updated = prev.map(i => i.id===id ? {...i, notes} : i);
      persistMeta(updated);
      return updated;
    });
  };

  const handlePatientSave=updated=>{
    onUpdatePatient(updated);
    setCurPatient(updated);
    setModal(null);
  };

        <div style={{width:56,height:56,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent},${C.teal})`,display:"flex",alignItems:"center",justifyContent:"center",color:C.bg,fontWeight:800,fontSize:22}}>{(curPatient.name||"?")[0]}</div>
        <div style={{flex:1}}>
          <div style={{color:C.text,fontWeight:700,fontSize:16}}>{curPatient.name}</div>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
            <span style={{background:C.accent+"33",color:C.accent,borderRadius:8,padding:"2px 10px",fontSize:12,fontWeight:800,letterSpacing:1}}>{curPatient.patientCode||"—"}</span>
          </div>
          <div style={{color:C.muted,fontSize:12}}>{curPatient.age} سنة · {curPatient.gender} · {curPatient.phone}</div>
          <div style={{display:"flex",gap:6,marginTop:4,alignItems:"center"}}>

          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",margin:"0 16px 14px",background:C.card,borderRadius:12,padding:4,overflowX:"auto"}}>
        {TABS.map(t=><div key={t.id} onClick={()=>setTab(t.id)} style={{flex:"0 0 auto",textAlign:"center",padding:"8px 10px",background:tab===t.id?`linear-gradient(135deg,${C.accent},${C.teal})`:"transparent",borderRadius:9,cursor:"pointer",color:tab===t.id?C.bg:C.muted,fontSize:10,fontWeight:700,minWidth:54}}>

                    <div style={{marginTop:10,background:`linear-gradient(135deg,${C.purple}15,${C.accent}10)`,border:`1px solid ${C.purple}44`,borderRadius:12,padding:12}}>

                        <span style={{marginRight:"auto",background:C.purple+"22",color:C.purple,borderRadius:6,padding:"1px 7px",fontSize:9,fontWeight:700}}>للمساعدة فقط</span>

                      <div style={{color:C.text,fontSize:12,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{aiAnalysis[img.id].result}</div>

                    </div>

                    <div style={{marginTop:8,background:C.danger+"11",border:`1px solid ${C.danger}33`,borderRadius:10,padding:"8px 12px",color:C.danger,fontSize:11}}>{aiAnalysis[img.id].error}</div>

          {images.length>0&&(

              <span style={{color:C.accent,fontSize:11,fontWeight:700}}>{images.length} صورة</span>

      {(modal&&modal.editRx)&&<Modal title="تعديل الوصفة" onClose={()=>setModal(null)}><RxForm patients={[curPatient]} doctorNames={doctorNames} initial={modal.editRx} onSave={rx=>{const updated=(allRx||[]).map(r=>r.id===rx.id?{...rx,patientId:curPatient.id,patient:curPatient.name}:r);if(onSaveRx)onSaveRx(updated);setModal(null);}} onClose={()=>setModal(null)}/></Modal>}
      {modal==="addVisit"&&<Modal title="زيارة جديدة" onClose={()=>setModal(null)}><VisitForm doctorNames={doctorNames} prices={prices} patientId={curPatient.id} onSave={v=>{onSaveVisit(v);setModal(null);}} onClose={()=>setModal(null)}/></Modal>}
      {(modal&&modal.editVisit)&&<Modal title="تعديل الزيارة" onClose={()=>setModal(null)}><VisitForm doctorNames={doctorNames} prices={prices} initial={modal.editVisit} patientId={curPatient.id} onSave={v=>{onSaveVisit(v);setModal(null);}} onClose={()=>setModal(null)}/></Modal>}
      {modal==="addExam"&&<Modal title="فحص جديد" onClose={()=>setModal(null)}><ExamForm doctorNames={doctorNames} patientId={curPatient.id} onSave={e=>{onSaveExam(e);setModal(null);}} onClose={()=>setModal(null)}/></Modal>}
      {(modal&&modal.editExam)&&<Modal title="تعديل الفحص" onClose={()=>setModal(null)}><ExamForm doctorNames={doctorNames} initial={modal.editExam} patientId={curPatient.id} onSave={e=>{onSaveExam(e);setModal(null);}} onClose={()=>setModal(null)}/></Modal>}
      {(modal&&modal.printRx)&&<PrintModal rx={modal.printRx} patient={curPatient} primaryDoctor={primaryDoctor} clinic={{}} onClose={()=>setModal(null)}/>}
      {delTarget&&<Confirm msg={`هل تريد حذف هذا ${delTarget.type==="visit"?"السجل":"الفحص"} نهائياً؟`} onOk={()=>{delTarget.type==="visit"?onDelVisit(delTarget.id):onDelExam(delTarget.id);setDelTarget(null);}} onNo={()=>setDelTarget(null)}/>}
    </div>
  );
}

// ── Patients Screen ───────────────────────────────────────────
function Patients({patients,setPatients,exams,setExams,prescriptions,setRx,visits,setVisits,doctorNames=[],primaryDoctor,prices=[],clinic,initOpenId,initNewName,onInitDone}) {
  const [search,setSearch]=useState(initNewName||"");
  const [modal,setModal]=useState(null);
  const [openFile,setOpenFile]=useState(null);

  // الأحدث أولاً (بالـ id اللي هو timestamp)
  const sorted=[...patients].sort((a,b)=>(b.id||0)-(a.id||0));
  const filtered=sorted.filter(p=>(p.name||"").includes(search)||(p.condition||"").includes(search)||(p.patientCode||"").includes(search));
  const isNewToday = p => p.id && (Date.now()-p.id)<86400000;

  // Handle navigation from Dashboard
  useEffect(()=>{
    if(initOpenId){setOpenFile(initOpenId);if(onInitDone)onInitDone();}
    else if(initNewName){
      // البحث التلقائي بالاسم القادم من المواعيد
      setSearch(initNewName);
      if(onInitDone)onInitDone();
    }
  },[]);

  const updP=f=>setPatients(patients.map(p=>p.id===f.id?f:p));
  const addP=f=>{
    const newP={...f,id:Date.now(),patientCode:genCode(patients)};
    setPatients([newP,...patients]); // يضاف في الأول مباشرة
  };
  const delP=id=>setPatients(patients.filter(p=>p.id!==id));
  const saveExam=f=>{const ex=exams.find(e=>e.id===f.id);setExams(ex?exams.map(e=>e.id===f.id?f:e):[...exams,f]);};
  const delExam=id=>setExams(exams.filter(e=>e.id!==id));
  const saveVisit=f=>{const ex=visits.find(v=>v.id===f.id);setVisits(ex?visits.map(v=>v.id===f.id?f:v):[...visits,f]);};
  const delVisit=id=>setVisits(visits.filter(v=>v.id!==id));

  if(openFile){
    const p=patients.find(p=>p.id===openFile);
    if(!p){setOpenFile(null);return null;}
    return <PatientFile patient={p} allExams={exams} allRx={prescriptions} allVisits={visits} onClose={()=>setOpenFile(null)} onUpdatePatient={f=>{updP(f);}} onSaveExam={saveExam} onDelExam={delExam} onSaveVisit={saveVisit} onDelVisit={delVisit} onSaveRx={updated=>{if(setRx)setRx(updated);}} doctorNames={doctorNames} primaryDoctor={primaryDoctor} prices={prices} clinic={clinic}/>;
  }

  return (
    <div style={{padding:"16px 16px 90px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <span style={{color:C.text,fontWeight:700,fontSize:16}}>المرضى ({patients.length})</span>
        <Btn small onClick={()=>setModal("add")}>+ مريض جديد</Btn>
      </div>
      <div style={{background:C.card,border:`1px solid ${search?C.accent:C.border}`,borderRadius:12,padding:"10px 14px",marginBottom:16,display:"flex",alignItems:"center",gap:8,transition:"border 0.2s"}}>
        <span style={{color:C.accent}}>🔍</span>
        <input autoFocus={!!initNewName} value={search} onChange={e=>setSearch(e.target.value)} placeholder="ابحث بالاسم أو التشخيص أو رقم الملف..." style={{background:"none",border:"none",outline:"none",color:C.text,fontSize:13,flex:1,direction:"rtl",fontFamily:"inherit"}}/>
        {search&&<span onClick={()=>setSearch("")} style={{color:C.muted,cursor:"pointer",fontSize:18,lineHeight:1}}>×</span>}
      </div>
      {search&&filtered.length===0&&(
        <div style={{background:C.gold+"11",border:`1px solid ${C.gold}33`,borderRadius:14,padding:"14px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:20}}>👤</span>
          <div style={{flex:1}}>
            <div style={{color:C.gold,fontWeight:700,fontSize:13}}>"{search}" غير موجود في قاعدة البيانات</div>
            <div style={{color:C.muted,fontSize:11,marginTop:2}}>هل تريد إضافته كمريض جديد؟</div>
          </div>
          <Btn small color={C.gold} onClick={()=>setModal({addNew:search})}>+ إضافة</Btn>
        </div>
      )}
      {filtered.map(p=>(
        <div key={p.id} style={{background:C.card,border:`1px solid ${isNewToday(p)?C.teal+"66":C.border}`,borderRadius:16,padding:14,marginBottom:10,position:"relative"}}>
          {isNewToday(p)&&<span style={{position:"absolute",top:10,left:10,background:C.teal,color:C.bg,borderRadius:6,padding:"1px 7px",fontSize:9,fontWeight:800}}>جديد</span>}
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
            <div style={{width:44,height:44,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent}33,${C.teal}33)`,border:`2px solid ${isNewToday(p)?C.teal:C.accent}44`,display:"flex",alignItems:"center",justifyContent:"center",color:C.accent,fontWeight:800,fontSize:16}}>{(p.name||"?")[0]}</div>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{color:C.text,fontWeight:700,fontSize:14}}>{p.name}</div>
                <span style={{background:C.accent+"22",color:C.accent,borderRadius:6,padding:"1px 7px",fontSize:10,fontWeight:700,letterSpacing:1}}>{p.patientCode||"—"}</span>
              </div>
              <div style={{color:C.muted,fontSize:11}}>{p.age} سنة · {p.condition||"—"}</div>
            </div>
            <Tag label={p.status} color={SC[p.status]||C.muted}/>
          </div>
          <div style={{display:"flex",gap:6}}>
            <div onClick={()=>setOpenFile(p.id)} style={{background:C.teal+"22",borderRadius:8,padding:"7px 0",color:C.teal,fontSize:11,fontWeight:700,cursor:"pointer",flex:1,textAlign:"center"}}>📂 الملف الكامل</div>
            <div onClick={()=>setModal({edit:p})} style={{background:C.accent+"22",borderRadius:8,padding:"7px 12px",color:C.accent,fontSize:11,cursor:"pointer"}}>✏</div>
            <div onClick={()=>setModal({del:p.id})} style={{background:C.danger+"22",borderRadius:8,padding:"7px 10px",color:C.danger,fontSize:11,cursor:"pointer"}}>🗑</div>
          </div>
        </div>
      ))}
      {filtered.length===0&&<div style={{color:C.muted,textAlign:"center",padding:30,fontSize:13}}>لا توجد نتائج</div>}
      {(modal==="add"||(modal&&modal.addNew))&&<Modal title="مريض جديد" onClose={()=>setModal(null)}><PatientForm initial={(modal&&modal.addNew)?{name:modal.addNew}:null} onSave={f=>{addP(f);setModal(null);if(onInitDone)onInitDone();}} onClose={()=>setModal(null)}/></Modal>}
      {(modal&&modal.edit)&&<Modal title="تعديل بيانات المريض" onClose={()=>setModal(null)}><PatientForm initial={modal.edit} onSave={f=>{updP(f);setModal(null);}} onClose={()=>setModal(null)}/></Modal>}
      {(modal&&modal.del)&&<Confirm msg="حذف هذا المريض نهائياً؟" onOk={()=>{delP(modal.del);setModal(null);}} onNo={()=>setModal(null)}/>}
    </div>
  );
}

function Appointments({appointments,setAppointments,doctorNames=[],patients=[],onPatientClick}) {

              <span style={{background:C.border,borderRadius:6,padding:"2px 8px",color:C.muted,fontSize:10}}>{a.doctor}</span>
              <span style={{background:a.room==="OR"?C.gold+"22":C.teal+"22",borderRadius:6,padding:"2px 8px",color:a.room==="OR"?C.gold:C.teal,fontSize:10}}>غرفة {a.room}</span>

// ── Print Functions ───────────────────────────────────────────
function printDoc(html) {
  const win = window.open("", "_blank");
  if (win) {
    win.document.write(html);
    win.document.close();
    win.focus();
    setTimeout(() => { win.print(); }, 400);
  } else {
    alert("يرجى السماح بالنوافذ المنبثقة لاستخدام الطباعة");
  }
}

// ── Medicines Step ────────────────────────────────────────────
const DEFAULT_DRUGS = [
  "Vigamox ED","Optipred ED","Tobradex ED","Tobradex EO",
  "Dexaflox ED","Cyanaro ED","Solofresh ED",
  "Timolol 0.5% ED","Tobramycin ED","Prednisolone ED","Moxifloxacin ED",
  "Dorzolamide ED","Latanoprost ED","Ketorolac ED","Cyclopentolate ED",
  "Tropicamide ED","Atropine ED","Tetracycline EO","Vitamins A&E cap",
];
// Load custom drugs from localStorage (merged with defaults)
function loadDrugs() {
  try {
    const custom = JSON.parse(localStorage.getItem("iapp_custom_drugs")||"[]");
    const all = [...DEFAULT_DRUGS];
    custom.forEach(d=>{ if(!all.includes(d)) all.push(d); });
    return all;
  } catch { return [...DEFAULT_DRUGS]; }
}
function saveDrug(name) {
  try {
    const custom = JSON.parse(localStorage.getItem("iapp_custom_drugs")||"[]");
    if(!custom.includes(name) && !DEFAULT_DRUGS.includes(name)) {
      custom.push(name);
      localStorage.setItem("iapp_custom_drugs", JSON.stringify(custom));
    }
  } catch {}
}
function deleteDrug(name) {
  try {
    const custom = JSON.parse(localStorage.getItem("iapp_custom_drugs")||"[]");
    localStorage.setItem("iapp_custom_drugs", JSON.stringify(custom.filter(d=>d!==name)));
  } catch {}
}

const DOSE_OPTIONS = [
  "مرة يومياً","مرتين يومياً","3 مرات يومياً","4 مرات يومياً",
  "كل 4 ساعات","كل 6 ساعات","عند اللزوم","قبل النوم",
];

// Generate SPH options: +20.00 → -20.00 step 0.25 (integer steps to avoid float precision)
const SPH_OPTIONS = (()=>{
  const opts=[];
  for(let i=80; i>=-80; i--) {
    const v = i/4;
    opts.push((v>=0?"+":"")+v.toFixed(2));
  }
  return opts;
})();

// Generate CYL options: 0.00 → -6.00 step 0.25 (integer steps)
const CYL_OPTIONS = (()=>{
  const opts=[];
  for(let i=0; i<=24; i++) {
    const v = -(i/4);
    opts.push(v===0?"0.00":v.toFixed(2));
  }
  return opts;
})();

// Generate AXIS options: 0 → 180
const AXIS_OPTIONS = Array.from({length:181},(_,i)=>String(i));

function MedicinesStep({medicines, onChange}) {
  const parse = () => {
    if(!medicines) return [];
    return medicines.split("\n").filter(Boolean).map(line=>{
      const dash = line.indexOf(" - ");
      if(dash>-1) return {name:line.slice(0,dash).trim(), dose:line.slice(dash+3).trim()};
      return {name:line.trim(), dose:""};
    });
  };
  const [meds, setMeds]         = useState(parse);
  const [drugList, setDrugList] = useState(loadDrugs);
  const [showSugg, setShowSugg] = useState(null);
  const [newDrug, setNewDrug]   = useState("");
  const [addingNew, setAddingNew] = useState(false);

  const save = list => { setMeds(list); onChange(list.map(m=>m.name+(m.dose?" - "+m.dose:"")).join("\n")); };
  const addMed   = ()         => save([...meds, {name:"",dose:""}]);
  const update   = (i,k,v)   => { const n=[...meds]; n[i]={...n[i],[k]:v}; save(n); };
  const remove   = i          => save(meds.filter((_,idx)=>idx!==i));

  const handleAddNewDrug = () => {
    const name = newDrug.trim();
    if(!name) return;
    saveDrug(name);
    const updated = loadDrugs();
    setDrugList(updated);
    setNewDrug("");
    setAddingNew(false);
  };

  const handleDeleteDrug = (drugName) => {
    if(DEFAULT_DRUGS.includes(drugName)) { alert("لا يمكن حذف الأدوية الأصلية"); return; }
    if(!window.confirm("حذف " + drugName + " من القائمة؟")) return;
    deleteDrug(drugName);
    setDrugList(loadDrugs());
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
        <span style={{color:C.text,fontWeight:700,fontSize:13}}>💊 الأدوية الموصوفة</span>
        <div style={{display:"flex",gap:6}}>
          <Btn small color={C.teal} onClick={()=>setAddingNew(v=>!v)}>+ صنف جديد</Btn>
          <Btn small onClick={addMed}>+ إضافة</Btn>
        </div>
      </div>

      {/* Add new drug to list */}
      {addingNew&&(
        <div style={{background:C.teal+"11",border:"1px solid "+C.teal+"44",borderRadius:12,padding:12,display:"flex",gap:8,alignItems:"center"}}>
          <input autoFocus value={newDrug} onChange={e=>setNewDrug(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&handleAddNewDrug()}
            placeholder="اسم الدواء الجديد..."
            style={{...inp(),flex:1,fontSize:12}}/>
          <Btn small color={C.teal} onClick={handleAddNewDrug}>حفظ</Btn>
          <span onClick={()=>setAddingNew(false)} style={{color:C.muted,fontSize:20,cursor:"pointer"}}>×</span>
        </div>
      )}

      {meds.length===0&&<div style={{color:C.muted,fontSize:12,textAlign:"center",padding:20,background:C.card,borderRadius:10}}>اضغط "+ إضافة" لإضافة الأدوية</div>}
      {meds.map((m,i)=>(
        <div key={i} style={{background:C.card,border:"1px solid "+C.border,borderRadius:12,padding:12}}>
          <div style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
            <div style={{width:24,height:24,borderRadius:6,background:C.gold,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:C.bg,flexShrink:0}}>{i+1}</div>
            <div style={{flex:1}}>
              {/* Drug dropdown */}
              <select style={{...inp(),fontSize:12}} value={m.name}
                onChange={e=>update(i,"name",e.target.value)}>
                <option value="">-- اختر دواء --</option>
                {drugList.map(d=>(
                  <option key={d} value={d}>{d}</option>
                ))}
              </select>
            </div>
            <div onClick={()=>remove(i)} style={{color:C.danger,fontSize:20,cursor:"pointer",flexShrink:0,paddingRight:4}}>×</div>
          </div>
          {/* Dose options */}
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {DOSE_OPTIONS.map(d=>(
              <div key={d} onClick={()=>update(i,"dose",d)} style={{background:m.dose===d?C.teal+"22":C.bg,border:"1px solid "+(m.dose===d?C.teal:C.border),borderRadius:8,padding:"4px 10px",fontSize:10,color:m.dose===d?C.teal:C.muted,cursor:"pointer",fontWeight:m.dose===d?700:400}}>
                {d}
              </div>
            ))}
          </div>
          {m.dose&&<div style={{color:C.muted,fontSize:11,marginTop:6}}>📋 {m.name} - {m.dose}</div>}
        </div>
      ))}
    </div>
  );
}

function RxForm({initial,patients,onSave,onClose,doctorNames=["د. عبدالستار","د. سلمى","د. ليلى"]}) {
  // Auto-fill patient when coming from patient file (only 1 patient passed)
  const autoPatient = patients&&patients.length===1 ? patients[0] : null;
  const blank={
    patient: (autoPatient&&autoPatient.name)||"",
    patientId: (autoPatient&&autoPatient.id)||null,
    eye:"كلتا العينين",sphR:"",cylR:"",axisR:"",sphL:"",cylL:"",axisL:"",add:"",medicines:"",notes:"",
    date:new Date().toISOString().slice(0,10)
  };
  const [f,setF]=useState(initial?{...initial}:blank);
  // Skip patient-selection step if auto-filled
  const [step,setStep]=useState(autoPatient&&!initial?1:0);
  const [errors,setErrors]=useState({});
  const s=k=>e=>setF(v=>({...v,[k]:e.target.value}));

  const needR = f.eye==="العين اليمنى"||f.eye==="كلتا العينين";
  const needL = f.eye==="العين اليسرى"||f.eye==="كلتا العينين";

  const validate=()=>{
    const e={};
    if(needR && f.cylR && !f.axisR) e.axisR="مطلوب عند وجود CYL";
    if(needL && f.cylL && !f.axisL) e.axisL="مطلوب عند وجود CYL";
    setErrors(e);
    return Object.keys(e).length===0;
  };

  const handleNext=()=>{
    if(step===0 && !f.patient) return;
    if(step===1&&!validate()) return;
    setStep(p=>p+1);
  };

  const handleSave=()=>{
    if(!validate()) { setStep(1); return; }
    onSave(f);
  };

  return (
    <div>
      {autoPatient&&<div style={{background:C.accent+"22",border:"1px solid "+C.accent+"44",borderRadius:10,padding:"8px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:16}}>👤</span>
        <span style={{color:C.accent,fontWeight:700,fontSize:13}}>{autoPatient.name}</span>
        <span style={{color:C.muted,fontSize:11,marginRight:"auto"}}>{autoPatient.patientCode||""}</span>
      </div>}
      <div style={{display:"flex",marginBottom:18,background:C.card,borderRadius:12,padding:4}}>
        {(autoPatient?["قياسات النظر","الأدوية"]:["المريض","قياسات النظر","الأدوية"]).map((st,i)=>{
          const realStep=autoPatient?i+1:i;
          return <div key={i} onClick={()=>setStep(realStep)} style={{flex:1,textAlign:"center",padding:"8px 4px",background:step===realStep?"linear-gradient(135deg,"+C.accent+","+C.teal+")":"transparent",borderRadius:9,cursor:"pointer",color:step===realStep?C.bg:C.muted,fontSize:11,fontWeight:700}}>{st}</div>;
        })}
      </div>
      {step===0&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
        <Field label="المريض"><select style={inp()} value={f.patientId||""} onChange={e=>{const p=patients.find(p=>p.id===Number(e.target.value));setF(v=>({...v,patientId:Number(e.target.value),patient:(p&&p.name)||""}));}}><option value="">اختر مريض</option>{patients.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></Field>
        {patients.length===0&&<div style={{color:C.gold,fontSize:12,textAlign:"center",padding:"8px",background:C.gold+"11",borderRadius:8}}>⚠️ لا يوجد مرضى — أضف مريضاً أولاً من شاشة المرضى</div>}
        <Field label="تاريخ الوصفة"><input style={inp()} type="date" value={f.date} onChange={s("date")}/></Field>
        <Field label="العين المعالجة"><div style={{display:"flex",gap:8}}>{["العين اليمنى","العين اليسرى","كلتا العينين"].map(opt=><div key={opt} onClick={()=>setF(v=>({...v,eye:opt}))} style={{flex:1,textAlign:"center",padding:"9px 4px",background:f.eye===opt?C.accent+"22":C.card,border:`1px solid ${f.eye===opt?C.accent:C.border}`,borderRadius:10,cursor:"pointer",color:f.eye===opt?C.accent:C.muted,fontSize:10,fontWeight:600}}>{opt}</div>)}</div></Field>
        <Field label="ملاحظات"><textarea style={{...inp(),resize:"none"}} rows={2} value={f.notes} onChange={s("notes")} placeholder="ملاحظات..."/></Field>
      </div>}
      {step===1&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
        {[["اليمنى","R",needR],["اليسرى","L",needL]].map(([lbl,side,needed])=>(
          <div key={side} style={{background:C.card,border:`1px solid ${needed?C.border:C.border+"55"}`,borderRadius:14,padding:14,opacity:needed?1:0.45}}>
            <div style={{color:C.accent,fontWeight:700,fontSize:13,marginBottom:12}}>👁 العين {lbl} {!needed&&<span style={{color:C.muted,fontSize:10,fontWeight:400}}>(غير مختارة)</span>}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {/* SPH dropdown */}
              <div>
                <label style={{color:C.muted,fontSize:11,display:"block",marginBottom:5}}>SPH</label>
                <select disabled={!needed} style={{...inp({textAlign:"center",padding:"8px 4px",fontSize:13})}} value={f["sph"+side]||"+0.00"}
                  onChange={e=>{setF(v=>({...v,["sph"+side]:e.target.value}));}}>
                  {SPH_OPTIONS.map(o=><option key={o} value={o}>{o}</option>)}
                </select>
              </div>
              {/* CYL dropdown */}
              <div>
                <label style={{color:C.muted,fontSize:11,display:"block",marginBottom:5}}>CYL</label>
                <select disabled={!needed} style={{...inp({textAlign:"center",padding:"8px 4px",fontSize:13})}} value={f["cyl"+side]||"0.00"}
                  onChange={e=>{
                    const cylVal=e.target.value;
                    setF(v=>({...v,["cyl"+side]:cylVal}));
                    // Clear axis error when CYL is 0
                    if(cylVal==="0.00") setErrors(v=>({...v,["axis"+side]:undefined}));
                  }}>
                  {CYL_OPTIONS.map(o=><option key={o} value={o}>{o}</option>)}
                </select>
              </div>
              {/* AXIS dropdown */}
              <div>
                <label style={{color:errors["axis"+side]?C.danger:C.muted,fontSize:11,display:"block",marginBottom:5,fontWeight:"700"}}>
                  AXIS {f["cyl"+side]&&f["cyl"+side]!=="0.00"&&<span style={{color:C.danger}}>*</span>}
                </label>
                <select disabled={!needed} style={{...inp({textAlign:"center",padding:"8px 4px",fontSize:13,border:`1px solid ${errors["axis"+side]?C.danger:C.border}`,background:errors["axis"+side]?C.danger+"11":C.bg})}} value={f["axis"+side]||"0"}
                  onChange={e=>{setF(v=>({...v,["axis"+side]:e.target.value}));setErrors(v=>({...v,["axis"+side]:undefined}));}}>
                  {AXIS_OPTIONS.map(o=><option key={o} value={o}>{o}°</option>)}
                </select>
                {errors["axis"+side]&&<div style={{color:C.danger,fontSize:9,marginTop:3}}>⚠ مطلوب مع CYL</div>}
              </div>
            </div>
          </div>
        ))}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Field label="ADD (الإضافة)">
            <select style={inp({textAlign:"center"})} value={f.add||"0.00"} onChange={s("add")}>

            </select>
          </Field>
          <Field label="I.P.D (mm)">
            <select style={{...inp(),textAlign:"center"}} value={f.ipd||"62"} onChange={s("ipd")}>
              {Array.from({length:Math.round((75-50)/0.5)+1},(_,i)=>(50+i*0.5).toFixed(1)).map(v=><option key={v} value={v}>{v}</option>)}
            </select>
          </Field>
        </div>
        {(errors.axisR||errors.axisL)&&(
          <div style={{background:C.danger+"11",border:`1px solid ${C.danger}44`,borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:8}}>

          </div>
        )}
      </div>}
      {step===2&&<MedicinesStep medicines={f.medicines} onChange={val=>setF(v=>({...v,medicines:val}))}/>}
      <div style={{display:"flex",gap:10,marginTop:20}}>
        {step>0&&<Btn outline onClick={()=>setStep(p=>p-1)}>السابق</Btn>}
        {step<2?<Btn full onClick={handleNext}>التالي →</Btn>:<><Btn outline full onClick={onClose}>إلغاء</Btn><Btn full onClick={handleSave}>✓ حفظ</Btn></>}
      </div>
    </div>
  );
}

function Radiology({patients, customTests, setCustomTests, primary, clinic}) {
  const allTests = [...DEFAULT_TESTS, ...customTests.map(t=>({...t,cat:"مخصص"}))];
  const cats = [...new Set(allTests.map(t=>t.cat))];

  const [selectedPatient, setSelectedPatient] = useState(null);
  const [patientSearch, setPatientSearch]     = useState("");
  const [showPatientList, setShowPatientList] = useState(false);
  // selected: { [testId]: "OD" | "OS" | "OU" }
  const [selected, setSelected]   = useState({});
  const [notes, setNotes]         = useState("");
  const [addModal, setAddModal]   = useState(false);
  const [newTest, setNewTest]     = useState({name:"",name_ar:""});
  const [printed, setPrinted]     = useState(false);
  const [filterCat, setFilterCat] = useState("الكل");
  const [search, setSearch]       = useState("");

  const selectedIds = Object.keys(selected);
  const isSelected  = id => id in selected;
  const getEye      = id => selected[id] || "OU";

  // Toggle: if not selected → add with "OU". If selected → remove.
  const toggle = id => setSelected(s => {
    if(id in s){ const n={...s}; delete n[id]; return n; }
    return {...s, [id]:"OU"};
  });

  // Cycle eye: B → R → L → B
  const cycleEye = (e, id) => {
    e.stopPropagation();
    setSelected(s => {
      if(!(id in s)) return s;
      const next = EYE_CYCLE[s[id]] || "OU";
      return {...s, [id]: next};
    });
  };

  const selectAll = cat => {
    const ids = allTests.filter(t=>t.cat===cat).map(t=>t.id);
    const allIn = ids.every(id=>isSelected(id));
    setSelected(s => {
      const n = {...s};
      if(allIn){ ids.forEach(id=>delete n[id]); }
      else { ids.forEach(id=>{ if(!(id in n)) n[id]="OU"; }); }
      return n;
    });
  };

  const addCustom = () => {
    if(!newTest.name) return;
    const t = {id:"custom_"+Date.now(), name:newTest.name, name_ar:newTest.name_ar||newTest.name};
    setCustomTests([...customTests, t]);
    setSelected(s=>({...s,[t.id]:"OU"}));
    setNewTest({name:"",name_ar:""});
    setAddModal(false);
  };

  const delCustom = id => {
    setCustomTests(customTests.filter(t=>t.id!==id));
    setSelected(s=>{ const n={...s}; delete n[id]; return n; });
  };

  const EYE_LABEL = { OU:"كلتا العينين", OD:"العين اليمنى", OS:"العين اليسرى" };
  const EYE_SHORT = { OU:"OU", OD:"OD", OS:"OS" };
  const EYE_COLOR = { OU:C.teal, OD:C.accent, OS:C.gold };
  const EYE_CYCLE = { OU:"OD", OD:"OS", OS:"OU" };

  const doPrint = () => {
    if(selectedIds.length===0) return;
    const html = getRadiologyHTML(selected, selectedPatient, notes, primary, allTests, clinic);
    const win = window.open("","_blank");
    if(!win){alert("يرجى السماح بالنوافذ المنبثقة");return;}
    win.document.write(html);
    win.document.close();
    win.focus();
    setTimeout(()=>win.print(),400);
    setPrinted(true);
    setTimeout(()=>setPrinted(false),3000);
  };

  const visibleTests = allTests.filter(t=>
    (filterCat==="الكل"||t.cat===filterCat) &&
    (t.name.toLowerCase().includes(search.toLowerCase())||t.name_ar.includes(search))
  );

  return (
    <div style={{padding:"16px 16px 90px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>

function DoctorForm({initial, onSave, onClose}) {
  const blank = {name:"", short:"", title:"طبيب عيون", initial:"", isPrimary:false};
  const [f, setF] = useState(initial ? {...initial} : blank);
  const s = k => e => setF(v => ({...v, [k]: e.target.value}));
  // auto-fill initial from name
  const handleName = e => {
    const name = e.target.value;
    const parts = name.replace("د.","").trim().split(" ");
    const ini = (parts[0]&&parts[0][0]) || "";
    const short = name.includes("د.") ? name.split(" ").slice(0,2).join(" ") : "د. "+parts[0];
    setF(v => ({...v, name, initial: v.initial || ini, short: v.short || short}));
  };
  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <Field label="الاسم الكامل"><input style={inp()} value={f.name} onChange={handleName} placeholder="د. محمد أحمد"/></Field>
      <Field label="الاسم المختصر (يظهر في القوائم)"><input style={inp()} value={f.short} onChange={s("short")} placeholder="د. محمد"/></Field>
      <Field label="اللقب / التخصص"><input style={inp()} value={f.title} onChange={s("title")} placeholder="طبيب عيون"/></Field>
      <Field label="الحرف الأول (للصورة الرمزية)"><input style={{...inp(),textAlign:"center"}} value={f.initial} onChange={s("initial")} placeholder="م" maxLength={1}/></Field>
      <div onClick={()=>setF(v=>({...v,isPrimary:!v.isPrimary}))} style={{display:"flex",alignItems:"center",gap:10,background:C.card,border:`1px solid ${f.isPrimary?C.gold:C.border}`,borderRadius:10,padding:"10px 14px",cursor:"pointer"}}>
        <div style={{width:20,height:20,borderRadius:6,background:f.isPrimary?C.gold:C.bg,border:`2px solid ${f.isPrimary?C.gold:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:C.bg,fontWeight:700}}>{f.isPrimary?"✓":""}</div>
        <span style={{color:f.isPrimary?C.gold:C.muted,fontSize:13,fontWeight:600}}>الطبيب الرئيسي للعيادة</span>
      </div>
      <div style={{display:"flex",gap:10,marginTop:8}}>
        <Btn outline full onClick={onClose}>إلغاء</Btn>
        <Btn full onClick={()=>f.name&&f.short&&onSave(f)}>حفظ</Btn>
      </div>
    </div>
  );
}

  const [pinMsg,setPinMsg]=useState(null);
  const totalRev=visits.reduce((s,v)=>s+(v.paid?Number(v.cost||0):0),0);
  const primary = doctors.find(d=>d.isPrimary) || doctors[0] || {};

  const addDoc = f => setDoctors([...doctors, {...f, id:Date.now()}]);
  const editDoc = f => setDoctors(doctors.map(d => d.id===f.id ? f : d));
  const delDocFn = id => setDoctors(doctors.filter(d => d.id!==id));
  const setPrimary = id => setDoctors(doctors.map(d => ({...d, isPrimary: d.id===id})));

  const addPrice = f => setPrices([...prices, {...f, id:Date.now()}]);

  const delPrice = id => setPrices(prices.filter(p => p.id!==id));

    if(pinForm.old !== getPin()) { setPinMsg({err:"❌ الرقم الحالي غير صحيح"}); return; }

    if(pinForm.new1!==pinForm.new2) { setPinMsg({err:"❌ الرقمان الجديدان غير متطابقان"}); return; }
    savePin(pinForm.new1);
    setPinMsg({ok:"✅ تم تغيير الرقم السري بنجاح"});

            <div onClick={()=>setPriceModal({del:p.id})} style={{background:C.danger+"22",borderRadius:8,padding:"5px 8px",color:C.danger,fontSize:11,cursor:"pointer"}}>🗑</div>
          </div>
        ))}
        {prices.length===0&&<div style={{color:C.muted,fontSize:12,textAlign:"center",padding:16}}>لا توجد أسعار مضافة</div>}
      </div>

      {/* Stats */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:14,marginBottom:16}}>
        <div style={{color:C.muted,fontSize:11,fontWeight:700,marginBottom:12}}>ملخص قاعدة البيانات</div>
        {[["👥 المرضى",patients.length],["📋 المواعيد",appointments.length],["🗓 الزيارات",visits.length],["🔬 الوصفات",prescriptions.length],["🔍 الفحوصات",exams.length],["💰 الإيرادات",totalRev.toLocaleString()+" ج.م"]].map(([lbl,val])=>(
          <div key={lbl} style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <span style={{color:C.muted,fontSize:13}}>{lbl}</span>
            <span style={{color:C.accent,fontWeight:700,fontSize:13}}>{val}</span>
          </div>
        ))}
      </div>

      {[["🏥","I App للعيون","بيانات العيادة"],["🕐","ساعات العمل","8ص - 8م"],["💾","النسخ الاحتياطي","محفوظ تلقائياً"]].map(([icon,lbl,sub],i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 14px",background:C.card,border:`1px solid ${C.border}`,borderRadius:12,marginBottom:8}}>
          <div style={{width:34,height:34,borderRadius:10,background:C.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{icon}</div>
          <div><div style={{color:C.text,fontSize:13}}>{lbl}</div><div style={{color:C.muted,fontSize:11}}>{sub}</div></div>
        </div>
      ))}

      {/* PIN Change */}
      <div onClick={()=>setPinModal(true)} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 14px",background:C.card,border:`1px solid ${C.border}`,borderRadius:12,marginBottom:8,cursor:"pointer"}}>
        <div style={{width:34,height:34,borderRadius:10,background:C.purple+"33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🔒</div>
        <div style={{flex:1}}><div style={{color:C.text,fontSize:13}}>تغيير الرقم السري</div><div style={{color:C.muted,fontSize:11}}>PIN مكون من 4 أرقام</div></div>
        <div style={{color:C.purple,fontSize:12}}>←</div>
      </div>

      <div onClick={()=>setConfirm(true)} style={{background:C.danger+"11",border:`1px solid ${C.danger}33`,borderRadius:14,padding:"13px 14px",display:"flex",alignItems:"center",gap:12,cursor:"pointer",marginTop:12}}>
        <span style={{fontSize:18}}>🔄</span>
        <span style={{color:C.danger,fontWeight:600,fontSize:13}}>إعادة تعيين البيانات الأولية</span>
      </div>

      {/* Clinic edit modal */}
      {editClinic&&<Modal title="تعديل بيانات العيادة" onClose={()=>setEditClinic(false)}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Field label="عنوان العيادة"><input style={inp()} value={clinicForm.address||""} onChange={e=>setClinicForm(f=>({...f,address:e.target.value}))} placeholder="مثال: القاهرة - مصر الجديدة - شارع..."/></Field>
          <Field label="رقم التواصل / الهاتف"><input style={inp()} value={clinicForm.phone||""} onChange={e=>setClinicForm(f=>({...f,phone:e.target.value}))} placeholder="مثال: 01234567890"/></Field>
          <div style={{display:"flex",gap:10,marginTop:8}}>
            <Btn outline full onClick={()=>setEditClinic(false)}>إلغاء</Btn>
            <Btn full onClick={()=>{setClinic({...clinic,...clinicForm});setEditClinic(false);}}>✓ حفظ</Btn>
          </div>
        </div>
      </Modal>}

      {/* Doctor modals */}
      {modal==="add"&&<Modal title="إضافة طبيب جديد" onClose={()=>setModal(null)}><DoctorForm onSave={f=>{addDoc(f);setModal(null);}} onClose={()=>setModal(null)}/></Modal>}
      {(modal&&modal.edit)&&<Modal title="تعديل بيانات الطبيب" onClose={()=>setModal(null)}><DoctorForm initial={modal.edit} onSave={f=>{editDoc(f);setModal(null);}} onClose={()=>setModal(null)}/></Modal>}
      {delDoc&&<Confirm msg="حذف هذا الطبيب من القائمة؟" onOk={()=>{delDocFn(delDoc);setDelDoc(null);}} onNo={()=>setDelDoc(null)}/>}

      {/* Price modals */}
      {priceModal==="add"&&<Modal title="إضافة خدمة جديدة" onClose={()=>setPriceModal(null)}><PriceForm onSave={f=>{addPrice(f);setPriceModal(null);}} onClose={()=>setPriceModal(null)}/></Modal>}
      {(priceModal&&priceModal.edit)&&<Modal title="تعديل سعر الخدمة" onClose={()=>setPriceModal(null)}><PriceForm initial={priceModal.edit} onSave={f=>{editPrice(f);setPriceModal(null);}} onClose={()=>setPriceModal(null)}/></Modal>}
      {(priceModal&&priceModal.del)&&<Confirm msg="حذف هذه الخدمة من قائمة الأسعار؟" onOk={()=>{delPrice(priceModal.del);setPriceModal(null);}} onNo={()=>setPriceModal(null)}/>}

      {/* PIN Change Modal */}
      {pinModal&&<Modal title="🔒 تغيير الرقم السري" onClose={()=>{setPinModal(false);setPinForm({old:"",new1:"",new2:""});setPinMsg(null);}}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Field label="الرقم الحالي"><input style={{...inp(),letterSpacing:8,textAlign:"center",fontSize:18}} type="password" inputMode="numeric" maxLength={4} value={pinForm.old} onChange={e=>setPinForm(f=>({...f,old:e.target.value.replace(/\D/g,"").slice(0,4)}))}/></Field>
          <Field label="الرقم الجديد (4 أرقام)"><input style={{...inp(),letterSpacing:8,textAlign:"center",fontSize:18}} type="password" inputMode="numeric" maxLength={4} value={pinForm.new1} onChange={e=>setPinForm(f=>({...f,new1:e.target.value.replace(/\D/g,"").slice(0,4)}))}/></Field>
          <Field label="تأكيد الرقم الجديد"><input style={{...inp(),letterSpacing:8,textAlign:"center",fontSize:18}} type="password" inputMode="numeric" maxLength={4} value={pinForm.new2} onChange={e=>setPinForm(f=>({...f,new2:e.target.value.replace(/\D/g,"").slice(0,4)}))}/></Field>
          {pinMsg&&<div style={{background:pinMsg.err?C.danger+"22":C.success+"22",border:`1px solid ${pinMsg.err?C.danger:C.success}44`,borderRadius:10,padding:"10px 14px",color:pinMsg.err?C.danger:C.success,fontSize:13,textAlign:"center"}}>{pinMsg.err||pinMsg.ok}</div>}
          <div style={{display:"flex",gap:10,marginTop:4}}>
            <Btn outline full onClick={()=>{setPinModal(false);setPinForm({old:"",new1:"",new2:""});setPinMsg(null);}}>إلغاء</Btn>
            <Btn full color={C.purple} onClick={handlePinChange}>✓ تغيير PIN</Btn>
          </div>
        </div>
      </Modal>}

      {confirm&&<Confirm msg="سيتم حذف جميع البيانات. هل أنت متأكد؟" onOk={()=>{onReset();setConfirm(false);}} onNo={()=>setConfirm(false)}/>}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────
function App() {
  const [unlocked,setUnlocked]=useState(()=>sessionStorage.getItem("iapp_unlocked")==="1");
  const [tab,setTab]=useState("dashboard");
  const [patOpenId,setPatOpenId]=useState(null);
  const [patNewName,setPatNewName]=useState("");
  const [showAlerts,setShowAlerts]=useState(false);
  const [showSearch,setShowSearch]=useState(false);
  const [alertsShown,setAlertsShown]=useState(false);
  const [syncing,setSyncing]=useState(false);
  const [toast,setToast]=useState(null);
  const showToast = msg => { setToast(msg); };
  const [patients,setRawP,pR]=useDB("iapp_patients",SEED.patients);
  const [appointments,setRawA,aR]=useDB("iapp_appointments",SEED.appointments);
  const [prescriptions,setRawRx,rR]=useDB("iapp_prescriptions",SEED.prescriptions);
  const [exams,setRawE,eR]=useDB("iapp_exams",SEED.exams);
  const [visits,setRawV,vR]=useDB("iapp_visits",SEED.visits);
  const [doctors,setRawD,dR]=useDB("iapp_doctors",SEED.doctors);
  const [prices,setRawPr,prR]=useDB("iapp_prices",SEED.prices);
  const [customTests,setRawCT,ctR]=useDB("iapp_custom_tests",SEED.customTests);
  const [clinic,setRawCl,clR]=useDB("iapp_clinic",SEED.clinic);

  const withSync = fn => async v => { setSyncing(true); await fn(v); setTimeout(()=>setSyncing(false), 1200); showToast("تم الحفظ والمزامنة"); };
  const setPatients=withSync(setRawP);
  const setAppointments=withSync(setRawA);
  const setRx=withSync(setRawRx);
  const setExams=withSync(setRawE);
  const setVisits=withSync(setRawV);
  const setDoctors=withSync(setRawD);
  const setPrices=withSync(setRawPr);
  const setCustomTests=withSync(setRawCT);
  const setClinic=withSync(setRawCl);

  const primary = doctors.find(d=>d.isPrimary) || doctors[0] || {name:"د. عبدالستار صقر",short:"د. عبدالستار",initial:"ع"};
  const doctorNames = doctors.map(d=>d.short);

  const reset=()=>{
    setRawP(SEED.patients);setRawA(SEED.appointments);setRawRx(SEED.prescriptions);
    setRawE(SEED.exams);setRawV(SEED.visits);setRawD(SEED.doctors);setRawPr(SEED.prices);setRawCT(SEED.customTests);setRawCl(SEED.clinic);
  };

  // Show alerts on first load
  useEffect(()=>{
    if(!alertsShown && unlocked){ setAlertsShown(true); setTimeout(()=>setShowAlerts(true),800); }
  },[unlocked]);

  const handleUnlock = () => { sessionStorage.setItem("iapp_unlocked","1"); setUnlocked(true); };
  if(!unlocked) return <PinLock onUnlock={handleUnlock}/>;

  if(!pR||!aR||!rR||!eR||!vR||!dR||!prR||!ctR||!clR) return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",direction:"rtl",fontFamily:"'Segoe UI','Tahoma',Arial,sans-serif"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:16}}>👁</div>
        <div style={{color:C.accent,fontSize:16,fontWeight:700}}>I App</div>
        <div style={{color:C.muted,fontSize:13,marginTop:8}}>جاري التحميل...</div>
      </div>
    </div>
  );

  const screens={
    dashboard:<Dashboard patients={patients} appointments={appointments} visits={visits} primary={primary} clinic={clinic} onDailyReport={()=>{const html=getDailyReportHTML(new Date().toISOString().slice(0,10),patients,visits,appointments,primary,clinic);printDoc(html);}} onPatientClick={((name,p)=>{if(p&&p.id){setPatOpenId(p.id);}else{setPatNewName(name);}setTab("patients");})}/>,
    patients:<Patients patients={patients} setPatients={setPatients} initOpenId={patOpenId} initNewName={patNewName} onInitDone={()=>{setPatOpenId(null);setPatNewName("");}} exams={exams} setExams={setExams} prescriptions={prescriptions} setRx={setRx} visits={visits} setVisits={setVisits} doctorNames={doctorNames} primaryDoctor={primary} prices={prices} clinic={clinic}/>,
    appointments:<Appointments appointments={appointments} setAppointments={setAppointments} doctorNames={doctorNames} patients={patients} onPatientClick={((name,p)=>{if(p&&p.id){setPatOpenId(p.id);}else{setPatNewName(name);}setTab("patients");})}/>,
    prescriptions:<Prescriptions prescriptions={prescriptions} setRx={setRx} patients={patients} doctorNames={doctorNames} primaryDoctor={primary} clinic={clinic}/>,
    radiology:<Radiology patients={patients} customTests={customTests} setCustomTests={setCustomTests} primary={primary} clinic={clinic}/>,
    settings:<Settings patients={patients} appointments={appointments} prescriptions={prescriptions} exams={exams} visits={visits} doctors={doctors} setDoctors={setDoctors} prices={prices} setPrices={setPrices} clinic={clinic} setClinic={setClinic} onReset={reset}/>,
  };

  return (
    <div style={{minHeight:"100vh",background:"#000",display:"flex",justifyContent:"center",alignItems:"flex-start"}}>
      <div style={{width:"100%",maxWidth:480,minHeight:"100vh",background:C.bg,direction:"rtl",fontFamily:"'Segoe UI','Tahoma',Arial,sans-serif",position:"relative",overflowX:"hidden"}}>
        <TopBar primary={primary} onSearch={()=>setShowSearch(true)} syncing={syncing}/>
        <div style={{overflowY:"auto",maxHeight:"calc(100vh - 128px)",animation:"slideUp 0.25s ease"}}>{screens[tab]}</div>
        <BottomNav active={tab} setActive={setTab}/>
        {showAlerts&&<FollowUpAlerts visits={visits} patients={patients} onClose={()=>setShowAlerts(false)}/>}
        {showSearch&&<GlobalSearch patients={patients} prescriptions={prescriptions} appointments={appointments} onNavigate={(t,id)=>{if(t==="patients"&&id){setPatOpenId(id);}setTab(t);setShowSearch(false);}} onClose={()=>setShowSearch(false)}/>}
        {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
      </div>
    </div>
  );
}

    // Error Boundary class to catch render errors and show them instead of black screen
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(e) { return { error: e }; }
      componentDidCatch(e, info) { console.error("React error:", e, info); }
      render() {
        if (this.state.error) {
          return React.createElement('div', {
            style: {
              position:'fixed', inset:0, background:'#0A0F1E', color:'#FF4D6D',
              fontFamily:'monospace', fontSize:12, padding:24, overflowY:'auto',
              whiteSpace:'pre-wrap', direction:'ltr', zIndex:9999
            }
          }, '⚠ I App — Render Error:\n\n' + this.state.error.message + '\n\n' + (this.state.error.stack||''));
        }
        return this.props.children;
      }
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(ErrorBoundary, null, React.createElement(App)));
  </script>
  <script>
  // Manual Babel transform loader — works from content:// and file:// protocols
  (function() {
    var errDiv = document.createElement('div');
    errDiv.id = 'load-error';
    errDiv.style.cssText = 'display:none;position:fixed;inset:0;background:#0A0F1E;color:#FF4D6D;font-family:monospace;font-size:12px;padding:24px;direction:ltr;z-index:9999;overflow:auto;white-space:pre-wrap;';
    document.body.appendChild(errDiv);

    function showError(msg) {
      errDiv.style.display = 'block';
      var root = document.getElementById('root');
      if(root) root.style.display = 'none';
      errDiv.textContent = '⚠ I App — Error:\n\n' + msg + '\n\nTip: Make sure you have internet connection.';
    }

    // Catch runtime errors too
    window.onerror = function(msg, src, line, col, err) {
      showError('Runtime error at line ' + line + ':\n' + msg + '\n\n' + (err && err.stack ? err.stack : ''));
      return true;
    };
    window.onunhandledrejection = function(e) {
      showError('Unhandled promise rejection:\n' + (e.reason && e.reason.message ? e.reason.message : String(e.reason)));
    };

    function tryTransform() {
      try {
        if (typeof Babel === 'undefined') { showError('Babel failed to load. Check internet connection.'); return; }
        if (typeof React === 'undefined') { showError('React failed to load. Check internet connection.'); return; }
        var src = document.getElementById('jsx-source').textContent;
        var result = Babel.transform(src, { presets: ['react'] });
        var loader = document.getElementById('init-loader');
        var script = document.createElement('script');
        script.onerror = function(e) { showError('Script execution error: ' + e.message); };
        script.textContent = result.code;
        document.body.appendChild(script);
        // Hide loader after a short delay to let React render
        setTimeout(function(){ if(loader) loader.style.display='none'; }, 800);
      } catch(e) {
        showError('Babel transform error:\n' + e.message + '\n\n' + (e.stack||''));
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', tryTransform);
    } else {
      tryTransform();
    }
  })();
  </script>
</body>
</html>
