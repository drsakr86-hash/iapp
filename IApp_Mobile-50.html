// ── Cloudinary Config ─────────────────────────────────────────
const CL_CLOUD = "daihhusnc";
const CL_PRESET = "iapp_unsigned"; // unsigned upload preset

async function uploadToCloudinary(file) {
  const fd = new FormData();
  fd.append("file", file);
  fd.append("upload_preset", CL_PRESET);
  fd.append("folder", "iapp_radiology");
  try {
    const r = await fetch(`https://api.cloudinary.com/v1_1/${CL_CLOUD}/image/upload`, {
      method: "POST", body: fd
    });
    const data = await r.json();
    if (data.secure_url) return { url: data.secure_url, publicId: data.public_id };
    throw new Error(data.error?.message || "Upload failed");
  } catch(e) {
    console.error("Cloudinary upload error:", e);
    return null;
  }
}

let _sb = null;
function getSB() {

async function sbGet(key) {
  try {
    const sb = getSB();
    if (!sb) return undefined;
    const { data, error } = await sb
      .from("iapp_store")
      .select("value")
      .eq("key", key)
      .maybeSingle();

async function sbSet(key, value) {
  try {
    const sb = getSB();
    if (!sb) return false;
    const { error } = await sb
      .from("iapp_store")
      .upsert({ key, value }, { onConflict: "key" });
    if (error) { console.warn("sbSet error:", error.message); return false; }
    return true;
  } catch(e) { console.warn("sbSet exception:", e); return false; }
}

function useDB(key, seed) {
  const [data, setData] = useState(() => {
    try {
      const local = localStorage.getItem(key);
      if (local) return JSON.parse(local);
    } catch {}
    return seed;
  });
  const [ready, setReady] = useState(false);

  useEffect(() => {
    setReady(true);
    (async () => {
      const remote = await sbGet(key);
      if (remote === undefined) {
        console.log(`[${key}] offline — using localStorage`);
      } else if (remote === null) {
        const local = localStorage.getItem(key);
        const toUpload = local ? JSON.parse(local) : seed;
        await sbSet(key, toUpload);
        console.log(`[${key}] first sync ✓`);
      } else {
        setData(remote);
        try { localStorage.setItem(key, JSON.stringify(remote)); } catch {}
        console.log(`[${key}] loaded from Supabase ✓`);
      }
    })();
  }, [key]);

  const persist = useCallback(async val => {
    setData(val);
    try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
    await sbSet(key, val);
  }, [key]);

  return [data, persist, ready];
}

function genCode(patients) {
  const nums = patients.map(p => parseInt((p.patientCode||"P-0000").replace("P-",""))||0);
  const next = Math.max(0, ...nums) + 1;
  return "P-" + String(next).padStart(4, "0");
}

const CORRECT_PIN = "1234"; // غيّره من الإعدادات
function PinLock({onUnlock}) {
  const [pin,setPin]=useState("");
  const [error,setError]=useState(false);
  const press = d => {
    if(pin.length>=4) return;
    const next = pin+d;
    setPin(next);
    if(next.length===4){
      if(next===CORRECT_PIN){ onUnlock(); }
      else { setError(true); setTimeout(()=>{setPin("");setError(false);},600); }
    }
  };
  const del = () => setPin(p=>p.slice(0,-1));
  return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",direction:"rtl",fontFamily:"'Segoe UI','Tahoma',Arial,sans-serif"}}>

    const diff = Math.ceil((new Date(v.nextVisit)-todayDate)/(1000*60*60*24));
    return diff<=3 && diff>=0;
  }).map(v=>{
    const p = patients.find(p=>p.id===v.patientId);
    const diff = Math.ceil((new Date(v.nextVisit)-todayDate)/(1000*60*60*24));
    return {...v, patientName:p?.name||"—", patientPhone:p?.phone||"", diff};

  if(alerts.length===0) return null;

function VisitForm({initial,patientId,onSave,onClose,doctorNames=["د. عبدالستار","د. سلمى","د. ليلى"],prices=[]}) {
  const blank={date:new Date().toISOString().slice(0,10),type:"فحص روتيني",doctor:"د. عبدالستار",complaint:"",result:"",cost:"350",paid:false,nextVisit:"",notes:""};
  const [f,setF]=useState(initial?{...initial}:blank);

  const TYPES=["فحص روتيني","متابعة","فحص شبكية","قياس نظر","استشارة","عملية","طوارئ"];

  const handleTypeChange = e => {
    const type = e.target.value;
    const matched = prices.find(p => p.name === type || type.includes(p.name) || p.name.includes(type));
    setF(v => ({...v, type, cost: matched ? matched.price : v.cost}));
  };
  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Field label="تاريخ الزيارة"><input style={inp()} type="date" value={f.date} onChange={s("date")}/></Field>
        <Field label="الطبيب"><select style={inp()} value={f.doctor} onChange={s("doctor")}>{doctorNames.map(d=><option key={d}>{d}</option>)}</select></Field>
      </div>
      <Field label="نوع الزيارة">
        <select style={inp()} value={f.type} onChange={handleTypeChange}>
          {(prices.length>0 ? prices.map(p=>p.name) : TYPES).map(t=><option key={t}>{t}</option>)}
        </select>
        {prices.length>0&&prices.find(p=>p.name===f.type)&&(
          <div style={{color:C.gold,fontSize:11,marginTop:4}}>💰 السعر المرجعي: {Number(prices.find(p=>p.name===f.type)?.price||0).toLocaleString()} ج.م</div>
        )}
      </Field>
      <Field label="الشكوى"><textarea style={{...inp(),resize:"none"}} rows={2} value={f.complaint} onChange={s("complaint")} placeholder="سبب الزيارة..."/></Field>
      <Field label="نتيجة الزيارة / التشخيص"><textarea style={{...inp(),resize:"none"}} rows={2} value={f.result} onChange={s("result")} placeholder="نتيجة الكشف..."/></Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Field label="التكلفة (ج.م)"><input style={inp({textAlign:"center"})} type="number" value={f.cost} onChange={s("cost")} placeholder="350"/></Field>
        <Field label="موعد المتابعة"><input style={inp()} type="date" value={f.nextVisit} onChange={s("nextVisit")}/></Field>
      </div>
      <div onClick={()=>setF(v=>({...v,paid:!v.paid}))} style={{display:"flex",alignItems:"center",gap:10,background:C.card,border:`1px solid ${f.paid?C.success:C.border}`,borderRadius:10,padding:"10px 14px",cursor:"pointer"}}>
        <div style={{width:20,height:20,borderRadius:6,background:f.paid?C.success:C.bg,border:`2px solid ${f.paid?C.success:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:C.bg,fontWeight:700}}>{f.paid?"✓":""}</div>
        <span style={{color:f.paid?C.success:C.muted,fontSize:13,fontWeight:600}}>تم الدفع</span>
      </div>
      <Field label="ملاحظات"><textarea style={{...inp(),resize:"none"}} rows={2} value={f.notes} onChange={s("notes")} placeholder="ملاحظات إضافية..."/></Field>
      <div style={{display:"flex",gap:10,marginTop:8}}><Btn outline full onClick={onClose}>إلغاء</Btn><Btn full onClick={()=>onSave({...f,patientId,id:f.id||Date.now(),cost:f.cost})}>حفظ الزيارة</Btn></div>
    </div>
  );
}

          <Field label="فصيلة الدم"><select style={inp()} value={f.bloodType} onChange={s("bloodType")}>{["A+","A-","B+","B-","AB+","AB-","O+","O-"].map(b=><option key={b}>{b}</option>)}</select></Field>
        </div>
        <Field label="العنوان"><input style={inp()} value={f.address} onChange={s("address")}/></Field>
        <Field label="المهنة"><input style={inp()} value={f.occupation||""} onChange={s("occupation")} placeholder="المهنة"/></Field>
        <Field label="آخر زيارة"><input style={inp()} type="date" value={f.lastVisit} onChange={s("lastVisit")}/></Field>
        <Field label="الحالة"><select style={inp()} value={f.status} onChange={s("status")}>{["مكتمل","متابعة","طارئ"].map(x=><option key={x}>{x}</option>)}</select></Field>
      </div>}
      {tab==="medical"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
        <Field label="التشخيص الرئيسي"><input style={inp()} value={f.condition} onChange={s("condition")} placeholder="قصر نظر، ماء أبيض..."/></Field>
        <Field label="التاريخ المرضي"><textarea style={{...inp(),resize:"none"}} rows={3} value={f.history||""} onChange={s("history")} placeholder="أمراض سابقة، عمليات..."/></Field>
        <Field label="الحساسية للأدوية"><textarea style={{...inp(),resize:"none"}} rows={2} value={f.allergies||""} onChange={s("allergies")} placeholder="بنسلين، سلفا..."/></Field>
      </div>}
      {tab==="contact"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
        <Field label="رقم الهاتف"><input style={inp()} value={f.phone} onChange={s("phone")}/></Field>
        <Field label="جهة الاتصال في الطوارئ"><input style={inp()} value={f.emergencyContact||""} onChange={s("emergencyContact")} placeholder="الاسم والعلاقة والرقم"/></Field>
        <Field label="العنوان الكامل"><textarea style={{...inp(),resize:"none"}} rows={3} value={f.address} onChange={s("address")} placeholder="المدينة - الحي - الشارع"/></Field>
      </div>}
      <div style={{display:"flex",gap:10,marginTop:20}}><Btn outline full onClick={onClose}>إلغاء</Btn><Btn full onClick={()=>onSave({...f,age:Number(f.age)})}>✓ حفظ التعديلات</Btn></div>
    </div>
  );
}

// ── Patient File (Full Screen) ────────────────────────────────
function PatientFile({patient,allExams,allRx,allVisits,onClose,onUpdatePatient,onSaveExam,onDelExam,onSaveVisit,onDelVisit,doctorNames=[],primaryDoctor,prices=[],clinic}) {
  const [tab,setTab]=useState("info");
  const [modal,setModal]=useState(null);
  const [delTarget,setDelTarget]=useState(null);
  const exams=allExams.filter(e=>e.patientId===patient.id);
  const rxList=allRx.filter(r=>r.patientId===patient.id);
  const visits=allVisits.filter(v=>v.patientId===patient.id).sort((a,b)=>b.date.localeCompare(a.date));
  const totalSpent=visits.reduce((s,v)=>s+(v.paid?Number(v.cost||0):0),0);
  const TABS=[{id:"info",label:"الملف",icon:"👤"},{id:"visits",label:"الزيارات",icon:"🗓"},{id:"exams",label:"الفحوصات",icon:"🔍"},{id:"treatment",label:"العلاج",icon:"💊"},{id:"rx",label:"الوصفات",icon:"🔬"},{id:"images",label:"الصور",icon:"🖼"}];
  const [curPatient,setCurPatient]=useState(patient);

  const handlePatientSave=updated=>{
    onUpdatePatient(updated);
    setCurPatient(updated);
    setModal(null);
  };

  return (
    <div style={{position:"fixed",inset:0,background:C.bg,zIndex:300,overflowY:"auto",direction:"rtl",fontFamily:"'Segoe UI','Tahoma',Arial,sans-serif",maxWidth:480,margin:"0 auto"}}>
      <TopBar backLabel={curPatient.name} onBack={onClose}/>

      {/* Header */}
      <div style={{background:`linear-gradient(135deg,${C.accent}22,${C.teal}11)`,border:`1px solid ${C.accent}33`,margin:"12px 16px",borderRadius:16,padding:"14px 16px",display:"flex",alignItems:"center",gap:14}}>
        <div style={{width:56,height:56,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent},${C.teal})`,display:"flex",alignItems:"center",justifyContent:"center",color:C.bg,fontWeight:800,fontSize:22}}>{curPatient.name[0]}</div>
        <div style={{flex:1}}>
          <div style={{color:C.text,fontWeight:700,fontSize:16}}>{curPatient.name}</div>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
            <span style={{background:C.accent+"33",color:C.accent,borderRadius:8,padding:"2px 10px",fontSize:12,fontWeight:800,letterSpacing:1}}>{curPatient.patientCode||"—"}</span>
          </div>
          <div style={{color:C.muted,fontSize:12}}>{curPatient.age} سنة · {curPatient.gender} · {curPatient.phone}</div>
          <div style={{display:"flex",gap:6,marginTop:4,alignItems:"center"}}>
            <Tag label={curPatient.status} color={SC[curPatient.status]||C.muted}/>
            <span onClick={()=>setModal("editPatient")} style={{color:C.accent,fontSize:11,cursor:"pointer",background:C.accent+"22",borderRadius:8,padding:"2px 8px"}}>✏ تعديل الملف</span>
            <span onClick={()=>printDoc(getPatientFileHTML(curPatient,allVisits,allExams,allRx,primaryDoctor,clinic))} style={{color:C.purple,fontSize:11,cursor:"pointer",background:C.purple+"22",borderRadius:8,padding:"2px 8px"}}>🖨️ طباعة</span>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",margin:"0 16px 14px",background:C.card,borderRadius:12,padding:4,overflowX:"auto"}}>
        {TABS.map(t=><div key={t.id} onClick={()=>setTab(t.id)} style={{flex:"0 0 auto",textAlign:"center",padding:"8px 10px",background:tab===t.id?`linear-gradient(135deg,${C.accent},${C.teal})`:"transparent",borderRadius:9,cursor:"pointer",color:tab===t.id?C.bg:C.muted,fontSize:10,fontWeight:700,minWidth:54}}><div style={{fontSize:13}}>{t.icon}</div>{t.label}</div>)}
      </div>

      <div style={{padding:"0 16px 100px"}}>

        {/* INFO TAB */}
        {tab==="info"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:14}}>
            <SecHead icon="📋" label="البيانات الأساسية"/>
            {[["رقم الملف",curPatient.patientCode||"—"],["الاسم",curPatient.name],["العمر",curPatient.age+" سنة"],["الجنس",curPatient.gender],["فصيلة الدم",curPatient.bloodType||"-"],["الهاتف",curPatient.phone],["المهنة",curPatient.occupation||"-"],["العنوان",curPatient.address]].map(([k,v])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",paddingBottom:8,marginBottom:8,borderBottom:`1px solid ${C.border}33`}}>
                <span style={{color:C.muted,fontSize:12}}>{k}</span>
                <span style={{color:C.text,fontSize:12,fontWeight:600,textAlign:"left"}}>{v}</span>
              </div>
            ))}
          </div>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:14}}>
            <SecHead icon="🏥" label="الحالة الطبية" color={C.gold}/>
            {[["التشخيص",curPatient.condition],["الحالة",curPatient.status],["التاريخ المرضي",curPatient.history||"-"],["الحساسية",curPatient.allergies||"-"]].map(([k,v])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",paddingBottom:8,marginBottom:8,borderBottom:`1px solid ${C.border}33`}}>
                <span style={{color:C.muted,fontSize:12}}>{k}</span>
                <span style={{color:C.text,fontSize:12,fontWeight:600,textAlign:"left"}}>{v}</span>
              </div>
            ))}
          </div>
          {curPatient.emergencyContact&&<div style={{background:C.danger+"11",border:`1px solid ${C.danger}33`,borderRadius:12,padding:12}}>
            <SecHead icon="🆘" label="جهة الطوارئ" color={C.danger}/>
            <div style={{color:C.text,fontSize:13}}>{curPatient.emergencyContact}</div>
          </div>}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            {[["🔍",exams.length,"فحص"],[" 🗓",visits.length,"زيارة"],["💰",totalSpent.toLocaleString(),"ج.م"]].map(([ico,val,lbl],i)=>(
              <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 8px",textAlign:"center"}}>
                <div style={{fontSize:16,marginBottom:4}}>{ico}</div>
                <div style={{color:C.accent,fontSize:18,fontWeight:800}}>{val}</div>
                <div style={{color:C.muted,fontSize:10}}>{lbl}</div>
              </div>
            ))}
          </div>
        </div>}

        {/* VISITS TAB */}
        {tab==="visits"&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <span style={{color:C.text,fontWeight:700,fontSize:14}}>سجل الزيارات ({visits.length})</span>
            <Btn small onClick={()=>setModal("addVisit")}>+ زيارة جديدة</Btn>
          </div>
          {visits.length===0&&<div style={{color:C.muted,textAlign:"center",padding:40,fontSize:13}}>لا توجد زيارات مسجلة بعد</div>}
          {visits.map(v=>(
            <div key={v.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:14,marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div>
                  <div style={{color:C.accent,fontWeight:700,fontSize:13}}>{v.date}</div>
                  <div style={{color:C.muted,fontSize:11}}>{v.doctor} · {v.type}</div>
                </div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <Tag label={v.paid?"مدفوع":"غير مدفوع"} color={v.paid?C.success:C.danger}/>
                </div>
              </div>
              {v.complaint&&<div style={{background:C.bg,borderRadius:10,padding:10,marginBottom:8}}><div style={{color:C.muted,fontSize:10,marginBottom:3}}>الشكوى</div><div style={{color:C.text,fontSize:12}}>{v.complaint}</div></div>}
              {v.result&&<div style={{background:C.success+"11",border:`1px solid ${C.success}33`,borderRadius:10,padding:10,marginBottom:8}}><div style={{color:C.success,fontSize:10,marginBottom:3}}>نتيجة الزيارة</div><div style={{color:C.text,fontSize:12}}>{v.result}</div></div>}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <span style={{color:C.gold,fontWeight:700,fontSize:13}}>💰 {Number(v.cost||0).toLocaleString()} ج.م</span>
                  {v.nextVisit&&<span style={{color:C.teal,fontSize:11}}>📅 {v.nextVisit}</span>}
                </div>
                <div style={{display:"flex",gap:6}}>
                  <div onClick={()=>setModal({editVisit:v})} style={{background:C.accent+"22",borderRadius:8,padding:"5px 10px",color:C.accent,fontSize:11,cursor:"pointer"}}>✏</div>
                  <div onClick={()=>setDelTarget({type:"visit",id:v.id})} style={{background:C.danger+"22",borderRadius:8,padding:"5px 10px",color:C.danger,fontSize:11,cursor:"pointer"}}>🗑</div>
                </div>
              </div>
              {v.notes&&<div style={{color:C.muted,fontSize:11,marginTop:8,background:C.border,borderRadius:8,padding:"6px 10px"}}>{v.notes}</div>}
            </div>
          ))}
          {visits.length>0&&<div style={{background:`linear-gradient(135deg,${C.gold}22,${C.gold}11)`,border:`1px solid ${C.gold}44`,borderRadius:12,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{color:C.muted,fontSize:13}}>إجمالي المدفوع</span>
            <span style={{color:C.gold,fontWeight:800,fontSize:16}}>{totalSpent.toLocaleString()} ج.م</span>
          </div>}
        </div>}

        {/* EXAMS TAB */}
        {tab==="exams"&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <span style={{color:C.text,fontWeight:700,fontSize:14}}>شيت الفحص ({exams.length})</span>
            <Btn small onClick={()=>setModal("addExam")}>+ فحص جديد</Btn>
          </div>
          {exams.length===0&&<div style={{color:C.muted,textAlign:"center",padding:40,fontSize:13}}>لا توجد فحوصات مسجلة</div>}
          {exams.map(ex=>(
            <div key={ex.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:14,marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div><div style={{color:C.accent,fontWeight:700,fontSize:13}}>{ex.date}</div><div style={{color:C.muted,fontSize:11}}>{ex.doctor}</div></div>
                <div style={{display:"flex",gap:6}}>
                  <div onClick={()=>setModal({editExam:ex})} style={{background:C.accent+"22",borderRadius:8,padding:"5px 10px",color:C.accent,fontSize:11,cursor:"pointer"}}>✏</div>
                  <div onClick={()=>setDelTarget({type:"exam",id:ex.id})} style={{background:C.danger+"22",borderRadius:8,padding:"5px 10px",color:C.danger,fontSize:11,cursor:"pointer"}}>🗑</div>
                </div>
              </div>
              {ex.chiefComplaint&&<div style={{background:C.bg,borderRadius:10,padding:10,marginBottom:8}}><div style={{color:C.muted,fontSize:10,marginBottom:3}}>الشكوى</div><div style={{color:C.text,fontSize:12}}>{ex.chiefComplaint}</div></div>}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {[["حدة إبصار ي",ex.visualAcuityR||"-"],["حدة إبصار ش",ex.visualAcuityL||"-"],["ضغط العين ي",ex.iopR?(ex.iopR+" mmHg"):"-"],["ضغط العين ش",ex.iopL?(ex.iopL+" mmHg"):"-"]].map(([k,v])=>(
                  <div key={k} style={{background:C.bg,borderRadius:8,padding:"8px 10px"}}><div style={{color:C.muted,fontSize:10}}>{k}</div><div style={{color:C.teal,fontWeight:700,fontSize:14}}>{v}</div></div>
                ))}
              </div>
              {ex.diagnosis&&<div style={{background:C.gold+"11",border:`1px solid ${C.gold}33`,borderRadius:10,padding:10,marginTop:8}}><div style={{color:C.gold,fontSize:11,fontWeight:700,marginBottom:3}}>التشخيص</div><div style={{color:C.text,fontSize:12}}>{ex.diagnosis}</div></div>}
            </div>
          ))}
        </div>}

        {/* TREATMENT TAB */}
        {tab==="treatment"&&<div>
          <div style={{color:C.text,fontWeight:700,fontSize:14,marginBottom:14}}>خطة العلاج</div>
          {exams.filter(e=>e.treatmentPlan).length===0&&<div style={{color:C.muted,textAlign:"center",padding:40,fontSize:13}}>أضف فحصاً يتضمن خطة علاج</div>}
          {exams.filter(e=>e.treatmentPlan).map(ex=>(
            <div key={ex.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:14,marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
                <span style={{color:C.accent,fontWeight:700,fontSize:13}}>{ex.date}</span>
                <span style={{color:C.muted,fontSize:11}}>{ex.doctor}</span>
              </div>
              <div style={{background:C.success+"11",border:`1px solid ${C.success}33`,borderRadius:12,padding:12,marginBottom:10}}>
                <SecHead icon="💊" label="خطة العلاج" color={C.success}/>
                <div style={{color:C.text,fontSize:13,lineHeight:1.8,whiteSpace:"pre-wrap"}}>{ex.treatmentPlan}</div>
              </div>
              {ex.followUp&&<div style={{background:C.teal+"11",border:`1px solid ${C.teal}33`,borderRadius:10,padding:10,display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <span style={{color:C.muted,fontSize:12}}>موعد المتابعة</span>
                <span style={{color:C.teal,fontWeight:700,fontSize:13}}>📅 {ex.followUp}</span>
              </div>}
              {ex.anteriorSegment&&<div style={{display:"flex",flexDirection:"column",gap:6,marginTop:8}}>
                <div style={{background:C.bg,borderRadius:10,padding:10}}><div style={{color:C.muted,fontSize:10,marginBottom:3}}>القطعة الأمامية</div><div style={{color:C.text,fontSize:12}}>{ex.anteriorSegment}</div></div>
                {ex.posteriorSegment&&<div style={{background:C.bg,borderRadius:10,padding:10}}><div style={{color:C.muted,fontSize:10,marginBottom:3}}>القطعة الخلفية</div><div style={{color:C.text,fontSize:12}}>{ex.posteriorSegment}</div></div>}
              </div>}
              {ex.notes&&<div style={{background:C.border,borderRadius:10,padding:10,marginTop:8}}><div style={{color:C.muted,fontSize:10,marginBottom:3}}>ملاحظات</div><div style={{color:C.text,fontSize:12}}>{ex.notes}</div></div>}
            </div>
          ))}
        </div>}

        {/* RX TAB */}
        {tab==="rx"&&<div>
          <div style={{color:C.text,fontWeight:700,fontSize:14,marginBottom:14}}>الوصفات ({rxList.length})</div>
          {rxList.length===0&&<div style={{color:C.muted,textAlign:"center",padding:40,fontSize:13}}>لا توجد وصفات لهذا المريض</div>}
          {rxList.map(rx=>(
            <div key={rx.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:14,marginBottom:12}}>
              <div style={{color:C.accent,fontWeight:700,fontSize:13,marginBottom:10}}>{rx.date} · {rx.eye}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                {[["SPH يمنى",rx.sphR],["CYL يمنى",rx.cylR],["SPH يسرى",rx.sphL],["CYL يسرى",rx.cylL]].map(([k,v])=>(
                  <div key={k} style={{background:C.bg,borderRadius:8,padding:"6px 10px"}}><div style={{color:C.muted,fontSize:10}}>{k}</div><div style={{color:C.text,fontWeight:600,fontSize:13}}>{v||"-"}</div></div>
                ))}
              </div>
              {rx.medicines&&<div style={{background:C.gold+"11",border:`1px solid ${C.gold}33`,borderRadius:10,padding:10,marginBottom:8}}><div style={{color:C.gold,fontSize:11,fontWeight:700,marginBottom:3}}>الأدوية</div><div style={{color:C.text,fontSize:12}}>{rx.medicines}</div></div>}
              <div onClick={()=>setModal({printRx:rx})} style={{background:C.purple+"22",borderRadius:8,padding:"7px 0",color:C.purple,fontSize:11,fontWeight:700,cursor:"pointer",textAlign:"center",marginTop:4}}>🖨️ طباعة الوصفة / كشف النظارة</div>
            </div>
          ))}
        </div>}

        {tab==="images"&&<div>
          <ImageGallery
            images={curPatient.images||[]}
            onAdd={img=>{
              const updated={...curPatient,images:[...(curPatient.images||[]),img]};
              onUpdatePatient(updated);
            }}
            onDelete={i=>{
              const imgs=[...(curPatient.images||[])];
              imgs.splice(i,1);
              onUpdatePatient({...curPatient,images:imgs});
            }}
            label="صور الأشعات والفحوصات"
          />
        </div>}
      </div>

      {/* Modals */}
      {modal==="editPatient"&&<Modal title="تعديل الملف الطبي" onClose={()=>setModal(null)}><PatientEditForm patient={curPatient} onSave={handlePatientSave} onClose={()=>setModal(null)}/></Modal>}
      {modal==="addVisit"&&<Modal title="زيارة جديدة" onClose={()=>setModal(null)}><VisitForm doctorNames={doctorNames} prices={prices} patientId={curPatient.id} onSave={v=>{onSaveVisit(v);setModal(null);}} onClose={()=>setModal(null)}/></Modal>}
      {modal?.editVisit&&<Modal title="تعديل الزيارة" onClose={()=>setModal(null)}><VisitForm doctorNames={doctorNames} prices={prices} initial={modal.editVisit} patientId={curPatient.id} onSave={v=>{onSaveVisit(v);setModal(null);}} onClose={()=>setModal(null)}/></Modal>}
      {modal==="addExam"&&<Modal title="فحص جديد" onClose={()=>setModal(null)}><ExamForm doctorNames={doctorNames} patientId={curPatient.id} onSave={e=>{onSaveExam(e);setModal(null);}} onClose={()=>setModal(null)}/></Modal>}
      {modal?.editExam&&<Modal title="تعديل الفحص" onClose={()=>setModal(null)}><ExamForm doctorNames={doctorNames} initial={modal.editExam} patientId={curPatient.id} onSave={e=>{onSaveExam(e);setModal(null);}} onClose={()=>setModal(null)}/></Modal>}
      {modal?.printRx&&<PrintModal rx={modal.printRx} patient={curPatient} primaryDoctor={primaryDoctor} clinic={{}} onClose={()=>setModal(null)}/>}
      {delTarget&&<Confirm msg={`هل تريد حذف هذا ${delTarget.type==="visit"?"السجل":"الفحص"} نهائياً؟`} onOk={()=>{delTarget.type==="visit"?onDelVisit(delTarget.id):onDelExam(delTarget.id);setDelTarget(null);}} onNo={()=>setDelTarget(null)}/>}
    </div>
  );
}

// ── Patient Form ──────────────────────────────────────────────
function PatientForm({initial,onSave,onClose}) {
  const blank={name:"",age:"",phone:"",gender:"ذكر",bloodType:"O+",address:"",lastVisit:new Date().toISOString().slice(0,10),condition:"",status:"مكتمل",history:"",allergies:"",occupation:"",emergencyContact:""};
  const [f,setF]=useState(initial?{...initial}:blank);
  const s=k=>e=>setF(v=>({...v,[k]:e.target.value}));
  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <Field label="الاسم الكامل"><input style={inp()} value={f.name} onChange={s("name")} placeholder="اسم المريض"/></Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Field label="العمر"><input style={inp()} type="number" value={f.age} onChange={s("age")} placeholder="سنة"/></Field>
        <Field label="الجنس"><select style={inp()} value={f.gender} onChange={s("gender")}>{["ذكر","أنثى"].map(g=><option key={g}>{g}</option>)}</select></Field>
      </div>

function Patients({patients,setPatients,exams,setExams,prescriptions,visits,setVisits,doctorNames=[],primaryDoctor,prices=[],clinic}) {
  const [search,setSearch]=useState("");
  const [modal,setModal]=useState(null);
  const [openFile,setOpenFile]=useState(null);
  const filtered=patients.filter(p=>p.name.includes(search)||p.condition.includes(search)||(p.patientCode||"").includes(search));

  const updP=f=>setPatients(patients.map(p=>p.id===f.id?f:p));
  const addP=f=>setPatients([...patients,{...f,id:Date.now(),patientCode:genCode(patients)}]);
  const delP=id=>setPatients(patients.filter(p=>p.id!==id));
  const saveExam=f=>{const ex=exams.find(e=>e.id===f.id);setExams(ex?exams.map(e=>e.id===f.id?f:e):[...exams,f]);};
  const delExam=id=>setExams(exams.filter(e=>e.id!==id));
  const saveVisit=f=>{const ex=visits.find(v=>v.id===f.id);setVisits(ex?visits.map(v=>v.id===f.id?f:v):[...visits,f]);};
  const delVisit=id=>setVisits(visits.filter(v=>v.id!==id));

  if(openFile){
    const p=patients.find(p=>p.id===openFile);
    if(!p){setOpenFile(null);return null;}
    return <PatientFile patient={p} allExams={exams} allRx={prescriptions} allVisits={visits} onClose={()=>setOpenFile(null)} onUpdatePatient={f=>{updP(f);}} onSaveExam={saveExam} onDelExam={delExam} onSaveVisit={saveVisit} onDelVisit={delVisit} doctorNames={doctorNames} primaryDoctor={primaryDoctor} prices={prices} clinic={clinic}/>;
  }

  return (
    <div style={{padding:"16px 16px 90px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <span style={{color:C.text,fontWeight:700,fontSize:16}}>المرضى ({patients.length})</span>
        <Btn small onClick={()=>setModal("add")}>+ مريض جديد</Btn>
      </div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"10px 14px",marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
        <span style={{color:C.accent}}>🔍</span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="ابحث بالاسم أو التشخيص أو رقم الملف..." style={{background:"none",border:"none",outline:"none",color:C.text,fontSize:13,flex:1,direction:"rtl",fontFamily:"inherit"}}/>
      </div>
      {filtered.map(p=>(
        <div key={p.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:14,marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
            <div style={{width:44,height:44,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent}33,${C.teal}33)`,border:`2px solid ${C.accent}44`,display:"flex",alignItems:"center",justifyContent:"center",color:C.accent,fontWeight:800,fontSize:16}}>{p.name[0]}</div>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{color:C.text,fontWeight:700,fontSize:14}}>{p.name}</div>
                <span style={{background:C.accent+"22",color:C.accent,borderRadius:6,padding:"1px 7px",fontSize:10,fontWeight:700,letterSpacing:1}}>{p.patientCode||"—"}</span>
              </div>
              <div style={{color:C.muted,fontSize:11}}>{p.age} سنة · {p.condition}</div>
            </div>
            <Tag label={p.status} color={SC[p.status]||C.muted}/>
          </div>
          <div style={{display:"flex",gap:6}}>
            <div onClick={()=>setOpenFile(p.id)} style={{background:C.teal+"22",borderRadius:8,padding:"7px 0",color:C.teal,fontSize:11,fontWeight:700,cursor:"pointer",flex:1,textAlign:"center"}}>📂 الملف الكامل</div>

// ── Print Functions ───────────────────────────────────────────
function printDoc(html) {
  // Create fullscreen overlay with iframe for printing - works in APK WebView
  const overlay = document.createElement("div");
  overlay.id = "print-overlay";
  overlay.style.cssText = "position:fixed;inset:0;z-index:9999;background:#fff;display:flex;flex-direction:column;";
  
  const toolbar = document.createElement("div");
  toolbar.style.cssText = "background:#0A0F1E;padding:12px 16px;display:flex;gap:10px;align-items:center;flex-shrink:0;";
  toolbar.innerHTML = `
    <button onclick="document.getElementById('print-overlay').remove();" 
      style="background:#FF4D6D22;border:1px solid #FF4D6D;color:#FF4D6D;padding:8px 16px;border-radius:8px;font-size:14px;cursor:pointer;">
      ✕ إغلاق
    </button>
    <button onclick="document.getElementById('print-frame').contentWindow.print();" 
      style="background:linear-gradient(135deg,#00C2FF,#00E5CC);border:none;color:#0A0F1E;padding:8px 20px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;flex:1;">
      🖨️ طباعة / حفظ PDF
    </button>
  `;
  
  const iframe = document.createElement("iframe");
  iframe.id = "print-frame";
  iframe.style.cssText = "flex:1;border:none;width:100%;";
  
  overlay.appendChild(toolbar);
  overlay.appendChild(iframe);
  document.body.appendChild(overlay);
  
  iframe.contentDocument.open();
  iframe.contentDocument.write(html);
  iframe.contentDocument.close();
}

// ── Medicines Step ────────────────────────────────────────────
const COMMON_DRUGS = [
  "قطرة Timolol 0.5%","قطرة Tobramycin","قطرة Prednisolone","قطرة Moxifloxacin",
  "قطرة Dorzolamide","قطرة Latanoprost","قطرة Ketorolac","قطرة Cyclopentolate",
  "قطرة Tropicamide","قطرة Atropine","مرهم Tetracycline","كبسولة Vitamins A&E",
];
const DOSE_OPTIONS = [
  "مرة يومياً","مرتين يومياً","3 مرات يومياً","4 مرات يومياً",
  "كل 4 ساعات","كل 6 ساعات","عند اللزوم","قبل النوم",
];

function MedicinesStep({medicines, onChange}) {
  // Parse stored medicines string into array of {name, dose}
  const parse = () => {
    if(!medicines) return [];
    return medicines.split("\n").filter(Boolean).map(line=>{
      const dash = line.indexOf(" - ");
      if(dash>-1) return {name:line.slice(0,dash).trim(), dose:line.slice(dash+3).trim()};
      return {name:line.trim(), dose:""};
    });
  };
  const [meds, setMeds] = useState(parse);
  const [showSugg, setShowSugg] = useState(null); // index showing suggestions

  const save = (list) => {
    setMeds(list);
    onChange(list.map(m=>m.name+(m.dose?" - "+m.dose:"")).join("\n"));
  };
  const add = () => save([...meds, {name:"",dose:""}]);
  const update = (i,k,v) => { const n=[...meds]; n[i]={...n[i],[k]:v}; save(n); };
  const remove = (i) => save(meds.filter((_,idx)=>idx!==i));

  return (
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
        <span style={{color:C.text,fontWeight:700,fontSize:13}}>💊 الأدوية الموصوفة</span>
        <Btn small onClick={add}>+ إضافة دواء</Btn>
      </div>
      {meds.length===0&&<div style={{color:C.muted,fontSize:12,textAlign:"center",padding:20,background:C.card,borderRadius:10}}>اضغط "+ إضافة دواء" لإضافة الأدوية</div>}
      {meds.map((m,i)=>(
        <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:12}}>
          <div style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
            <div style={{width:24,height:24,borderRadius:6,background:C.gold,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:C.bg,flexShrink:0}}>{i+1}</div>
            <div style={{flex:1,position:"relative"}}>
              <input
                style={inp({paddingLeft:10})}
                value={m.name}
                onChange={e=>update(i,"name",e.target.value)}
                onFocus={()=>setShowSugg(i)}
                onBlur={()=>setTimeout(()=>setShowSugg(null),200)}
                placeholder="اسم الدواء..."
              />
              {showSugg===i&&(
                <div style={{position:"absolute",top:"100%",right:0,left:0,background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,zIndex:100,maxHeight:160,overflowY:"auto",marginTop:4}}>
                  {COMMON_DRUGS.filter(d=>d.toLowerCase().includes(m.name.toLowerCase())||m.name==="").map(d=>(
                    <div key={d} onMouseDown={()=>update(i,"name",d)} style={{padding:"8px 12px",color:C.text,fontSize:12,cursor:"pointer",borderBottom:`1px solid ${C.border}33`}}>{d}</div>
                  ))}
                </div>
              )}
            </div>
            <div onClick={()=>remove(i)} style={{color:C.danger,fontSize:20,cursor:"pointer",flexShrink:0,paddingRight:4}}>×</div>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {DOSE_OPTIONS.map(d=>(
              <div key={d} onClick={()=>update(i,"dose",d)} style={{background:m.dose===d?C.teal+"22":C.bg,border:`1px solid ${m.dose===d?C.teal:C.border}`,borderRadius:8,padding:"4px 10px",fontSize:10,color:m.dose===d?C.teal:C.muted,cursor:"pointer",fontWeight:m.dose===d?700:400}}>
                {d}
              </div>
            ))}
          </div>
          {m.dose&&<div style={{color:C.muted,fontSize:11,marginTop:6}}>📋 {m.name} - {m.dose}</div>}
        </div>
      ))}
    </div>
  );
}

// ── Rx Form ───────────────────────────────────────────────────
function RxForm({initial,patients,onSave,onClose,doctorNames=["د. عبدالستار","د. سلمى","د. ليلى"]}) {
  const blank={patient:"",patientId:null,eye:"كلتا العينين",sphR:"",cylR:"",axisR:"",sphL:"",cylL:"",axisL:"",add:"",medicines:"",notes:"",date:new Date().toISOString().slice(0,10)};
  const [f,setF]=useState(initial?{...initial}:blank);
  const [step,setStep]=useState(0);
  const [errors,setErrors]=useState({});
  const s=k=>e=>setF(v=>({...v,[k]:e.target.value}));

  const needR = f.eye==="العين اليمنى"||f.eye==="كلتا العينين";
  const needL = f.eye==="العين اليسرى"||f.eye==="كلتا العينين";

  const validate=()=>{
    const e={};
    if(needR && f.cylR && !f.axisR) e.axisR="مطلوب عند وجود CYL";
    if(needL && f.cylL && !f.axisL) e.axisL="مطلوب عند وجود CYL";
    setErrors(e);
    return Object.keys(e).length===0;
  };

  const handleNext=()=>{
    if(step===1&&!validate()) return;
    setStep(p=>p+1);
  };

  const handleSave=()=>{
    if(!f.patient) return;
    if(!validate()) { setStep(1); return; }
    onSave(f);
  };

  return (
    <div>
      <div style={{display:"flex",marginBottom:18,background:C.card,borderRadius:12,padding:4}}>
        {["المريض","قياسات النظر","الأدوية"].map((st,i)=><div key={i} onClick={()=>setStep(i)} style={{flex:1,textAlign:"center",padding:"8px 4px",background:step===i?`linear-gradient(135deg,${C.accent},${C.teal})`:"transparent",borderRadius:9,cursor:"pointer",color:step===i?C.bg:C.muted,fontSize:11,fontWeight:700}}>{st}</div>)}
      </div>
      {step===0&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
        <Field label="المريض"><select style={inp()} value={f.patientId||""} onChange={e=>{const p=patients.find(p=>p.id===Number(e.target.value));setF(v=>({...v,patientId:Number(e.target.value),patient:p?.name||""}));}}><option value="">اختر مريض</option>{patients.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></Field>
        <Field label="تاريخ الوصفة"><input style={inp()} type="date" value={f.date} onChange={s("date")}/></Field>
        <Field label="العين المعالجة"><div style={{display:"flex",gap:8}}>{["العين اليمنى","العين اليسرى","كلتا العينين"].map(opt=><div key={opt} onClick={()=>setF(v=>({...v,eye:opt}))} style={{flex:1,textAlign:"center",padding:"9px 4px",background:f.eye===opt?C.accent+"22":C.card,border:`1px solid ${f.eye===opt?C.accent:C.border}`,borderRadius:10,cursor:"pointer",color:f.eye===opt?C.accent:C.muted,fontSize:10,fontWeight:600}}>{opt}</div>)}</div></Field>
        <Field label="ملاحظات"><textarea style={{...inp(),resize:"none"}} rows={2} value={f.notes} onChange={s("notes")} placeholder="ملاحظات..."/></Field>
      </div>}
      {step===1&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
        {[["اليمنى","R",needR],["اليسرى","L",needL]].map(([lbl,side,needed])=>(
          <div key={side} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:14,opacity:needed?1:0.4}}>
            <div style={{color:C.accent,fontWeight:700,fontSize:13,marginBottom:12}}>👁 العين {lbl} {!needed&&<span style={{color:C.muted,fontSize:10,fontWeight:400}}>(غير مختارة)</span>}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {[["sph"+side,"SPH",false],["cyl"+side,"CYL",false],["axis"+side,"AXIS ⚠",true]].map(([key,lab,required])=>(
                <div key={key}>
                  <label style={{color:required&&errors[key]?C.danger:C.muted,fontSize:11,display:"block",marginBottom:5,fontWeight:required?"700":"400"}}>
                    {lab}{required&&<span style={{color:C.danger}}> *</span>}
                  </label>
                  <input
                    disabled={!needed}
                    style={{...inp({textAlign:"center",border:`1px solid ${errors[key]?C.danger:C.border}`,background:errors[key]?C.danger+"11":C.bg}),}}
                    placeholder={required?"إلزامي":"0.00"}
                    value={f[key]}
                    onChange={e=>{s(key)(e);setErrors(v=>({...v,[key]:undefined}));}}
                  />
                  {errors[key]&&<div style={{color:C.danger,fontSize:10,marginTop:3}}>⚠ AXIS مطلوب عند إدخال CYL</div>}
                </div>
              ))}
            </div>
          </div>
        ))}
        <Field label="ADD (الإضافة)"><input style={inp({textAlign:"center"})} placeholder="+0.00" value={f.add} onChange={s("add")}/></Field>
        <Field label="I.P.D (mm)"><input style={inp({textAlign:"center"})} placeholder="62" value={f.ipd||""} onChange={s("ipd")}/></Field>
        {(errors.axisR||errors.axisL)&&(
          <div style={{background:C.danger+"11",border:`1px solid ${C.danger}44`,borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:16}}>⚠️</span>
            <span style={{color:C.danger,fontSize:12,fontWeight:600}}>عند إدخال CYL يجب إدخال AXIS للعين {errors.axisR&&errors.axisL?"كلتيهما":errors.axisR?"اليمنى":"اليسرى"}</span>
          </div>
        )}
      </div>}
      {step===2&&<MedicinesStep medicines={f.medicines} onChange={val=>setF(v=>({...v,medicines:val}))}/>}
      <div style={{display:"flex",gap:10,marginTop:20}}>
        {step>0&&<Btn outline onClick={()=>setStep(p=>p-1)}>السابق</Btn>}
        {step<2?<Btn full onClick={handleNext}>التالي →</Btn>:<><Btn outline full onClick={onClose}>إلغاء</Btn><Btn full onClick={handleSave}>✓ حفظ</Btn></>}
      </div>
    </div>
  );
}

  {id:"octa",   name:"OCT Angio",    name_ar:"أنجيوغرافيا OCT",              cat:"شبكية"},
  {id:"vf",     name:"Visual Field", name_ar:"مجال الإبصار",                 cat:"جلوكوما"},
  {id:"penta",  name:"Pentacam",     name_ar:"خريطة القرنية",                cat:"قرنية"},
  {id:"topo",   name:"Topography",   name_ar:"طبوغرافيا القرنية",            cat:"قرنية"},
  {id:"pachy",  name:"Pachymetry",   name_ar:"قياس سماكة القرنية",           cat:"قرنية"},
  {id:"bio",    name:"Biometry",     name_ar:"قياسات ما قبل الجراحة",        cat:"جراحة"},
  {id:"echo",   name:"B-Scan",       name_ar:"سونار العين",                  cat:"أخرى"},
  {id:"erg",    name:"ERG",          name_ar:"كهربية الشبكية",               cat:"أخرى"},
  {id:"ep",     name:"VEP",          name_ar:"استجابة القشرة البصرية",       cat:"أخرى"},
];

const CAT_COLORS = {
  "شبكية":  C.accent,
  "جلوكوما":C.teal,
  "قرنية":  C.gold,
  "جراحة":  C.purple,
  "أخرى":   C.muted,

};

  const docName = primary?.name || "د. عبدالستار صقر";
  const cl = clinic||{};

  const phone   = cl.phone   || "دمنهور: 0453333313 | الرحمانية: 01111480137";
  const date = new Date().toLocaleDateString("ar-EG",{year:"numeric",month:"long",day:"numeric"});
  const EYE_AR = { OU:"كلتا العينين", OD:"العين اليمنى", OS:"العين اليسرى" };
  const EYE_EN = { OU:"OU", OD:"OD", OS:"OS" };

    grouped[t.cat].push({...t, eye: selected[id]});

  const p = patient||{};
  const totalCount = Object.keys(selected).length;
  return `<!DOCTYPE html><html dir="rtl" lang="ar">

  .patient-row{display:flex;gap:20px;margin-bottom:14px;padding:10px 14px;background:#f0f9ff;border-radius:8px;flex-wrap:wrap;}
  .pinfo{font-size:11px;color:#555;}
  .pinfo span{font-weight:700;color:#111;margin-right:4px;}
  .section{margin-bottom:12px;}

  .tests-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .test-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1.5px solid #d0eaff;border-radius:8px;background:#f8fbff;}
  .checkbox{width:18px;height:18px;border:2px solid #00C2FF;border-radius:4px;background:#00C2FF;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .check{color:#fff;font-size:12px;font-weight:800;}
  .test-name{font-size:13px;font-weight:700;color:#111;}
  .test-ar{font-size:10px;color:#555;margin-top:1px;}
  .eye-badge{margin-right:auto;background:#e8f4ff;border:1px solid #b0d8ff;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;color:#0066aa;direction:ltr;}
  .notes-box{background:#fffbf0;border:1.5px solid #FFB830;border-radius:8px;padding:10px 14px;margin-top:14px;}

  .footer{margin-top:16px;display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid #eee;padding-top:12px;}
  .sig{text-align:center;}

  .total-badge{background:#00C2FF22;border:1px solid #00C2FF44;border-radius:10px;padding:6px 14px;font-size:12px;color:#00C2FF;font-weight:700;}
  @media print{.page{padding:8mm;position:relative;overflow:hidden;}}
</style></head>
<body><div class="page"><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-30deg);font-size:80px;font-weight:900;color:#00C2FF;opacity:0.05;pointer-events:none;z-index:0;letter-spacing:8px;font-family:Georgia,serif;white-space:nowrap;">I App</div>
  <div class="header">
    <div>
      <div class="clinic">👁 عيادة ${docName}</div>
      <div class="sub">استشاري طب وجراحة العيون والليزر</div>

      ${address?`<div>📍 ${address}</div>`:""}
      ${phone?`<div>📞 ${phone}</div>`:""}
