}

function Radiology({patients, customTests, setCustomTests, primary, clinic}) {
  const allTests = [...DEFAULT_TESTS, ...customTests.map(t=>({...t,cat:"مخصص"}))];
  const cats = [...new Set(allTests.map(t=>t.cat))];

  const [selectedPatient, setSelectedPatient] = useState(null);
  const [patientSearch, setPatientSearch]     = useState("");
  const [showPatientList, setShowPatientList] = useState(false);
  // selected: { [testId]: "OD" | "OS" | "OU" }
  const [selected, setSelected]   = useState({});
  const [notes, setNotes]         = useState("");
  const [addModal, setAddModal]   = useState(false);
  const [newTest, setNewTest]     = useState({name:"",name_ar:""});
  const [printed, setPrinted]     = useState(false);
  const [filterCat, setFilterCat] = useState("الكل");
  const [search, setSearch]       = useState("");

  const selectedIds = Object.keys(selected);
  const isSelected  = id => id in selected;
  const getEye      = id => selected[id] || "B";

  // Toggle: if not selected → add with "B". If selected → remove.
  const toggle = id => setSelected(s => {
    if(id in s){ const n={...s}; delete n[id]; return n; }
    return {...s, [id]:"B"};
  });

  // Cycle eye: B → R → L → B
  const cycleEye = (e, id) => {
    e.stopPropagation();
    setSelected(s => {
      if(!(id in s)) return s;
      const next = EYE_CYCLE[s[id]] || "OU";
      return {...s, [id]: next};
    });
  };

  const selectAll = cat => {
    const ids = allTests.filter(t=>t.cat===cat).map(t=>t.id);
    const allIn = ids.every(id=>isSelected(id));
    setSelected(s => {
      const n = {...s};
      if(allIn){ ids.forEach(id=>delete n[id]); }
      else { ids.forEach(id=>{ if(!(id in n)) n[id]="OU"; }); }
      return n;
    });
  };

  const addCustom = () => {
    if(!newTest.name) return;
    const t = {id:"custom_"+Date.now(), name:newTest.name, name_ar:newTest.name_ar||newTest.name};
    setCustomTests([...customTests, t]);
    setSelected(s=>({...s,[t.id]:"OU"}));
    setNewTest({name:"",name_ar:""});
    setAddModal(false);
  };

  const delCustom = id => {
    setCustomTests(customTests.filter(t=>t.id!==id));
    setSelected(s=>{ const n={...s}; delete n[id]; return n; });
  };

  const EYE_LABEL = { OU:"كلتا العينين", OD:"العين اليمنى", OS:"العين اليسرى" };
  const EYE_SHORT = { OU:"OU", OD:"OD", OS:"OS" };
  const EYE_COLOR = { OU:C.teal, OD:C.accent, OS:C.gold };
  const EYE_CYCLE = { OU:"OD", OD:"OS", OS:"OU" };

  const doPrint = () => {
    if(selectedIds.length===0) return;
    const html = getRadiologyHTML(selected, selectedPatient, notes, primary, allTests, clinic);
    const win = window.open("","_blank");
    if(!win){alert("يرجى السماح بالنوافذ المنبثقة");return;}
    win.document.write(html);
    win.document.close();
    win.focus();
    setTimeout(()=>win.print(),400);
    setPrinted(true);
    setTimeout(()=>setPrinted(false),3000);
  };

  const visibleTests = allTests.filter(t=>
    (filterCat==="الكل"||t.cat===filterCat) &&
    (t.name.toLowerCase().includes(search.toLowerCase())||t.name_ar.includes(search))
  );

  return (
    <div style={{padding:"16px 16px 90px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <div style={{color:C.text,fontWeight:700,fontSize:16}}>🔭 الفحوصات والإشعاعات</div>
          <div style={{color:C.muted,fontSize:11,marginTop:2}}>{selectedIds.length} فحص محدد</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <Btn small color={C.purple} onClick={()=>setAddModal(true)}>+ إضافة</Btn>
          <Btn small color={C.success} onClick={doPrint}>🖨️ طباعة</Btn>
        </div>
      </div>

      {/* Patient search */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:12,marginBottom:14,position:"relative"}}>
        <div style={{color:C.muted,fontSize:11,marginBottom:6}}>المريض (اختياري للطباعة)</div>
        {selectedPatient ? (
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{flex:1,background:C.accent+"22",border:`1px solid ${C.accent}`,borderRadius:8,padding:"8px 12px"}}>
              <div style={{color:C.text,fontWeight:700,fontSize:13}}>{selectedPatient.name}</div>
              <div style={{color:C.muted,fontSize:10}}>{selectedPatient.patientCode} · {selectedPatient.phone}</div>
            </div>
            <div onClick={()=>{setSelectedPatient(null);setPatientSearch("");}} style={{color:C.danger,fontSize:20,cursor:"pointer",padding:"0 6px"}}>×</div>
          </div>
        ) : (
          <div style={{position:"relative"}}>
            <input
              value={patientSearch}
              onChange={e=>{setPatientSearch(e.target.value);setShowPatientList(true);}}
              onFocus={()=>setShowPatientList(true)}
              onBlur={()=>setTimeout(()=>setShowPatientList(false),200)}
              placeholder="ابحث بالاسم أو رقم الملف..."
              style={{...inp(),paddingRight:36}}
            />
            <span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",color:C.accent,fontSize:14}}>🔍</span>
            {showPatientList&&(
              <div style={{position:"absolute",top:"100%",right:0,left:0,background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,zIndex:200,maxHeight:180,overflowY:"auto",marginTop:4}}>
                {patients.filter(p=>
                  !patientSearch ||
                  p.name.includes(patientSearch) ||
                  (p.patientCode||"").includes(patientSearch) ||
                  (p.phone||"").includes(patientSearch)
                ).slice(0,8).map(p=>(
                  <div key={p.id} onMouseDown={()=>{setSelectedPatient(p);setPatientSearch("");setShowPatientList(false);}} style={{padding:"10px 14px",borderBottom:`1px solid ${C.border}33`,cursor:"pointer"}}>
                    <div style={{color:C.text,fontSize:13,fontWeight:600}}>{p.name}</div>
                    <div style={{color:C.muted,fontSize:10}}>{p.patientCode} · {p.phone}</div>
                  </div>
                ))}
                {patients.filter(p=>!patientSearch||p.name.includes(patientSearch)||(p.patientCode||"").includes(patientSearch)).length===0&&(
                  <div style={{color:C.muted,fontSize:12,padding:"10px 14px",textAlign:"center"}}>لا توجد نتائج</div>
                )}
              </div>
            )}
          </div>
        )}
      </div>

      {/* Eye legend */}
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {[["OU",C.teal],["OD",C.accent],["OS",C.gold]].map(([k,col])=>(
          <div key={k} style={{display:"flex",alignItems:"center",gap:5,background:col+"15",border:`1px solid ${col}44`,borderRadius:8,padding:"4px 10px"}}>
            <div style={{width:22,height:18,borderRadius:5,background:col,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:"#fff",letterSpacing:-0.5}}>{k}</div>
            
          </div>
        ))}
      </div>

      {/* Search */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"8px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
        <span style={{color:C.accent}}>🔍</span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="ابحث عن فحص..." style={{background:"none",border:"none",outline:"none",color:C.text,fontSize:13,flex:1,direction:"rtl",fontFamily:"inherit"}}/>
      </div>

      {/* Cat filter */}
      <div style={{display:"flex",gap:8,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
        {["الكل",...cats].map(cat=>(
          <button key={cat} onClick={()=>setFilterCat(cat)} style={{background:filterCat===cat?`linear-gradient(135deg,${CAT_COLORS[cat]||C.accent},${C.teal})`:C.card,border:`1px solid ${filterCat===cat?"transparent":C.border}`,borderRadius:20,padding:"5px 14px",color:filterCat===cat?C.bg:C.muted,fontSize:11,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>{cat}</button>
        ))}
      </div>

      {/* Tests grouped */}
      {(filterCat==="الكل"?cats:[filterCat]).map(cat=>{
        const testsInCat = visibleTests.filter(t=>t.cat===cat);
        if(testsInCat.length===0) return null;
        const catColor = CAT_COLORS[cat]||C.accent;
        const allCatSel = testsInCat.every(t=>isSelected(t.id));
        return (
          <div key={cat} style={{marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:catColor}}/>
                <span style={{color:catColor,fontWeight:700,fontSize:13}}>{cat}</span>
                <span style={{color:C.muted,fontSize:11}}>({testsInCat.filter(t=>isSelected(t.id)).length}/{testsInCat.length})</span>
              </div>
              <div onClick={()=>selectAll(cat)} style={{color:catColor,fontSize:11,cursor:"pointer",background:catColor+"22",borderRadius:8,padding:"3px 10px",fontWeight:600}}>
                {allCatSel?"إلغاء الكل":"تحديد الكل"}
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {testsInCat.map(t=>{
                const sel = isSelected(t.id);
                const eye = getEye(t.id);
                const eyeCol = EYE_COLOR[eye];
                return (
                  <div key={t.id} style={{background:sel?catColor+"15":C.card,border:`2px solid ${sel?catColor:C.border}`,borderRadius:14,padding:"12px 14px",display:"flex",alignItems:"center",gap:12,transition:"all 0.15s"}}>
                    {/* Checkbox */}
                    <div onClick={()=>toggle(t.id)} style={{width:26,height:26,borderRadius:8,background:sel?catColor:"transparent",border:`2px solid ${sel?catColor:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:"pointer",transition:"all 0.15s"}}>
                      {sel&&<span style={{color:C.bg,fontSize:14,fontWeight:800}}>✓</span>}
                    </div>
                    {/* Name */}
                    <div style={{flex:1,cursor:"pointer"}} onClick={()=>toggle(t.id)}>
                      <div style={{color:C.text,fontWeight:700,fontSize:14}}>{t.name}</div>
                      <div style={{color:C.muted,fontSize:11,marginTop:2}}>{t.name_ar}</div>
                    </div>
                    {/* Eye selector — only show when selected */}
                    {sel&&(
                      <div onClick={e=>cycleEye(e,t.id)} style={{display:"flex",alignItems:"center",gap:5,background:EYE_COLOR[eye]+"22",border:`1.5px solid ${EYE_COLOR[eye]}`,borderRadius:10,padding:"5px 10px",cursor:"pointer",flexShrink:0}}>
                        <div style={{background:EYE_COLOR[eye],color:"#fff",borderRadius:5,padding:"1px 6px",fontSize:10,fontWeight:800,letterSpacing:0.5}}>{EYE_SHORT[eye]||eye}</div>
                        <span style={{color:EYE_COLOR[eye],fontSize:10,opacity:0.7}}>↻</span>
                      </div>
                    )}
                    {t.cat==="مخصص"&&<div onClick={e=>{e.stopPropagation();delCustom(t.id);}} style={{color:C.danger,fontSize:18,cursor:"pointer",padding:"2px 6px",flexShrink:0}}>×</div>}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}

      {/* Notes */}
      <div style={{marginTop:4}}>
        <div style={{color:C.muted,fontSize:11,marginBottom:6}}>ملاحظات للطلب</div>
        <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={3} placeholder="تعليمات خاصة، صيام، ..." style={{...inp(),resize:"none"}}/>
      </div>

      {/* Bottom summary */}
      {selectedIds.length>0&&(
        <div style={{position:"fixed",bottom:70,left:0,right:0,maxWidth:480,margin:"0 auto",background:C.surface,borderTop:`1px solid ${C.border}`,padding:"10px 16px",zIndex:150,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{color:C.text,fontWeight:700,fontSize:13}}>{selectedIds.length} فحص محدد</div>
            <div style={{color:C.muted,fontSize:10,marginTop:2}}>{selectedIds.map(id=>{const t=allTests.find(t=>t.id===id);return t?`${t.name}·${selected[id]||"OU"}`:""}).filter(Boolean).join("  ")}</div>
          </div>
          <Btn small onClick={()=>setSelected({})}>مسح</Btn>
        </div>
      )}

      {printed&&<div style={{position:"fixed",top:80,left:"50%",transform:"translateX(-50%)",background:C.success,color:C.bg,borderRadius:12,padding:"10px 20px",fontWeight:700,fontSize:13,zIndex:500}}>✓ تم فتح نافذة الطباعة</div>}

      {addModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setAddModal(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:C.surface,borderRadius:"20px 20px 0 0",padding:"20px 16px 40px",width:"100%",maxWidth:480,border:`1px solid ${C.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <span style={{color:C.text,fontWeight:700,fontSize:15}}>إضافة فحص مخصص</span>
              <span onClick={()=>setAddModal(false)} style={{color:C.muted,fontSize:26,cursor:"pointer"}}>×</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <Field label="اسم الفحص (إنجليزي / اختصار)"><input style={inp()} value={newTest.name} onChange={e=>setNewTest(v=>({...v,name:e.target.value}))} placeholder="مثال: HRT"/></Field>
              <Field label="الاسم بالعربي"><input style={inp()} value={newTest.name_ar} onChange={e=>setNewTest(v=>({...v,name_ar:e.target.value}))} placeholder="مثال: تصوير القرص البصري"/></Field>
              <div style={{display:"flex",gap:10,marginTop:4}}>
                <Btn outline full onClick={()=>setAddModal(false)}>إلغاء</Btn>
                <Btn full onClick={addCustom}>✓ إضافة وتحديد</Btn>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Price Form ────────────────────────────────────────────────
const PRICE_ICONS = ["👁","💬","🔍","👓","🔵","⚡","🏥","💉","📋","🩺","💊","🔬","🧪","📊","🩻"];

function PriceForm({initial, onSave, onClose}) {
  const blank = {name:"", price:"", icon:"👁"};
  const [f, setF] = useState(initial ? {...initial} : blank);
  const s = k => e => setF(v => ({...v, [k]: e.target.value}));
  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <Field label="اسم الخدمة"><input style={inp()} value={f.name} onChange={s("name")} placeholder="كشف روتيني، استشارة..."/></Field>
      <Field label="السعر (ج.م)">
        <input style={inp({textAlign:"center",fontSize:18,fontWeight:700,color:C.gold})} type="number" value={f.price} onChange={s("price")} placeholder="0"/>
      </Field>
      <Field label="الأيقونة">
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {PRICE_ICONS.map(ico=>(
            <div key={ico} onClick={()=>setF(v=>({...v,icon:ico}))} style={{width:40,height:40,borderRadius:10,background:f.icon===ico?C.gold+"33":C.bg,border:`2px solid ${f.icon===ico?C.gold:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,cursor:"pointer"}}>
              {ico}
            </div>
          ))}
        </div>
      </Field>
      <div style={{display:"flex",gap:10,marginTop:8}}>
        <Btn outline full onClick={onClose}>إلغاء</Btn>
        <Btn full onClick={()=>f.name&&f.price&&onSave(f)}>حفظ</Btn>
      </div>
    </div>
  );
}

// ── Settings ──────────────────────────────────────────────────
function DoctorForm({initial, onSave, onClose}) {
  const blank = {name:"", short:"", title:"طبيب عيون", initial:"", isPrimary:false};
  const [f, setF] = useState(initial ? {...initial} : blank);
  const s = k => e => setF(v => ({...v, [k]: e.target.value}));
  // auto-fill initial from name
  const handleName = e => {
    const name = e.target.value;
    const parts = name.replace("د.","").trim().split(" ");
    const ini = parts[0]?.[0] || "";
    const short = name.includes("د.") ? name.split(" ").slice(0,2).join(" ") : "د. "+parts[0];
    setF(v => ({...v, name, initial: v.initial || ini, short: v.short || short}));
  };
  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <Field label="الاسم الكامل"><input style={inp()} value={f.name} onChange={handleName} placeholder="د. محمد أحمد"/></Field>
      <Field label="الاسم المختصر (يظهر في القوائم)"><input style={inp()} value={f.short} onChange={s("short")} placeholder="د. محمد"/></Field>
      <Field label="اللقب / التخصص"><input style={inp()} value={f.title} onChange={s("title")} placeholder="طبيب عيون"/></Field>
      <Field label="الحرف الأول (للصورة الرمزية)"><input style={{...inp(),textAlign:"center"}} value={f.initial} onChange={s("initial")} placeholder="م" maxLength={1}/></Field>
      <div onClick={()=>setF(v=>({...v,isPrimary:!v.isPrimary}))} style={{display:"flex",alignItems:"center",gap:10,background:C.card,border:`1px solid ${f.isPrimary?C.gold:C.border}`,borderRadius:10,padding:"10px 14px",cursor:"pointer"}}>
        <div style={{width:20,height:20,borderRadius:6,background:f.isPrimary?C.gold:C.bg,border:`2px solid ${f.isPrimary?C.gold:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:C.bg,fontWeight:700}}>{f.isPrimary?"✓":""}</div>
        <span style={{color:f.isPrimary?C.gold:C.muted,fontSize:13,fontWeight:600}}>الطبيب الرئيسي للعيادة</span>
      </div>
      <div style={{display:"flex",gap:10,marginTop:8}}>
        <Btn outline full onClick={onClose}>إلغاء</Btn>
        <Btn full onClick={()=>f.name&&f.short&&onSave(f)}>حفظ</Btn>
      </div>
    </div>
  );
}

function Settings({patients,appointments,prescriptions,exams,visits,doctors,setDoctors,prices,setPrices,clinic,setClinic,onReset}) {
  const [confirm,setConfirm]=useState(false);
  const [modal,setModal]=useState(null);
  const [delDoc,setDelDoc]=useState(null);
  const [priceModal,setPriceModal]=useState(null);
  const [editClinic,setEditClinic]=useState(false);
  const [clinicForm,setClinicForm]=useState({...clinic});
  const totalRev=visits.reduce((s,v)=>s+(v.paid?Number(v.cost||0):0),0);
  const primary = doctors.find(d=>d.isPrimary) || doctors[0] || {};

  const addDoc = f => setDoctors([...doctors, {...f, id:Date.now()}]);
  const editDoc = f => setDoctors(doctors.map(d => d.id===f.id ? f : d));
  const delDocFn = id => setDoctors(doctors.filter(d => d.id!==id));
  const setPrimary = id => setDoctors(doctors.map(d => ({...d, isPrimary: d.id===id})));

  const addPrice = f => setPrices([...prices, {...f, id:Date.now()}]);
  const editPrice = f => setPrices(prices.map(p => p.id===f.id ? f : p));
  const delPrice = id => setPrices(prices.filter(p => p.id!==id));

  return (
    <div style={{padding:"16px 16px 90px"}}>
      <div style={{color:C.text,fontWeight:700,fontSize:16,marginBottom:16}}>الإعدادات</div>

      {/* ── Clinic Info ── */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:14,marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{color:C.text,fontWeight:700,fontSize:13}}>🏥 بيانات العيادة</div>
          <div onClick={()=>{setClinicForm({...clinic});setEditClinic(true);}} style={{color:C.accent,fontSize:11,cursor:"pointer",background:C.accent+"22",borderRadius:8,padding:"4px 10px"}}>✏ تعديل</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <span style={{color:C.muted,fontSize:12}}>📍 العنوان</span>
            <span style={{color:C.text,fontSize:12,fontWeight:600}}>{clinic.address||"لم يُضف بعد"}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <span style={{color:C.muted,fontSize:12}}>📞 رقم التواصل</span>
            <span style={{color:C.text,fontSize:12,fontWeight:600}}>{clinic.phone||"لم يُضف بعد"}</span>
          </div>
        </div>
      </div>

      {/* Primary Doctor Card */}
      <div style={{background:`linear-gradient(135deg,${C.accent}22,${C.teal}11)`,border:`1px solid ${C.accent}33`,borderRadius:16,padding:"16px 14px",marginBottom:16,display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:54,height:54,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent},${C.teal})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:800,color:C.bg}}>{primary.initial||"د"}</div>
        <div style={{flex:1}}>
          <div style={{color:C.text,fontWeight:700,fontSize:15}}>{primary.name||"د. عبدالستار صقر"}</div>
          <div style={{color:C.muted,fontSize:11}}>{primary.title||"طبيب عيون · رئيس القسم"}</div>
        </div>
        <div onClick={()=>setModal({edit:primary})} style={{color:C.accent,fontSize:11,cursor:"pointer",background:C.accent+"22",borderRadius:8,padding:"5px 10px"}}>✏ تعديل</div>
      </div>

      {/* Doctors List */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:14,marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{color:C.text,fontWeight:700,fontSize:13}}>👨‍⚕️ فريق الأطباء ({doctors.length})</div>
          <Btn small onClick={()=>setModal("add")}>+ إضافة طبيب</Btn>
        </div>
        {doctors.map(d=>(
          <div key={d.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:`1px solid ${C.border}33`}}>
            <div style={{width:38,height:38,borderRadius:"50%",background:d.isPrimary?`linear-gradient(135deg,${C.accent},${C.teal})`:C.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:800,color:d.isPrimary?C.bg:C.muted}}>{d.initial||"د"}</div>
            <div style={{flex:1}}>
              <div style={{color:C.text,fontSize:13,fontWeight:600}}>{d.name}</div>
              <div style={{color:C.muted,fontSize:11}}>{d.title}</div>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              {d.isPrimary
                ? <span style={{background:C.gold+"22",color:C.gold,borderRadius:8,padding:"2px 8px",fontSize:10,fontWeight:700}}>رئيسي</span>
                : <div onClick={()=>setPrimary(d.id)} style={{background:C.muted+"22",borderRadius:8,padding:"3px 8px",color:C.muted,fontSize:10,cursor:"pointer"}}>تعيين رئيسي</div>
              }
              <div onClick={()=>setModal({edit:d})} style={{background:C.accent+"22",borderRadius:8,padding:"5px 8px",color:C.accent,fontSize:11,cursor:"pointer"}}>✏</div>
              {!d.isPrimary&&<div onClick={()=>setDelDoc(d.id)} style={{background:C.danger+"22",borderRadius:8,padding:"5px 8px",color:C.danger,fontSize:11,cursor:"pointer"}}>🗑</div>}
            </div>
          </div>
        ))}
      </div>

      {/* ── Prices ── */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:14,marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{color:C.text,fontWeight:700,fontSize:13}}>💰 أسعار الخدمات</div>
          <Btn small color={C.gold} onClick={()=>setPriceModal("add")}>+ إضافة خدمة</Btn>
        </div>
        {prices.map(p=>(
          <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:`1px solid ${C.border}22`}}>
            <div style={{width:36,height:36,borderRadius:10,background:C.gold+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{p.icon||"💊"}</div>
            <div style={{flex:1}}>
              <div style={{color:C.text,fontSize:13,fontWeight:600}}>{p.name}</div>
            </div>
            <div style={{color:C.gold,fontWeight:800,fontSize:14,marginLeft:8}}>{Number(p.price).toLocaleString()} ج.م</div>
            <div onClick={()=>setPriceModal({edit:p})} style={{background:C.accent+"22",borderRadius:8,padding:"5px 8px",color:C.accent,fontSize:11,cursor:"pointer"}}>✏</div>
            <div onClick={()=>setPriceModal({del:p.id})} style={{background:C.danger+"22",borderRadius:8,padding:"5px 8px",color:C.danger,fontSize:11,cursor:"pointer"}}>🗑</div>
          </div>
        ))}
        {prices.length===0&&<div style={{color:C.muted,fontSize:12,textAlign:"center",padding:16}}>لا توجد أسعار مضافة</div>}
      </div>

      {/* Stats */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:14,marginBottom:16}}>
        <div style={{color:C.muted,fontSize:11,fontWeight:700,marginBottom:12}}>ملخص قاعدة البيانات</div>
        {[["👥 المرضى",patients.length],["📋 المواعيد",appointments.length],["🗓 الزيارات",visits.length],["🔬 الوصفات",prescriptions.length],["🔍 الفحوصات",exams.length],["💰 الإيرادات",totalRev.toLocaleString()+" ج.م"]].map(([lbl,val])=>(
          <div key={lbl} style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <span style={{color:C.muted,fontSize:13}}>{lbl}</span>
            <span style={{color:C.accent,fontWeight:700,fontSize:13}}>{val}</span>
          </div>
        ))}
      </div>

      {[["🏥","I App للعيون","بيانات العيادة"],["🕐","ساعات العمل","8ص - 8م"],["💾","النسخ الاحتياطي","محفوظ تلقائياً"]].map(([icon,lbl,sub],i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 14px",background:C.card,border:`1px solid ${C.border}`,borderRadius:12,marginBottom:8}}>
          <div style={{width:34,height:34,borderRadius:10,background:C.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{icon}</div>
          <div><div style={{color:C.text,fontSize:13}}>{lbl}</div><div style={{color:C.muted,fontSize:11}}>{sub}</div></div>
        </div>
      ))}

      <div onClick={()=>setConfirm(true)} style={{background:C.danger+"11",border:`1px solid ${C.danger}33`,borderRadius:14,padding:"13px 14px",display:"flex",alignItems:"center",gap:12,cursor:"pointer",marginTop:12}}>
        <span style={{fontSize:18}}>🔄</span>
        <span style={{color:C.danger,fontWeight:600,fontSize:13}}>إعادة تعيين البيانات الأولية</span>
      </div>

      {/* Clinic edit modal */}
      {editClinic&&<Modal title="تعديل بيانات العيادة" onClose={()=>setEditClinic(false)}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Field label="عنوان العيادة"><input style={inp()} value={clinicForm.address||""} onChange={e=>setClinicForm(f=>({...f,address:e.target.value}))} placeholder="مثال: القاهرة - مصر الجديدة - شارع..."/></Field>
          <Field label="رقم التواصل / الهاتف"><input style={inp()} value={clinicForm.phone||""} onChange={e=>setClinicForm(f=>({...f,phone:e.target.value}))} placeholder="مثال: 01234567890"/></Field>
          <div style={{display:"flex",gap:10,marginTop:8}}>
            <Btn outline full onClick={()=>setEditClinic(false)}>إلغاء</Btn>
            <Btn full onClick={()=>{setClinic({...clinic,...clinicForm});setEditClinic(false);}}>✓ حفظ</Btn>
          </div>
        </div>
      </Modal>}

      {/* Doctor modals */}
      {modal==="add"&&<Modal title="إضافة طبيب جديد" onClose={()=>setModal(null)}><DoctorForm onSave={f=>{addDoc(f);setModal(null);}} onClose={()=>setModal(null)}/></Modal>}
      {modal?.edit&&<Modal title="تعديل بيانات الطبيب" onClose={()=>setModal(null)}><DoctorForm initial={modal.edit} onSave={f=>{editDoc(f);setModal(null);}} onClose={()=>setModal(null)}/></Modal>}
      {delDoc&&<Confirm msg="حذف هذا الطبيب من القائمة؟" onOk={()=>{delDocFn(delDoc);setDelDoc(null);}} onNo={()=>setDelDoc(null)}/>}

      {/* Price modals */}
      {priceModal==="add"&&<Modal title="إضافة خدمة جديدة" onClose={()=>setPriceModal(null)}><PriceForm onSave={f=>{addPrice(f);setPriceModal(null);}} onClose={()=>setPriceModal(null)}/></Modal>}
      {priceModal?.edit&&<Modal title="تعديل سعر الخدمة" onClose={()=>setPriceModal(null)}><PriceForm initial={priceModal.edit} onSave={f=>{editPrice(f);setPriceModal(null);}} onClose={()=>setPriceModal(null)}/></Modal>}
      {priceModal?.del&&<Confirm msg="حذف هذه الخدمة من قائمة الأسعار؟" onOk={()=>{delPrice(priceModal.del);setPriceModal(null);}} onNo={()=>setPriceModal(null)}/>}

      {confirm&&<Confirm msg="سيتم حذف جميع البيانات. هل أنت متأكد؟" onOk={()=>{onReset();setConfirm(false);}} onNo={()=>setConfirm(false)}/>}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────
function App() {
  const [unlocked,setUnlocked]=useState(()=>sessionStorage.getItem("iapp_unlocked")==="1");
  const [tab,setTab]=useState("dashboard");
  const [showAlerts,setShowAlerts]=useState(false);
  const [showSearch,setShowSearch]=useState(false);
  const [alertsShown,setAlertsShown]=useState(false);
  const [patients,setRawP,pR]=useDB("iapp_patients",SEED.patients);
  const [appointments,setRawA,aR]=useDB("iapp_appointments",SEED.appointments);
  const [prescriptions,setRawRx,rR]=useDB("iapp_prescriptions",SEED.prescriptions);
  const [exams,setRawE,eR]=useDB("iapp_exams",SEED.exams);
  const [visits,setRawV,vR]=useDB("iapp_visits",SEED.visits);
  const [doctors,setRawD,dR]=useDB("iapp_doctors",SEED.doctors);
  const [prices,setRawPr,prR]=useDB("iapp_prices",SEED.prices);
  const [customTests,setRawCT,ctR]=useDB("iapp_custom_tests",SEED.customTests);
  const [clinic,setRawCl,clR]=useDB("iapp_clinic",SEED.clinic);

  const setPatients=v=>setRawP(v);
  const setAppointments=v=>setRawA(v);
  const setRx=v=>setRawRx(v);
  const setExams=v=>setRawE(v);
  const setVisits=v=>setRawV(v);
  const setDoctors=v=>setRawD(v);
  const setPrices=v=>setRawPr(v);
  const setCustomTests=v=>setRawCT(v);
  const setClinic=v=>setRawCl(v);

  const primary = doctors.find(d=>d.isPrimary) || doctors[0] || {name:"د. عبدالستار صقر",short:"د. عبدالستار",initial:"ع"};
  const doctorNames = doctors.map(d=>d.short);

  const reset=()=>{
    setRawP(SEED.patients);setRawA(SEED.appointments);setRawRx(SEED.prescriptions);
    setRawE(SEED.exams);setRawV(SEED.visits);setRawD(SEED.doctors);setRawPr(SEED.prices);setRawCT(SEED.customTests);setRawCl(SEED.clinic);
  };

  // Show alerts on first load
  useEffect(()=>{
    if(!alertsShown && unlocked){ setAlertsShown(true); setTimeout(()=>setShowAlerts(true),800); }
  },[unlocked]);

  const handleUnlock = () => { sessionStorage.setItem("iapp_unlocked","1"); setUnlocked(true); };
  if(!unlocked) return <PinLock onUnlock={handleUnlock}/>;

  if(!pR||!aR||!rR||!eR||!vR||!dR||!prR||!ctR||!clR) return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",direction:"rtl",fontFamily:"'Segoe UI','Tahoma',Arial,sans-serif"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:16}}>👁</div>
        <div style={{color:C.accent,fontSize:16,fontWeight:700}}>I App</div>
        <div style={{color:C.muted,fontSize:13,marginTop:8}}>جاري التحميل...</div>
      </div>
    </div>
  );

  const screens={
    dashboard:<Dashboard patients={patients} appointments={appointments} visits={visits} primary={primary} clinic={clinic} onDailyReport={()=>{const html=getDailyReportHTML(new Date().toISOString().slice(0,10),patients,visits,appointments,primary,clinic);printDoc(html);}}/>,
    patients:<Patients patients={patients} setPatients={setPatients} exams={exams} setExams={setExams} prescriptions={prescriptions} visits={visits} setVisits={setVisits} doctorNames={doctorNames} primaryDoctor={primary} prices={prices} clinic={clinic}/>,
    appointments:<Appointments appointments={appointments} setAppointments={setAppointments} doctorNames={doctorNames}/>,
    prescriptions:<Prescriptions prescriptions={prescriptions} setRx={setRx} patients={patients} doctorNames={doctorNames} primaryDoctor={primary} clinic={clinic}/>,
    radiology:<Radiology patients={patients} customTests={customTests} setCustomTests={setCustomTests} primary={primary} clinic={clinic}/>,
    settings:<Settings patients={patients} appointments={appointments} prescriptions={prescriptions} exams={exams} visits={visits} doctors={doctors} setDoctors={setDoctors} prices={prices} setPrices={setPrices} clinic={clinic} setClinic={setClinic} onReset={reset}/>,
  };

  return (
    <div style={{minHeight:"100vh",background:"#000",display:"flex",justifyContent:"center",alignItems:"flex-start"}}>
      <div style={{width:"100%",maxWidth:480,minHeight:"100vh",background:C.bg,direction:"rtl",fontFamily:"'Segoe UI','Tahoma',Arial,sans-serif",position:"relative",overflowX:"hidden"}}>
        <TopBar primary={primary} onSearch={()=>setShowSearch(true)}/>
        <div style={{overflowY:"auto",maxHeight:"calc(100vh - 64px)"}}>{screens[tab]}</div>
        <BottomNav active={tab} setActive={setTab}/>
        {showAlerts&&<FollowUpAlerts visits={visits} patients={patients} onClose={()=>setShowAlerts(false)}/>}
        {showSearch&&<GlobalSearch patients={patients} prescriptions={prescriptions} appointments={appointments} onNavigate={(t)=>{setTab(t);setShowSearch(false);}} onClose={()=>setShowSearch(false)}/>}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
