<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0A0F1E">
  <title>I App - السكرتارية</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;background:#0A0F1E;overflow:hidden;font-family:'Segoe UI',Tahoma,Arial,sans-serif;}
    #root{height:100%;}
    ::-webkit-scrollbar{display:none;}
    @keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes toastIn{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  </style>
</head>
<body><div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const {useState,useEffect}=React;
const C={bg:"#0A0F1E",surface:"#111827",card:"#141E30",border:"#1E2D45",
  accent:"#00C2FF",teal:"#00E5CC",gold:"#FFB830",purple:"#A78BFA",
  text:"#E8F4FF",muted:"#6B8CAE",danger:"#FF4D6D",success:"#00E5B0"};
const SB_URL="https://mofdveiwlaymlabvsypu.supabase.co";
const SB_KEY="sb_publishable_tVZ1mUOyb3vOjRV1jBpq6g_P2u-xIqF";
let _sb=null;
function getSB(){if(!_sb&&window.supabase)_sb=window.supabase.createClient(SB_URL,SB_KEY);return _sb;}
async function sbGet(k){try{const{data}=await getSB().from("iapp_store").select("value").eq("key",k).maybeSingle();return data?.value??null;}catch{return null;}}
async function sbSet(k,v){try{await getSB().from("iapp_store").upsert({key:k,value:v},{onConflict:"key"});}catch{}}
function getSecPin(){try{return localStorage.getItem("iapp_sec_pin")||"0000";}catch{return "0000";}}
const inp=()=>({width:"100%",background:C.bg,border:"1px solid "+C.border,borderRadius:10,padding:"10px 12px",color:C.text,fontSize:13,outline:"none",direction:"rtl",fontFamily:"inherit"});
const CLINICS_LIST=["دمنهور","الرحمانية","مركز دمنهور للعيون"];

function Toast({msg,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2300);return()=>clearTimeout(t);},[]);
  return <div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",background:C.success,color:C.bg,borderRadius:14,padding:"10px 22px",fontWeight:700,fontSize:13,zIndex:999,animation:"toastIn 0.3s ease",whiteSpace:"nowrap",boxShadow:"0 4px 20px "+C.success+"66"}}>✓ {msg}</div>;
}

function PinLock({onUnlock}){
  const [pin,setPin]=useState("");
  const [err,setErr]=useState(false);
  const press=d=>{
    if(pin.length>=4)return;
    const n=pin+d;setPin(n);
    if(n.length===4){if(n===getSecPin())onUnlock();else{setErr(true);setTimeout(()=>{setPin("");setErr(false);},700);}}
  };
  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <div style={{fontSize:44,marginBottom:12}}>👁</div>
      <div style={{color:C.accent,fontWeight:800,fontSize:22,marginBottom:4}}>I App</div>
      <div style={{color:C.muted,fontSize:12,marginBottom:6}}>السكرتارية</div>
      <div style={{color:C.muted,fontSize:11,marginBottom:32}}>عيادة د. عبدالستار صقر</div>
      <div style={{display:"flex",gap:14,marginBottom:24,direction:"ltr"}}>
        {[0,1,2,3].map(i=><div key={i} style={{width:18,height:18,borderRadius:"50%",background:i<pin.length?(err?C.danger:C.accent):C.border,transition:"all 0.2s"}}/>)}
      </div>
      {err&&<div style={{color:C.danger,fontSize:12,marginBottom:12,animation:"pulse 0.5s"}}>❌ رقم خاطئ</div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,direction:"ltr"}}>
        {[1,2,3,4,5,6,7,8,9,"⌫",0,""].map((d,i)=>(
          <div key={i} onClick={()=>d===""?null:d==="⌫"?setPin(p=>p.slice(0,-1)):press(String(d))}
            style={{width:68,height:68,borderRadius:18,background:d===""?"transparent":C.card,border:d===""?"none":"1px solid "+C.border,display:"flex",alignItems:"center",justifyContent:"center",cursor:d===""?"default":"pointer",color:d==="⌫"?C.danger:C.text,fontSize:22,fontWeight:700}}>
            {d}
          </div>
        ))}
      </div>
    </div>
  );
}

function Modal({title,onClose,children}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:400,display:"flex",alignItems:"flex-end"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.surface,borderRadius:"20px 20px 0 0",padding:"20px 16px 40px",width:"100%",maxHeight:"92vh",overflowY:"auto",border:"1px solid "+C.border}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
          <span style={{color:C.text,fontWeight:700,fontSize:15}}>{title}</span>
          <span onClick={onClose} style={{color:C.muted,fontSize:28,cursor:"pointer",lineHeight:1}}>×</span>
        </div>
        {children}
      </div>
    </div>
  );
}

function AptForm({initial,patients,onSave,onClose}){
  const blank={patient:"",patientId:null,phone:"",time:"09:00",date:new Date().toISOString().slice(0,10),type:"فحص روتيني",doctor:"د. عبدالستار",room:"1",clinic:"دمنهور",notes:""};
  const [mode,setMode]=useState(initial?.patientId?"existing":"new");
  const [f,setF]=useState(initial?{...blank,...initial}:blank);
  const s=k=>e=>setF(v=>({...v,[k]:e.target.value}));
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <div onClick={()=>{setMode("new");setF(v=>({...v,patient:"",patientId:null,phone:""}));}}
          style={{padding:"10px",borderRadius:10,border:"2px solid "+(mode==="new"?C.accent:C.border),background:mode==="new"?C.accent+"22":C.card,textAlign:"center",cursor:"pointer",color:mode==="new"?C.accent:C.muted,fontSize:12,fontWeight:700}}>
          👤 مريض جديد
        </div>
        <div onClick={()=>{setMode("existing");setF(v=>({...v,patient:"",patientId:null}));}}
          style={{padding:"10px",borderRadius:10,border:"2px solid "+(mode==="existing"?C.teal:C.border),background:mode==="existing"?C.teal+"22":C.card,textAlign:"center",cursor:"pointer",color:mode==="existing"?C.teal:C.muted,fontSize:12,fontWeight:700}}>
          📋 مريض مسجل
        </div>
      </div>
      {mode==="new"?(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div><label style={{color:C.muted,fontSize:11,display:"block",marginBottom:4}}>اسم المريض</label><input style={inp()} value={f.patient} onChange={s("patient")} placeholder="اسم المريض الجديد"/></div>
          <div><label style={{color:C.muted,fontSize:11,display:"block",marginBottom:4}}>الهاتف</label><input style={inp()} value={f.phone||""} onChange={s("phone")} placeholder="01xxxxxxxxx" type="tel"/></div>
        </div>
      ):(
        <div>
          <label style={{color:C.muted,fontSize:11,display:"block",marginBottom:4}}>اختر مريض مسجل</label>
          <select style={inp()} value={f.patientId||""} onChange={e=>{const p=patients.find(p=>p.id===Number(e.target.value));if(p)setF(v=>({...v,patientId:p.id,patient:p.name,phone:p.phone||""}));}}>
            <option value="">— اختر مريض —</option>
            {patients.map(p=><option key={p.id} value={p.id}>{p.name} - {p.patientCode}</option>)}
          </select>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div><label style={{color:C.muted,fontSize:11,display:"block",marginBottom:4}}>التاريخ</label><input style={inp()} type="date" value={f.date} onChange={s("date")}/></div>
        <div><label style={{color:C.muted,fontSize:11,display:"block",marginBottom:4}}>الوقت</label><input style={inp()} type="time" value={f.time} onChange={s("time")}/></div>
      </div>
      <div><label style={{color:C.muted,fontSize:11,display:"block",marginBottom:4}}>العيادة</label>
        <select style={inp()} value={f.clinic||"دمنهور"} onChange={s("clinic")}>{CLINICS_LIST.map(c=><option key={c}>{c}</option>)}</select>
      </div>
      <div><label style={{color:C.muted,fontSize:11,display:"block",marginBottom:4}}>نوع الموعد</label>
        <select style={inp()} value={f.type} onChange={s("type")}>{["فحص روتيني","متابعة","استشارة","قياس نظر","فحص شبكية","عملية"].map(t=><option key={t}>{t}</option>)}</select>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div><label style={{color:C.muted,fontSize:11,display:"block",marginBottom:4}}>الطبيب</label><input style={inp()} value={f.doctor} onChange={s("doctor")}/></div>
        <div><label style={{color:C.muted,fontSize:11,display:"block",marginBottom:4}}>الغرفة</label><input style={inp()} value={f.room} onChange={s("room")}/></div>
      </div>
      <div><label style={{color:C.muted,fontSize:11,display:"block",marginBottom:4}}>ملاحظات</label>
        <textarea style={{...inp(),minHeight:55,resize:"none"}} value={f.notes||""} onChange={s("notes")}/>
      </div>
      <div style={{display:"flex",gap:10}}>
        <button onClick={onClose} style={{flex:1,background:"transparent",border:"1px solid "+C.border,borderRadius:10,padding:11,color:C.muted,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>إلغاء</button>
        <button onClick={()=>{if(!f.patient.trim()){alert("اكتب اسم المريض");return;}onSave({...f,id:f.id||Date.now()});}}
          style={{flex:2,background:"linear-gradient(135deg,"+C.accent+","+C.teal+")",border:"none",borderRadius:10,padding:11,color:C.bg,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
          ✓ حفظ الموعد
        </button>
      </div>
    </div>
  );
}

// ── Waiting Room ──────────────────────────────────────────────
function WaitingRoom({apts,today,onUpdateApt}){
  const todayApts=apts.filter(a=>a.date===today).sort((a,b)=>(a.time||"").localeCompare(b.time||""));
  const waiting=todayApts.filter(a=>a.waitStatus==="waiting");
  const inRoom=todayApts.filter(a=>a.waitStatus==="in");
  const done=todayApts.filter(a=>a.waitStatus==="done");
  const pending=todayApts.filter(a=>!a.waitStatus);
  return(
    <div style={{padding:"12px 16px 100px",animation:"slideUp 0.25s ease"}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:16}}>
        {[{l:"ينتظر",v:waiting.length,c:C.gold},{l:"في العيادة",v:inRoom.length,c:C.accent},{l:"انتهى",v:done.length,c:C.success},{l:"لم يصل",v:pending.length,c:C.muted}].map((s,i)=>(
          <div key={i} style={{background:C.card,borderRadius:10,padding:"10px 4px",textAlign:"center",border:"1px solid "+C.border}}>
            <div style={{color:s.c,fontSize:20,fontWeight:800}}>{s.v}</div>
            <div style={{color:C.muted,fontSize:9}}>{s.l}</div>
          </div>
        ))}
      </div>
      {inRoom.map(a=>(
        <div key={a.id} style={{background:`linear-gradient(135deg,${C.accent}22,${C.teal}11)`,border:"2px solid "+C.accent,borderRadius:14,padding:"12px 14px",marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:18}}>🩺</span>
            <div style={{flex:1}}><div style={{color:C.accent,fontWeight:800,fontSize:14}}>{a.patient}</div><div style={{color:C.muted,fontSize:11}}>في العيادة الآن · {a.time}</div></div>
            <button onClick={()=>onUpdateApt({...a,waitStatus:"done"})} style={{background:C.success+"22",border:"1px solid "+C.success+"44",borderRadius:8,padding:"6px 12px",color:C.success,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✓ انتهى</button>
          </div>
        </div>
      ))}
      {waiting.length>0&&<>
        <div style={{color:C.muted,fontSize:11,fontWeight:700,marginBottom:8}}>⏳ قائمة الانتظار</div>
        {waiting.map((a,idx)=>(
          <div key={a.id} style={{background:C.card,border:"1px solid "+C.gold+"44",borderRadius:14,padding:"10px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:C.gold+"22",border:"1px solid "+C.gold+"44",display:"flex",alignItems:"center",justifyContent:"center",color:C.gold,fontWeight:800,fontSize:13}}>{idx+1}</div>
            <div style={{flex:1}}>
              <div style={{color:C.text,fontWeight:700,fontSize:13}}>{a.patient}</div>
              <div style={{color:C.muted,fontSize:11}}>{a.type} · {a.time}</div>
              {a.phone&&<a href={"tel:"+a.phone} style={{color:C.accent,fontSize:11,textDecoration:"none"}}>📞 {a.phone}</a>}
            </div>
            <div style={{display:"flex",gap:6}}>
              {inRoom.length===0&&idx===0&&<button onClick={()=>onUpdateApt({...a,waitStatus:"in"})} style={{background:`linear-gradient(135deg,${C.accent},${C.teal})`,border:"none",borderRadius:8,padding:"6px 10px",color:C.bg,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>ادخل</button>}
              <button onClick={()=>onUpdateApt({...a,waitStatus:undefined})} style={{background:C.danger+"22",border:"1px solid "+C.danger+"33",borderRadius:8,padding:"6px 8px",color:C.danger,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>✕</button>
            </div>
          </div>
        ))}
      </>}
      {pending.length>0&&<>
        <div style={{color:C.muted,fontSize:11,fontWeight:700,marginBottom:8,marginTop:12}}>📋 لم يصلوا بعد</div>
        {pending.map(a=>(
          <div key={a.id} style={{background:C.card,border:"1px solid "+C.border,borderRadius:12,padding:"10px 14px",marginBottom:6,display:"flex",alignItems:"center",gap:10}}>
            <div style={{flex:1}}><div style={{color:C.text,fontSize:13,fontWeight:600}}>{a.patient}</div><div style={{color:C.muted,fontSize:11}}>{a.time} · {a.type}</div></div>
            <button onClick={()=>onUpdateApt({...a,waitStatus:"waiting"})} style={{background:C.gold+"22",border:"1px solid "+C.gold+"33",borderRadius:8,padding:"6px 10px",color:C.gold,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>وصل ✓</button>
          </div>
        ))}
      </>}
      {done.length>0&&<>
        <div style={{color:C.muted,fontSize:11,fontWeight:700,marginBottom:8,marginTop:12}}>✅ انتهوا اليوم</div>
        {done.map(a=>(
          <div key={a.id} style={{background:C.card,border:"1px solid "+C.border,borderRadius:12,padding:"10px 14px",marginBottom:6,opacity:0.6}}>
            <div style={{color:C.muted,fontSize:12}}>{a.patient} · {a.time}</div>
          </div>
        ))}
      </>}
      {todayApts.length===0&&<div style={{color:C.muted,textAlign:"center",padding:40,fontSize:13}}>لا توجد مواعيد اليوم</div>}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────
function App(){
  const [unlocked,setUnlocked]=useState(()=>sessionStorage.getItem("sec_pin")==="1");
  const [tab,setTab]=useState("apts");
  const [apts,setAptsState]=useState([]);
  const [patients,setPatients]=useState([]);
  const [modal,setModal]=useState(null);
  const [filterDate,setFilterDate]=useState(new Date().toISOString().slice(0,10));
  const [filterClinic,setFilterClinic]=useState("");
  const [search,setSearch]=useState("");
  const [filterFromPatient,setFilterFromPatient]=useState(false);
  const [loading,setLoading]=useState(true);
  const [toast,setToast]=useState(null);
  const [syncing,setSyncing]=useState(false);
  const today=new Date().toISOString().slice(0,10);

  const loadData=async()=>{
    const [a,p]=await Promise.all([sbGet("iapp_appointments"),sbGet("iapp_patients")]);
    if(a)setAptsState(a);if(p)setPatients(p);setLoading(false);
  };
  useEffect(()=>{if(!unlocked)return;loadData();const iv=setInterval(loadData,15000);return()=>clearInterval(iv);},[unlocked]);

  const saveApts=async a=>{setSyncing(true);setAptsState(a);await sbSet("iapp_appointments",a);setSyncing(false);setToast("تم الحفظ");};
  const updateApt=async apt=>saveApts(apts.map(a=>a.id===apt.id?apt:a));

  const pendingFromPatient=apts.filter(a=>a.fromPatient&&!a.confirmed).length;
  const waitingCount=apts.filter(a=>a.date===today&&a.waitStatus==="waiting").length;

  const filtered=apts.filter(a=>{
    const dateOk=filterDate?a.date===filterDate:true;
    const searchOk=search?a.patient?.includes(search):true;
    const fromOk=filterFromPatient?a.fromPatient:true;
    const clinicOk=filterClinic?a.clinic===filterClinic:true;
    return dateOk&&searchOk&&fromOk&&clinicOk;
  }).sort((a,b)=>a.date.localeCompare(b.date)||(a.time||"").localeCompare(b.time||""));

  if(!unlocked)return <PinLock onUnlock={()=>{sessionStorage.setItem("sec_pin","1");setUnlocked(true);}}/>;

  const Btn=({children,onClick,color,active})=>(
    <button onClick={onClick} style={{background:active?`linear-gradient(135deg,${color||C.accent},${C.teal})`:(color?color+"22":"transparent"),border:"1px solid "+(active?"transparent":(color||C.border)),borderRadius:8,padding:"6px 12px",color:active?C.bg:(color||C.muted),fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>{children}</button>
  );

  return(
    <div style={{height:"100%",background:C.bg,direction:"rtl",display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg,${C.surface},#0D1929)`,borderBottom:"1px solid "+C.border,padding:"0 16px",display:"flex",alignItems:"center",justifyContent:"space-between",height:60,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:34,height:34,borderRadius:10,background:`linear-gradient(135deg,${C.accent},${C.teal})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>👁</div>
          <div>
            <div style={{color:C.text,fontWeight:700,fontSize:14}}>I App <span style={{color:C.muted,fontWeight:400,fontSize:11}}>· السكرتارية</span></div>
            <div style={{color:C.muted,fontSize:9,display:"flex",alignItems:"center",gap:3}}>
              <span style={{width:5,height:5,borderRadius:"50%",background:syncing?C.gold:C.success,display:"inline-block"}}/>
              {syncing?"جاري المزامنة...":"متصل · يتحدث كل 15ث"}
            </div>
          </div>
          {pendingFromPatient>0&&<span style={{background:C.gold,color:C.bg,borderRadius:"50%",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800}}>{pendingFromPatient}</span>}
          {waitingCount>0&&<span style={{background:C.accent+"22",color:C.accent,borderRadius:8,padding:"2px 8px",fontSize:10,fontWeight:700}}>⏳{waitingCount}</span>}
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setModal("add")} style={{background:`linear-gradient(135deg,${C.accent},${C.teal})`,border:"none",borderRadius:10,padding:"8px 12px",color:C.bg,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>+ جديد</button>
          <button onClick={loadData} style={{background:"transparent",border:"1px solid "+C.border,borderRadius:10,padding:"8px 10px",color:C.muted,fontSize:14,cursor:"pointer"}}>🔄</button>
        </div>
      </div>

      {/* Tabs */}
      <div style={{background:C.surface,borderBottom:"1px solid "+C.border,display:"flex",flexShrink:0}}>
        {[{id:"apts",icon:"📋",label:"المواعيد"},{id:"waiting",icon:"⏳",label:"الانتظار"},{id:"stats",icon:"📊",label:"إحصائيات"}].map(t=>(
          <div key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,textAlign:"center",padding:"9px 4px",cursor:"pointer",borderBottom:tab===t.id?"2px solid "+C.accent:"2px solid transparent",color:tab===t.id?C.accent:C.muted,fontSize:10,fontWeight:tab===t.id?700:400,transition:"all 0.2s"}}>
            <div style={{fontSize:15}}>{t.icon}</div>{t.label}
          </div>
        ))}
      </div>

      {/* APPOINTMENTS TAB */}
      {tab==="apts"&&<>
        <div style={{padding:"8px 16px",background:C.surface,borderBottom:"1px solid "+C.border,flexShrink:0,display:"flex",gap:6,overflowX:"auto"}}>
          <Btn active={filterDate===today&&!filterFromPatient&&!filterClinic} onClick={()=>{setFilterDate(today);setFilterFromPatient(false);setFilterClinic("");}}>📅 اليوم</Btn>
          <Btn active={!filterDate&&!filterFromPatient&&!filterClinic} onClick={()=>{setFilterDate("");setFilterFromPatient(false);setFilterClinic("");}}>📋 الكل</Btn>
          <Btn active={filterFromPatient} color={C.gold} onClick={()=>{setFilterFromPatient(f=>!f);setFilterDate("");}}>⭐ طلبات{pendingFromPatient>0?" ("+pendingFromPatient+")":""}</Btn>
          <input type="date" value={filterDate} onChange={e=>setFilterDate(e.target.value)} style={{...inp(),fontSize:11,padding:"6px 10px",minWidth:130,flex:"0 0 auto"}}/>
        </div>
        <div style={{padding:"6px 16px",background:C.surface,borderBottom:"1px solid "+C.border,flexShrink:0,display:"flex",gap:6,overflowX:"auto"}}>
          {["الكل",...CLINICS_LIST].map(c=>(
            <button key={c} onClick={()=>setFilterClinic(c==="الكل"?"":c)}
              style={{background:((!filterClinic&&c==="الكل")||(filterClinic===c))?C.teal+"33":"transparent",border:"1px solid "+((!filterClinic&&c==="الكل")||(filterClinic===c))?C.teal:C.border,borderRadius:8,padding:"5px 10px",color:((!filterClinic&&c==="الكل")||(filterClinic===c))?C.teal:C.muted,fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>
              {c==="الكل"?"🏥 الكل":"📍 "+c}
            </button>
          ))}
        </div>
        <div style={{padding:"6px 16px",background:C.surface,borderBottom:"1px solid "+C.border,flexShrink:0}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 بحث بالاسم..." style={{...inp(),fontSize:12,padding:"8px 12px"}}/>
        </div>
        <div style={{padding:"8px 16px",display:"flex",gap:8,flexShrink:0}}>
          {[{l:"اليوم",v:apts.filter(a=>a.date===today).length,c:C.accent},{l:"معروض",v:filtered.length,c:C.teal},{l:"مؤكد",v:filtered.filter(a=>a.confirmed).length,c:C.success},{l:"طلبات",v:pendingFromPatient,c:C.gold}].map((s,i)=>(
            <div key={i} style={{flex:1,background:C.card,borderRadius:10,padding:"8px 4px",textAlign:"center",border:"1px solid "+C.border}}>
              <div style={{color:s.c,fontSize:17,fontWeight:800}}>{s.v}</div>
              <div style={{color:C.muted,fontSize:9}}>{s.l}</div>
            </div>
          ))}
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"0 16px 20px"}}>
          {loading&&<div style={{color:C.muted,textAlign:"center",padding:40}}>⏳ جاري التحميل...</div>}
          {!loading&&filtered.length===0&&<div style={{color:C.muted,textAlign:"center",padding:40,fontSize:13}}>لا توجد مواعيد</div>}
          {filtered.map(a=>(
            <div key={a.id} style={{background:C.card,border:"1px solid "+(a.fromPatient?C.gold:a.confirmed?C.success:C.border),borderRadius:14,padding:"12px 14px",marginBottom:10,borderRight:"4px solid "+(a.confirmed?C.success:a.fromPatient?C.gold:C.accent),animation:"slideUp 0.2s ease"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap",marginBottom:3}}>
                    <span style={{color:C.text,fontWeight:700,fontSize:14}}>{a.patient}</span>
                    {a.fromPatient&&<span style={{background:C.gold+"22",color:C.gold,borderRadius:6,padding:"1px 6px",fontSize:9,fontWeight:700}}>⭐ طلب</span>}
                    {a.waitStatus==="waiting"&&<span style={{background:C.gold+"22",color:C.gold,borderRadius:6,padding:"1px 6px",fontSize:9,fontWeight:700}}>⏳ ينتظر</span>}
                    {a.waitStatus==="in"&&<span style={{background:C.accent+"22",color:C.accent,borderRadius:6,padding:"1px 6px",fontSize:9,fontWeight:700}}>🩺 في العيادة</span>}
                    {a.waitStatus==="done"&&<span style={{background:C.success+"22",color:C.success,borderRadius:6,padding:"1px 6px",fontSize:9,fontWeight:700}}>✓ انتهى</span>}
                  </div>
                  <div style={{color:C.muted,fontSize:11}}>{a.type} · {a.doctor}</div>
                  <div style={{display:"flex",gap:10,marginTop:2,flexWrap:"wrap"}}>
                    {a.phone&&<a href={"tel:"+a.phone} style={{color:C.accent,fontSize:11,textDecoration:"none"}}>📞 {a.phone}</a>}
                    {a.clinic&&<span style={{color:C.teal,fontSize:11}}>🏥 {a.clinic}</span>}
                    {a.date!==today&&<span style={{color:C.gold,fontSize:10}}>📅 {a.date}</span>}
                  </div>
                </div>
                <div style={{background:C.accent+"22",borderRadius:8,padding:"4px 10px",textAlign:"center",flexShrink:0,marginRight:8}}>
                  <div style={{color:C.accent,fontSize:14,fontWeight:800}}>{a.time}</div>
                  <div style={{color:C.muted,fontSize:9}}>غرفة {a.room}</div>
                </div>
              </div>
              {a.notes&&<div style={{color:C.muted,fontSize:11,marginBottom:8}}>📝 {a.notes}</div>}
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                <div onClick={()=>updateApt({...a,confirmed:!a.confirmed})}
                  style={{flex:"1 1 60px",background:a.confirmed?C.success+"33":"transparent",border:"1px solid "+(a.confirmed?C.success:C.border),borderRadius:8,padding:"7px 0",color:a.confirmed?C.success:C.muted,fontSize:11,fontWeight:700,cursor:"pointer",textAlign:"center"}}>
                  {a.confirmed?"✓ مؤكد":"تأكيد"}
                </div>
                {a.phone&&<a href={"https://wa.me/2"+a.phone.replace(/^0/,"")} target="_blank"
                  style={{background:"#25D36622",border:"1px solid #25D36633",borderRadius:8,padding:"7px 12px",color:"#25D366",fontSize:14,textDecoration:"none",display:"flex",alignItems:"center",justifyContent:"center"}}>💬</a>}
                {a.phone&&<a href={"tel:"+a.phone}
                  style={{background:C.teal+"22",border:"1px solid "+C.teal+"33",borderRadius:8,padding:"7px 12px",color:C.teal,fontSize:14,textDecoration:"none",display:"flex",alignItems:"center",justifyContent:"center"}}>📞</a>}
                <div onClick={()=>setModal({edit:a})} style={{background:C.accent+"22",border:"1px solid "+C.accent+"33",borderRadius:8,padding:"7px 12px",color:C.accent,fontSize:14,cursor:"pointer"}}>✏️</div>
                <div onClick={()=>{if(window.confirm("حذف موعد "+a.patient+"؟"))saveApts(apts.filter(x=>x.id!==a.id));}}
                  style={{background:C.danger+"22",border:"1px solid "+C.danger+"33",borderRadius:8,padding:"7px 12px",color:C.danger,fontSize:14,cursor:"pointer"}}>🗑️</div>
              </div>
            </div>
          ))}
        </div>
      </>}

      {/* WAITING ROOM TAB */}
      {tab==="waiting"&&<div style={{flex:1,overflowY:"auto"}}><WaitingRoom apts={apts} today={today} onUpdateApt={updateApt}/></div>}

      {/* STATS TAB */}
      {tab==="stats"&&<div style={{flex:1,overflowY:"auto",padding:"16px 16px 80px"}}>
        <div style={{color:C.text,fontWeight:700,fontSize:16,marginBottom:16}}>📊 إحصائيات</div>
        <div style={{color:C.muted,fontSize:11,fontWeight:700,marginBottom:10}}>حسب العيادة</div>
        {CLINICS_LIST.map(c=>{
          const cnt=apts.filter(a=>a.clinic===c).length;
          const todayCnt=apts.filter(a=>a.clinic===c&&a.date===today).length;
          if(!cnt&&!todayCnt)return null;
          return(
            <div key={c} style={{background:C.card,border:"1px solid "+C.border,borderRadius:12,padding:"12px 14px",marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <span style={{color:C.text,fontWeight:700,fontSize:13}}>📍 {c}</span>
                <div style={{display:"flex",gap:10}}>
                  <span style={{color:C.teal,fontWeight:700,fontSize:13}}>{todayCnt} اليوم</span>
                  <span style={{color:C.muted,fontSize:12}}>{cnt} إجمالي</span>
                </div>
              </div>
              <div style={{background:C.bg,borderRadius:6,height:6,overflow:"hidden"}}>
                <div style={{width:(cnt/Math.max(apts.length,1)*100)+"%",height:"100%",background:`linear-gradient(90deg,${C.accent},${C.teal})`,borderRadius:6}}/>
              </div>
            </div>
          );
        })}
        <div style={{color:C.muted,fontSize:11,fontWeight:700,marginBottom:10,marginTop:16}}>حسب نوع الموعد</div>
        {["فحص روتيني","متابعة","استشارة","قياس نظر","فحص شبكية","عملية"].map(t=>{
          const cnt=apts.filter(a=>a.type===t).length;
          if(!cnt)return null;
          return <div key={t} style={{background:C.card,border:"1px solid "+C.border,borderRadius:10,padding:"10px 14px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{color:C.text,fontSize:13}}>{t}</span>
            <span style={{color:C.teal,fontWeight:700,fontSize:15}}>{cnt}</span>
          </div>;
        })}
        <div style={{background:C.gold+"11",border:"1px solid "+C.gold+"33",borderRadius:14,padding:14,marginTop:16}}>
          <div style={{color:C.gold,fontWeight:700,fontSize:13,marginBottom:4}}>⭐ طلبات المرضى المعلقة</div>
          <div style={{color:C.text,fontSize:28,fontWeight:800}}>{pendingFromPatient}</div>
          <div style={{color:C.muted,fontSize:11}}>بحاجة للتأكيد</div>
        </div>
      </div>}

      {modal==="add"&&<Modal title="موعد جديد" onClose={()=>setModal(null)}><AptForm patients={patients} onSave={f=>{saveApts([...apts,f]);setModal(null);}} onClose={()=>setModal(null)}/></Modal>}
      {modal?.edit&&<Modal title="تعديل الموعد" onClose={()=>setModal(null)}><AptForm patients={patients} initial={modal.edit} onSave={f=>{saveApts(apts.map(a=>a.id===f.id?f:a));setModal(null);}} onClose={()=>setModal(null)}/></Modal>}
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
