<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0A0F1E">
  <title>I App - المواعيد</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;background:#0A0F1E;overflow:hidden;font-family:'Segoe UI',Tahoma,Arial,sans-serif;}
    #root{height:100%;}
    ::-webkit-scrollbar{display:none;}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const {useState, useEffect} = React;
const C = {bg:"#0A0F1E",surface:"#111827",card:"#141E30",border:"#1E2D45",accent:"#00C2FF",teal:"#00E5CC",gold:"#FFB830",text:"#E8F4FF",muted:"#6B8CAE",danger:"#FF4D6D",success:"#00E5B0"};
const SB_URL = "https://mofdveiwlaymlabvsypu.supabase.co";
const SB_KEY = "sb_publishable_tVZ1mUOyb3vOjRV1jBpq6g_P2u-xIqF";
const SEC_PIN = "0000";
let _sb=null;
function getSB(){if(!_sb&&window.supabase)_sb=window.supabase.createClient(SB_URL,SB_KEY);return _sb;}
async function sbGet(key){try{const{data}=await getSB().from("iapp_store").select("value").eq("key",key).maybeSingle();return data?.value??null;}catch{return null;}}
async function sbSet(key,value){try{await getSB().from("iapp_store").upsert({key,value},{onConflict:"key"});}catch{}}
const inp=()=>({width:"100%",background:C.bg,border:"1px solid "+C.border,borderRadius:10,padding:"10px 12px",color:C.text,fontSize:13,outline:"none",direction:"rtl",fontFamily:"inherit"});

function PinLock({onUnlock}){
  const [pin,setPin]=useState("");
  const [error,setError]=useState(false);
  const press=d=>{
    if(pin.length>=4)return;
    const next=pin+d;setPin(next);
    if(next.length===4){if(next===SEC_PIN){onUnlock();}else{setError(true);setTimeout(()=>{setPin("");setError(false);},600);}}
  };
  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <div style={{fontSize:44,marginBottom:12}}>👁</div>
      <div style={{color:C.accent,fontWeight:800,fontSize:22,marginBottom:4}}>I App</div>
      <div style={{color:C.muted,fontSize:12,marginBottom:40}}>عيادة د. عبدالستار صقر</div>
      <div style={{display:"flex",gap:14,marginBottom:32,direction:"ltr"}}>
        {[0,1,2,3].map(i=><div key={i} style={{width:18,height:18,borderRadius:"50%",background:i<pin.length?(error?C.danger:C.accent):C.border,transition:"all 0.2s"}}/>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,direction:"ltr"}}>
        {[1,2,3,4,5,6,7,8,9,"⌫",0,""].map((d,i)=>(
          <div key={i} onClick={()=>d===""?null:d==="⌫"?setPin(p=>p.slice(0,-1)):press(String(d))}
            style={{width:68,height:68,borderRadius:18,background:d===""?"transparent":C.card,border:d===""?"none":"1px solid "+C.border,display:"flex",alignItems:"center",justifyContent:"center",cursor:d===""?"default":"pointer",color:d==="⌫"?C.danger:C.text,fontSize:22,fontWeight:700}}>
            {d}
          </div>
        ))}
      </div>
    </div>
  );
}

function AptForm({initial,patients,onSave,onClose}){
  const [mode,setMode]=useState(initial?.patientId?"existing":"new");
  const [f,setF]=useState(initial?{...initial}:{patient:"",patientId:null,time:"09:00",date:new Date().toISOString().slice(0,10),type:"فحص روتيني",doctor:"د. عبدالستار",room:"1",notes:""});
  const s=k=>e=>setF(v=>({...v,[k]:e.target.value}));
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <div onClick={()=>{setMode("new");setF(v=>({...v,patient:"",patientId:null}));}}
          style={{padding:"12px 8px",borderRadius:10,border:"2px solid "+(mode==="new"?C.accent:C.border),background:mode==="new"?C.accent+"22":C.card,textAlign:"center",cursor:"pointer",color:mode==="new"?C.accent:C.muted,fontSize:13,fontWeight:700}}>
          👤 مريض جديد
        </div>
        <div onClick={()=>{setMode("existing");setF(v=>({...v,patient:"",patientId:null}));}}
          style={{padding:"12px 8px",borderRadius:10,border:"2px solid "+(mode==="existing"?C.teal:C.border),background:mode==="existing"?C.teal+"22":C.card,textAlign:"center",cursor:"pointer",color:mode==="existing"?C.teal:C.muted,fontSize:13,fontWeight:700}}>
          📋 مريض مسجل
        </div>
      </div>
      {mode==="new"?(
        <div>
          <label style={{color:C.muted,fontSize:11,display:"block",marginBottom:5}}>اسم المريض</label>
          <input style={inp()} value={f.patient} onChange={s("patient")} placeholder="اكتب اسم المريض الجديد..."/>
        </div>
      ):(
        <div>
          <label style={{color:C.muted,fontSize:11,display:"block",marginBottom:5}}>اختر مريض مسجل</label>
          <select style={inp()} value={f.patientId||""} onChange={e=>{const p=patients.find(p=>p.id===Number(e.target.value));if(p)setF(v=>({...v,patientId:p.id,patient:p.name}));}}>
            <option value="">— اختر مريض —</option>
            {patients.map(p=><option key={p.id} value={p.id}>{p.name} - {p.patientCode}</option>)}
          </select>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div><label style={{color:C.muted,fontSize:11,display:"block",marginBottom:5}}>التاريخ</label><input style={inp()} type="date" value={f.date} onChange={s("date")}/></div>
        <div><label style={{color:C.muted,fontSize:11,display:"block",marginBottom:5}}>الوقت</label><input style={inp()} type="time" value={f.time} onChange={s("time")}/></div>
      </div>
      <div><label style={{color:C.muted,fontSize:11,display:"block",marginBottom:5}}>نوع الموعد</label>
        <select style={inp()} value={f.type} onChange={s("type")}>
          {["فحص روتيني","متابعة","استشارة","قياس نظر","فحص شبكية","عملية"].map(t=><option key={t}>{t}</option>)}
        </select>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div><label style={{color:C.muted,fontSize:11,display:"block",marginBottom:5}}>الطبيب</label><input style={inp()} value={f.doctor} onChange={s("doctor")}/></div>
        <div><label style={{color:C.muted,fontSize:11,display:"block",marginBottom:5}}>الغرفة</label><input style={inp()} value={f.room} onChange={s("room")}/></div>
      </div>
      <div><label style={{color:C.muted,fontSize:11,display:"block",marginBottom:5}}>ملاحظات</label>
        <textarea style={{...inp(),minHeight:55,resize:"none"}} value={f.notes||""} onChange={s("notes")}/>
      </div>
      <div style={{display:"flex",gap:10}}>
        <button onClick={onClose} style={{flex:1,background:"transparent",border:"1px solid "+C.border,borderRadius:10,padding:11,color:C.muted,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>إلغاء</button>
        <button onClick={()=>{if(!f.patient.trim()){alert("اكتب اسم المريض أو اختر من المسجلين");return;}onSave({...f,id:f.id||Date.now()});}}
          style={{flex:1,background:"linear-gradient(135deg,"+C.accent+","+C.teal+")",border:"none",borderRadius:10,padding:11,color:C.bg,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
          ✓ حفظ الموعد
        </button>
      </div>
    </div>
  );
}

function Modal({title,onClose,children}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:400,display:"flex",alignItems:"flex-end"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.surface,borderRadius:"20px 20px 0 0",padding:"20px 16px 40px",width:"100%",maxHeight:"92vh",overflowY:"auto",border:"1px solid "+C.border}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
          <span style={{color:C.text,fontWeight:700,fontSize:15}}>{title}</span>
          <span onClick={onClose} style={{color:C.muted,fontSize:28,cursor:"pointer"}}>×</span>
        </div>
        {children}
      </div>
    </div>
  );
}

function App(){
  const [unlocked,setUnlocked]=useState(()=>sessionStorage.getItem("sec_pin")==="1");
  const [apts,setApts]=useState([]);
  const [patients,setPatients]=useState([]);
  const [modal,setModal]=useState(null);
  const [filterDate,setFilterDate]=useState("");
  const [search,setSearch]=useState("");
  const [loading,setLoading]=useState(true);
  const today=new Date().toISOString().slice(0,10);
  const loadData = async () => {
    const [a,p]=await Promise.all([sbGet("iapp_appointments"),sbGet("iapp_patients")]);
    if(a)setApts(a);if(p)setPatients(p);setLoading(false);
  };

  useEffect(()=>{
    if(!unlocked)return;
    loadData();
    // تحديث تلقائي كل 30 ثانية
    const interval = setInterval(loadData, 30000);
    return () => clearInterval(interval);
  },[unlocked]);
  const saveApts=async a=>{setApts(a);await sbSet("iapp_appointments",a);};
  const filtered=apts.filter(a=>{
    const dateOk = filterDate ? a.date===filterDate : true;
    const searchOk = !search || search==="fromPatient" ? (search==="fromPatient" ? a.fromPatient : true) : a.patient?.includes(search);
    return dateOk && searchOk;
  }).sort((a,b)=>a.date.localeCompare(b.date)||( a.time||"").localeCompare(b.time||""));
  const pendingFromPatient = apts.filter(a=>a.fromPatient&&!a.confirmed).length;
  if(!unlocked)return <PinLock onUnlock={()=>{sessionStorage.setItem("sec_pin","1");setUnlocked(true);}}/>;
  return(
    <div style={{height:"100%",background:C.bg,direction:"rtl",display:"flex",flexDirection:"column"}}>
      <div style={{background:"linear-gradient(135deg,"+C.surface+",#0D1929)",borderBottom:"1px solid "+C.border,padding:"0 16px",display:"flex",alignItems:"center",justifyContent:"space-between",height:60,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{fontSize:22}}>👁</div>
          <div style={{color:C.text,fontWeight:700,fontSize:14}}>I App <span style={{color:C.muted,fontSize:11,fontWeight:400}}>· المواعيد</span></div>
          {pendingFromPatient>0&&<span style={{background:C.gold,color:C.bg,borderRadius:"50%",width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800}}>{pendingFromPatient}</span>}
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setModal("add")} style={{background:"linear-gradient(135deg,"+C.accent+","+C.teal+")",border:"none",borderRadius:10,padding:"8px 12px",color:C.bg,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>+ جديد</button>
          <button onClick={loadData} title="تحديث" style={{background:"transparent",border:"1px solid "+C.border,borderRadius:10,padding:"8px 10px",color:C.muted,fontSize:14,cursor:"pointer"}}>🔄</button>
        </div>
      </div>
      <div style={{padding:"8px 16px",background:C.surface,borderBottom:"1px solid "+C.border,flexShrink:0,display:"flex",gap:6,overflowX:"auto"}}>
        <button onClick={()=>setFilterDate(today)} style={{background:filterDate===today?"linear-gradient(135deg,"+C.accent+","+C.teal+")":"transparent",border:"1px solid "+(filterDate===today?"transparent":C.border),borderRadius:8,padding:"6px 12px",color:filterDate===today?C.bg:C.muted,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>📅 اليوم</button>
        <button onClick={()=>setFilterDate("")} style={{background:filterDate===""&&!search?"linear-gradient(135deg,"+C.accent+","+C.teal+")":"transparent",border:"1px solid "+(filterDate===""&&!search?"transparent":C.border),borderRadius:8,padding:"6px 12px",color:filterDate===""&&!search?C.bg:C.muted,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>📋 الكل</button>
        <button onClick={()=>{setFilterDate("");setSearch("fromPatient");}} style={{background:C.gold+"22",border:"1px solid "+C.gold+"44",borderRadius:8,padding:"6px 12px",color:C.gold,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>⭐ طلبات المرضى {pendingFromPatient>0?"("+pendingFromPatient+")":""}</button>
        <input type="date" value={filterDate} onChange={e=>setFilterDate(e.target.value)} style={{...inp(),fontSize:11,padding:"6px 10px"}}/>
      </div>
      <div style={{padding:"6px 16px",background:C.surface,borderBottom:"1px solid "+C.border,flexShrink:0}}>
        <input value={search==="fromPatient"?"":search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 بحث بالاسم..." style={{...inp(),fontSize:12}}/>
      </div>
      <div style={{padding:"8px 16px",display:"flex",gap:8,flexShrink:0}}>
        {[{l:"اليوم",v:apts.filter(a=>a.date===today).length,c:C.accent},{l:"المعروضة",v:filtered.length,c:C.teal},{l:"مؤكدة",v:filtered.filter(a=>a.confirmed).length,c:C.success}].map((s,i)=>(
          <div key={i} style={{flex:1,background:C.card,borderRadius:10,padding:"8px",textAlign:"center",border:"1px solid "+C.border}}>
            <div style={{color:s.c,fontSize:18,fontWeight:800}}>{s.v}</div>
            <div style={{color:C.muted,fontSize:10}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"0 16px 20px"}}>
        {loading&&<div style={{color:C.muted,textAlign:"center",padding:40}}>جاري التحميل...</div>}
        {!loading&&filtered.length===0&&<div style={{color:C.muted,textAlign:"center",padding:40}}>لا توجد مواعيد</div>}
        {filtered.map(a=>(
          <div key={a.id} style={{background:C.card,border:"1px solid "+(a.fromPatient?C.gold:a.confirmed?C.success:C.border),borderRadius:14,padding:"12px 14px",marginBottom:10,borderRight:"4px solid "+(a.confirmed?C.success:a.fromPatient?C.gold:C.accent)}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{color:C.text,fontWeight:700,fontSize:14}}>{a.patient}</div>
                  {a.fromPatient&&<span style={{background:C.gold+"22",color:C.gold,borderRadius:6,padding:"1px 6px",fontSize:9,fontWeight:700}}>طلب المريض</span>}
                </div>
                <div style={{color:C.muted,fontSize:11,marginTop:2}}>{a.type} · {a.doctor}</div>
                {a.phone&&<div style={{color:C.accent,fontSize:11,marginTop:3}}>📞 {a.phone}</div>}
                {a.clinic&&<div style={{color:C.teal,fontSize:11,marginTop:2}}>📍 {a.clinic}</div>}
                {a.date!==today&&<div style={{color:C.gold,fontSize:10,marginTop:2}}>{a.date}</div>}
              </div>
              <div style={{background:C.accent+"22",borderRadius:8,padding:"4px 10px",textAlign:"center",flexShrink:0}}>
                <div style={{color:C.accent,fontSize:14,fontWeight:800}}>{a.time}</div>
                <div style={{color:C.muted,fontSize:9}}>غرفة {a.room}</div>
              </div>
            </div>
            {a.notes&&<div style={{color:C.muted,fontSize:11,marginBottom:8}}>📝 {a.notes}</div>}
            <div style={{display:"flex",gap:6}}>
              <div onClick={()=>saveApts(apts.map(x=>x.id===a.id?{...x,confirmed:!x.confirmed}:x))}
                style={{flex:1,background:a.confirmed?C.success+"33":"transparent",border:"1px solid "+(a.confirmed?C.success:C.border),borderRadius:8,padding:"6px 0",color:a.confirmed?C.success:C.muted,fontSize:11,fontWeight:700,cursor:"pointer",textAlign:"center"}}>
                {a.confirmed?"✓ مؤكد":"تأكيد"}
              </div>
              <div onClick={()=>setModal({edit:a})} style={{background:C.accent+"22",borderRadius:8,padding:"6px 12px",color:C.accent,fontSize:13,cursor:"pointer"}}>✏️</div>
              <div onClick={()=>{if(window.confirm("حذف الموعد؟"))saveApts(apts.filter(x=>x.id!==a.id));}}
                style={{background:C.danger+"22",borderRadius:8,padding:"6px 12px",color:C.danger,fontSize:13,cursor:"pointer"}}>🗑️</div>
            </div>
          </div>
        ))}
      </div>
      {modal==="add"&&<Modal title="موعد جديد" onClose={()=>setModal(null)}><AptForm patients={patients} onSave={f=>{saveApts([...apts,f]);setModal(null);}} onClose={()=>setModal(null)}/></Modal>}
      {modal?.edit&&<Modal title="تعديل الموعد" onClose={()=>setModal(null)}><AptForm patients={patients} initial={modal.edit} onSave={f=>{saveApts(apts.map(a=>a.id===f.id?f:a));setModal(null);}} onClose={()=>setModal(null)}/></Modal>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
