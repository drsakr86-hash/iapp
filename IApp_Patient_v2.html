function getAvailableDates(c){
  const dates=[];const now=new Date();
  for(let i=1;i<=30;i++){const d=new Date(now);d.setDate(now.getDate()+i);const dow=d.getDay();
    const ok=c.days?c.days.includes(dow):c.schedule&&c.schedule[dow]!==undefined;

  return dates;
}
function getSlots(c,dow){if(c.sessions)return c.sessions[0].slots;if(c.schedule)return c.schedule[dow]?.slots||[];return[];}

function Toast({msg,color,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2400);return()=>clearTimeout(t);},[]);
  return <div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",background:color||C.success,color:C.bg,borderRadius:14,padding:"10px 22px",fontWeight:700,fontSize:13,zIndex:999,animation:"toastIn 0.3s ease",whiteSpace:"nowrap",boxShadow:"0 4px 20px "+(color||C.success)+"66"}}>✓ {msg}</div>;
}

  const s=k=>e=>setBookForm(v=>({...v,[k]:e.target.value}));
  const selClinicFn=c=>{setSelClinic(c);setBookForm(v=>({...v,clinic:c.name,date:"",time:""}));setAvailDates(getAvailableDates(c));setSelDate(null);setStep(3);};
  const selDateFn=d=>{setSelDate(d);setBookForm(v=>({...v,date:d.date,time:""}));setStep(4);};
  const selTimeFn=t=>{setBookForm(v=>({...v,time:t}));setStep(5);};

  const steps=patient.isGuest?["بياناتك","العيادة","التاريخ","الوقت","تأكيد"]:["العيادة","التاريخ","الوقت","تأكيد"];
  const currentStep=patient.isGuest?step-1:step-2;

  return(
    <div>
      {/* Progress bar */}
      <div style={{display:"flex",gap:4,marginBottom:18,alignItems:"center"}}>
        {steps.map((l,i)=>(
          <React.Fragment key={i}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <div style={{width:24,height:24,borderRadius:"50%",background:i<currentStep?C.success:i===currentStep?C.accent:C.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:i<=currentStep?C.bg:C.muted,transition:"all 0.3s"}}>
                {i<currentStep?"✓":i+1}
              </div>
              <div style={{color:i===currentStep?C.accent:C.muted,fontSize:8,whiteSpace:"nowrap"}}>{l}</div>
            </div>
            {i<steps.length-1&&<div style={{flex:1,height:2,background:i<currentStep?C.success:C.border,borderRadius:1,marginBottom:14,transition:"all 0.3s"}}/>}
          </React.Fragment>
        ))}
      </div>

      {/* STEP 1: Guest data */}
      {patient.isGuest&&step===1&&(
        <div style={{background:C.surface,borderRadius:16,padding:16,border:"1px solid "+C.border,marginBottom:14}}>
          <div style={{color:C.text,fontWeight:700,fontSize:14,marginBottom:14}}>👤 بياناتك أولاً</div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div><label style={{color:C.muted,fontSize:11,display:"block",marginBottom:5}}>الاسم الكامل</label>
              <input style={inp()} value={bookForm.newName||""} onChange={e=>setBookForm(v=>({...v,newName:e.target.value}))} placeholder="اكتب اسمك كاملاً"/></div>
            <div><label style={{color:C.muted,fontSize:11,display:"block",marginBottom:5}}>رقم الهاتف</label>
              <input style={inp()} value={bookForm.newPhone||""} onChange={e=>setBookForm(v=>({...v,newPhone:e.target.value}))} placeholder="01xxxxxxxxx" type="tel" inputMode="tel"/></div>
          </div>
          <button onClick={()=>{
            if(!bookForm.newName?.trim()){alert("اكتب اسمك الكامل");return;}
            if(!bookForm.newPhone?.trim()||bookForm.newPhone.length<10){alert("اكتب رقم هاتف صحيح (10 أرقام على الأقل)");return;}
            setStep(2);
          }} style={{width:"100%",marginTop:14,background:`linear-gradient(135deg,${C.accent},${C.teal})`,border:"none",borderRadius:12,padding:13,color:C.bg,fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit",boxShadow:"0 4px 16px "+C.accent+"44"}}>
            التالي ← اختيار العيادة
          </button>
        </div>
      )}

      {/* Guest data summary when past step 1 */}
      {patient.isGuest&&step>1&&(
        <div style={{background:C.card,border:"1px solid "+C.success+"44",borderRadius:12,padding:"10px 14px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{color:C.text,fontSize:12,fontWeight:600}}>👤 {bookForm.newName}</div><div style={{color:C.muted,fontSize:11}}>📞 {bookForm.newPhone}</div></div>
          <span onClick={()=>setStep(1)} style={{color:C.accent,fontSize:11,cursor:"pointer",background:C.accent+"22",padding:"3px 10px",borderRadius:8}}>تغيير</span>
        </div>
      )}

      {/* STEP 2: Clinic */}
      {step>=2&&(
        <div style={{marginBottom:14}}>
          <div style={{color:C.muted,fontSize:12,marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{color:step===2?C.accent:C.muted,fontWeight:step===2?700:400}}>🏥 اختر مكان الكشف</span>
            {step>2&&<span onClick={()=>{setStep(2);setSelDate(null);setBookForm(v=>({...v,date:"",time:""}));}} style={{color:C.accent,cursor:"pointer",fontSize:11,background:C.accent+"22",padding:"3px 10px",borderRadius:8}}>تغيير</span>}
          </div>
          {step===2?(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {CLINICS.map(c=>(
                <div key={c.id} onClick={()=>selClinicFn(c)} style={{background:C.card,border:"1px solid "+C.border,borderRadius:16,padding:16,cursor:"pointer"}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:48,height:48,borderRadius:14,background:C.accent+"22",border:"1px solid "+C.accent+"33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{c.icon}</div>
                    <div style={{flex:1}}>
                      <div style={{color:C.text,fontWeight:700,fontSize:14}}>{c.name}</div>
                      <div style={{color:C.muted,fontSize:11,marginTop:2}}>📍 {c.address}</div>
                      <div style={{color:C.accent,fontSize:11,marginTop:2}}>📅 {c.dayNames?.join(" · ")}</div>
                      <a href={"tel:"+c.phone} onClick={e=>e.stopPropagation()} style={{color:C.teal,fontSize:11,textDecoration:"none",display:"block",marginTop:2}}>📞 {c.phone}</a>
                    </div>
                    <div style={{width:32,height:32,borderRadius:10,background:C.accent+"22",display:"flex",alignItems:"center",justifyContent:"center",color:C.accent,fontSize:18,flexShrink:0}}>←</div>
                  </div>
                </div>
              ))}
            </div>
          ):(
            <div style={{background:C.card,border:"1px solid "+C.success+"44",borderRadius:14,padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:22}}>{selClinic?.icon}</span>
              <div><div style={{color:C.text,fontWeight:700,fontSize:13}}>{selClinic?.name}</div><div style={{color:C.muted,fontSize:11}}>📍 {selClinic?.address}</div></div>
              <span style={{marginRight:"auto",color:C.success,fontSize:16}}>✓</span>
            </div>
          )}
        </div>
      )}

      {/* STEP 3: Date */}
      {step>=3&&(
        <div style={{marginBottom:14}}>
          <div style={{color:C.muted,fontSize:12,marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{color:step===3?C.accent:C.muted,fontWeight:step===3?700:400}}>📅 اختر التاريخ</span>
            {step>3&&<span onClick={()=>{setStep(3);setBookForm(v=>({...v,time:""}));}} style={{color:C.accent,cursor:"pointer",fontSize:11,background:C.accent+"22",padding:"3px 10px",borderRadius:8}}>تغيير</span>}
          </div>
          {step===3?(
            <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:8}}>
              {availDates.slice(0,14).map(d=>(
                <div key={d.date} onClick={()=>selDateFn(d)} style={{flexShrink:0,background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:"12px 14px",cursor:"pointer",textAlign:"center",minWidth:76}}>
                  <div style={{color:C.accent,fontSize:10,marginBottom:4}}>{d.dayName}</div>
                  <div style={{color:C.text,fontWeight:700,fontSize:13}}>{d.date.slice(5)}</div>
                </div>
              ))}
            </div>
          ):(
            <div style={{background:C.card,border:"1px solid "+C.success+"44",borderRadius:14,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{color:C.text,fontWeight:700,fontSize:13}}>📅 {selDate?.dayName} · {bookForm.date}</div>
              <span style={{color:C.success,fontSize:16}}>✓</span>
            </div>
          )}
        </div>
      )}

      {/* STEP 4: Time */}
      {step>=4&&(
        <div style={{marginBottom:14}}>
          <div style={{color:C.muted,fontSize:12,marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{color:step===4?C.accent:C.muted,fontWeight:step===4?700:400}}>⏰ اختر الوقت</span>
            {step>4&&<span onClick={()=>setStep(4)} style={{color:C.accent,cursor:"pointer",fontSize:11,background:C.accent+"22",padding:"3px 10px",borderRadius:8}}>تغيير</span>}
          </div>
          {step===4?(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {getSlots(selClinic,selDate?.dayOfWeek).map(t=>(
                <div key={t} onClick={()=>selTimeFn(t)} style={{background:C.card,border:"1px solid "+C.border,borderRadius:12,padding:"12px 8px",textAlign:"center",cursor:"pointer",color:C.text,fontWeight:700,fontSize:14}}>{t}</div>
              ))}
            </div>
          ):(
            <div style={{background:C.card,border:"1px solid "+C.success+"44",borderRadius:14,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{color:C.text,fontWeight:700,fontSize:13}}>⏰ {bookForm.time}</div>
              <span style={{color:C.success,fontSize:16}}>✓</span>
            </div>
          )}
        </div>
      )}

      {/* STEP 5: Type + confirm */}
      {step>=5&&(
        <div style={{background:C.surface,borderRadius:16,padding:16,border:"1px solid "+C.border,marginBottom:14}}>
          <div style={{marginBottom:12}}>
            <label style={{color:C.muted,fontSize:11,display:"block",marginBottom:6}}>🔬 نوع الكشف</label>
            <select style={inp()} value={bookForm.type} onChange={s("type")}>
              {["فحص روتيني","متابعة","استشارة","قياس نظر","فحص شبكية"].map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
          <div style={{marginBottom:14}}>
            <label style={{color:C.muted,fontSize:11,display:"block",marginBottom:6}}>📝 ملاحظات (اختياري)</label>
            <textarea style={{...inp(),minHeight:55,resize:"none"}} value={bookForm.notes||""} onChange={s("notes")} placeholder="أي أعراض أو ملاحظات للطبيب..."/>
          </div>
          <div style={{background:C.bg,borderRadius:12,padding:12,marginBottom:14,border:"1px solid "+C.border}}>
            <div style={{color:C.muted,fontSize:11,fontWeight:700,marginBottom:8}}>📋 ملخص الحجز</div>
            {[["🏥",bookForm.clinic],["📅",bookForm.date],["⏰",bookForm.time],["🔬",bookForm.type],
              ...(patient.isGuest?[["👤",bookForm.newName],["📞",bookForm.newPhone]]:[])
            ].filter(([,v])=>v).map(([icon,val])=>(
              <div key={icon} style={{display:"flex",gap:10,marginBottom:5,alignItems:"center"}}>
                <span style={{fontSize:14}}>{icon}</span><span style={{color:C.text,fontSize:12}}>{val}</span>
              </div>
            ))}
          </div>
          <button onClick={onBook} disabled={booking}
            style={{width:"100%",background:booking?"#1a2840":`linear-gradient(135deg,${C.accent},${C.teal})`,border:"none",borderRadius:14,padding:14,color:C.bg,fontWeight:800,fontSize:15,cursor:"pointer",fontFamily:"inherit",opacity:booking?0.7:1,boxShadow:booking?"none":"0 4px 20px "+C.accent+"44"}}>
            {booking?"⏳ جاري الإرسال...":"📅 تأكيد الحجز"}
          </button>
        </div>
      )}
    </div>
  );
}

// ── Rating Component ──────────────────────────────────────────
function RatingPrompt({visit,patient,onDone}){
  const [rating,setRating]=useState(0);
  const [comment,setComment]=useState("");
  const [sent,setSent]=useState(false);

  const submit=async()=>{
    const ratings=await sbGet("iapp_ratings")||[];
    ratings.push({id:Date.now(),patientId:patient.id,patient:patient.name,visitId:visit.id,rating,comment,date:new Date().toISOString().slice(0,10)});
    await sbSet("iapp_ratings",ratings);
    setSent(true);setTimeout(onDone,1800);
  };

  if(sent)return(
    <div style={{textAlign:"center",padding:"30px 20px"}}>
      <div style={{fontSize:48,marginBottom:12}}>🌟</div>
      <div style={{color:C.success,fontWeight:800,fontSize:18}}>شكراً على تقييمك!</div>
    </div>
  );

  return(
    <div>
      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{color:C.text,fontWeight:700,fontSize:15,marginBottom:6}}>كيف كانت تجربتك؟</div>
        <div style={{color:C.muted,fontSize:12}}>زيارة {visit.date}</div>
      </div>
      <div style={{display:"flex",justifyContent:"center",gap:12,marginBottom:20}}>
        {[1,2,3,4,5].map(n=>(
          <div key={n} onClick={()=>setRating(n)} style={{fontSize:36,cursor:"pointer",opacity:n<=rating?1:0.3,transition:"all 0.15s",transform:n<=rating?"scale(1.1)":"scale(1)"}}>⭐</div>
        ))}
      </div>
      <textarea style={{...inp(),minHeight:70,resize:"none",marginBottom:14}} value={comment} onChange={e=>setComment(e.target.value)} placeholder="أي ملاحظات أو اقتراحات؟ (اختياري)"/>
      <div style={{display:"flex",gap:10}}>
        <button onClick={onDone} style={{flex:1,background:"transparent",border:"1px solid "+C.border,borderRadius:10,padding:10,color:C.muted,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>لاحقاً</button>
        <button onClick={submit} disabled={!rating} style={{flex:2,background:rating?`linear-gradient(135deg,${C.gold},${C.accent})`:"transparent",border:"1px solid "+(rating?C.gold:C.border),borderRadius:10,padding:10,color:rating?C.bg:C.muted,fontWeight:700,fontSize:13,cursor:rating?"pointer":"default",fontFamily:"inherit"}}>إرسال التقييم ✓</button>
      </div>
    </div>
  );
}

function Modal({title,onClose,children}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:400,display:"flex",alignItems:"flex-end"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.surface,borderRadius:"20px 20px 0 0",padding:"20px 16px 40px",width:"100%",maxHeight:"90vh",overflowY:"auto",border:"1px solid "+C.border}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
          <span style={{color:C.text,fontWeight:700,fontSize:15}}>{title}</span>
          <span onClick={onClose} style={{color:C.muted,fontSize:28,cursor:"pointer",lineHeight:1}}>×</span>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── Patient App ───────────────────────────────────────────────
function PatientApp({patient,onLogout}){
  const [tab,setTab]=useState(patient.isGuest?"book":"home");
  const [appointments,setAppointments]=useState([]);
  const [prescriptions,setPrescriptions]=useState([]);
  const [exams,setExams]=useState([]);
  const [visits,setVisits]=useState([]);
  const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(null);
  const [toast,setToast]=useState(null);
  const [bookForm,setBookForm]=useState({clinic:"",date:"",time:"",type:"فحص روتيني",notes:"",isNew:patient.isGuest,newName:"",newPhone:""});
  const [booking,setBooking]=useState(false);
  const [bookDone,setBookDone]=useState(false);
  const [ratingTarget,setRatingTarget]=useState(null);
  const today=new Date().toISOString().slice(0,10);

  useEffect(()=>{
    (async()=>{
      const [a,rx,ex,v]=await Promise.all([sbGet("iapp_appointments"),sbGet("iapp_prescriptions"),sbGet("iapp_exams"),sbGet("iapp_visits")]);
      if(a)setAppointments(a.filter(x=>x.patientId===patient.id||x.patient===patient.name));
      if(rx)setPrescriptions(rx.filter(x=>x.patientId===patient.id));
      if(ex)setExams(ex.filter(x=>x.patientId===patient.id));
      if(v){
        const pv=v.filter(x=>x.patientId===patient.id);
        setVisits(pv);
        // Check for unrated recent visits
        const unrated=pv.find(x=>{
          const d=new Date(x.date);const diff=(Date.now()-d.getTime())/(1000*3600*24);
          return diff<=3&&!x.rated;
        });
        if(unrated&&!patient.isGuest)setTimeout(()=>setRatingTarget(unrated),1500);
      }
      setLoading(false);
    })();
    // Auto-refresh every 20s to catch confirmation updates
    const iv=setInterval(async()=>{
      const a=await sbGet("iapp_appointments");
      if(a)setAppointments(a.filter(x=>x.patientId===patient.id||x.patient===patient.name));
    },20000);
    return()=>clearInterval(iv);
  },[]);

  const upcomingApts=appointments.filter(a=>a.date>=today).sort((a,b)=>a.date.localeCompare(b.date));
  const pastApts=appointments.filter(a=>a.date<today).sort((a,b)=>b.date.localeCompare(a.date));

  const doBook=async()=>{
    if(!bookForm.clinic){alert("اختر المكان");return;}
    if(!bookForm.date){alert("اختر التاريخ");return;}
    if(!bookForm.time){alert("اختر الوقت");return;}
    if(patient.isGuest&&!bookForm.newName?.trim()){alert("اكتب اسمك");return;}
    if(patient.isGuest&&!bookForm.newPhone?.trim()){alert("اكتب رقم هاتفك");return;}
    setBooking(true);
    const allApts=await sbGet("iapp_appointments")||[];
    const newApt={id:Date.now(),patientId:patient.isGuest?null:patient.id,patient:patient.isGuest?bookForm.newName:patient.name,phone:patient.isGuest?bookForm.newPhone:(patient.phone||""),date:bookForm.date,time:bookForm.time,type:bookForm.type,notes:bookForm.notes||"",doctor:"د. عبدالستار",room:"1",clinic:bookForm.clinic,confirmed:false,fromPatient:true};
    await sbSet("iapp_appointments",[...allApts,newApt]);
    setBooking(false);setBookDone(true);
    if(!patient.isGuest)setAppointments(prev=>[...prev,newApt]);
  };

  const markVisitRated=async(visitId)=>{
    const v=await sbGet("iapp_visits")||[];
    await sbSet("iapp_visits",v.map(x=>x.id===visitId?{...x,rated:true}:x));
    setRatingTarget(null);
  };

  const TABS=patient.isGuest?[{id:"book",label:"احجز",icon:"➕"}]:[
    {id:"home",label:"الرئيسية",icon:"🏠"},
    {id:"book",label:"احجز",icon:"➕"},
    {id:"apts",label:"مواعيدي",icon:"📅"},
    {id:"rx",label:"روشتاتي",icon:"💊"},
    {id:"exams",label:"فحوصاتي",icon:"🔬"},
  ];

  const nextApt=upcomingApts[0];
  // Check if next appointment is within 24h
  const isAptSoon=nextApt&&((new Date(nextApt.date)-new Date())/(1000*3600))<24;

  return(
    <div style={{height:"100%",background:C.bg,direction:"rtl",display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg,${C.surface},#0D1929)`,borderBottom:"1px solid "+C.border,padding:"0 16px",display:"flex",alignItems:"center",justifyContent:"space-between",height:60,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:38,height:38,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent},${C.teal})`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:C.bg,fontSize:15}}>
            {patient.isGuest?"🆕":patient.name?.charAt(0)}
          </div>
          <div>
            <div style={{color:C.text,fontWeight:700,fontSize:13}}>{patient.isGuest?"مريض جديد":patient.name}</div>
            <div style={{color:C.muted,fontSize:10}}>{patient.isGuest?"احجز موعدك الأول":patient.patientCode}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {isAptSoon&&<span style={{background:C.gold+"22",color:C.gold,borderRadius:8,padding:"3px 8px",fontSize:10,fontWeight:700,animation:"pulse 2s infinite"}}>⏰ موعد قريب</span>}
          <button onClick={onLogout} style={{background:"transparent",border:"1px solid "+C.border,borderRadius:8,padding:"6px 12px",color:C.muted,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>خروج</button>
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:"auto",padding:"16px 16px 0"}}>
        {loading&&<div style={{color:C.muted,textAlign:"center",padding:40,fontSize:13}}>⏳ جاري التحميل...</div>}

        {/* HOME */}
        {!loading&&tab==="home"&&<div style={{animation:"slideUp 0.25s ease"}}>
          <div style={{color:C.text,fontWeight:800,fontSize:18,marginBottom:2}}>أهلاً {patient.name?.split(" ")[0]} 👋</div>
          <div style={{color:C.muted,fontSize:12,marginBottom:20}}>عيادة د. عبدالستار صقر</div>

          {/* Next appointment banner */}
          {nextApt&&(
            <div style={{background:isAptSoon?`linear-gradient(135deg,${C.gold}22,${C.accent}11)`:`linear-gradient(135deg,${C.accent}22,${C.teal}11)`,border:"1px solid "+(isAptSoon?C.gold:C.accent)+"44",borderRadius:16,padding:16,marginBottom:16,animation:isAptSoon?"pulse 2.5s infinite":"none"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{color:isAptSoon?C.gold:C.accent,fontWeight:700,fontSize:12,marginBottom:6}}>
                    {isAptSoon?"⏰ موعدك قريب جداً!":"📅 موعدك القادم"}
                  </div>
                  <div style={{color:C.text,fontWeight:800,fontSize:16}}>{nextApt.date}</div>
                  <div style={{color:C.muted,fontSize:13,marginTop:4}}>{nextApt.time} · {nextApt.type}</div>
                  <div style={{color:C.muted,fontSize:12,marginTop:2}}>🏥 {nextApt.clinic||nextApt.doctor}</div>
                </div>
                <div style={{textAlign:"center"}}>
                  {nextApt.confirmed
                    ?<div style={{background:C.success+"22",border:"1px solid "+C.success+"44",borderRadius:10,padding:"6px 12px",color:C.success,fontSize:12,fontWeight:700}}>✓ مؤكد</div>
                    :<div style={{background:C.gold+"22",border:"1px solid "+C.gold+"44",borderRadius:10,padding:"6px 12px",color:C.gold,fontSize:11,fontWeight:700}}>⏳ بانتظار التأكيد</div>
                  }
                </div>
              </div>
            </div>
          )}

          {/* Stats */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
            {[{icon:"📅",label:"مواعيد قادمة",val:upcomingApts.length,color:C.accent,action:()=>setTab("apts")},
              {icon:"💊",label:"روشتات",val:prescriptions.length,color:C.teal,action:()=>setTab("rx")},
              {icon:"🔬",label:"فحوصات",val:exams.length,color:C.gold,action:()=>setTab("exams")},
              {icon:"🗓",label:"زيارات سابقة",val:pastApts.length,color:C.muted,action:()=>setTab("apts")}
            ].map((s,i)=>(
              <div key={i} onClick={s.action} style={{background:C.card,borderRadius:14,padding:"14px",border:"1px solid "+C.border,cursor:"pointer"}}>
                <div style={{fontSize:22,marginBottom:6}}>{s.icon}</div>
                <div style={{color:s.color,fontSize:22,fontWeight:800}}>{s.val}</div>
                <div style={{color:C.muted,fontSize:11}}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Quick book */}
          <div onClick={()=>setTab("book")} style={{background:`linear-gradient(135deg,${C.accent}22,${C.teal}11)`,border:"1px solid "+C.accent+"44",borderRadius:16,padding:16,marginBottom:16,cursor:"pointer",display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:46,height:46,borderRadius:14,background:`linear-gradient(135deg,${C.accent},${C.teal})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>➕</div>
            <div>
              <div style={{color:C.text,fontWeight:700,fontSize:14}}>احجز موعد جديد</div>
              <div style={{color:C.muted,fontSize:12,marginTop:2}}>اختر المكان والوقت المناسب لك</div>
            </div>
            <div style={{color:C.accent,fontSize:18,marginRight:"auto"}}>←</div>
          </div>

          {/* Clinic contacts */}
          <div style={{background:C.card,borderRadius:14,padding:14,border:"1px solid "+C.border,marginBottom:16}}>
            <div style={{color:C.text,fontWeight:700,fontSize:13,marginBottom:12}}>📞 تواصل معنا</div>
            {CLINICS.map(c=>(
              <div key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,paddingBottom:10,borderBottom:"1px solid "+C.border+"66"}}>
                <div>
                  <div style={{color:C.text,fontSize:12,fontWeight:600}}>{c.icon} {c.name}</div>
                  <div style={{color:C.muted,fontSize:11}}>📍 {c.address}</div>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <a href={"tel:"+c.phone} style={{background:C.teal+"22",border:"1px solid "+C.teal+"33",borderRadius:8,padding:"5px 10px",color:C.teal,fontSize:12,textDecoration:"none"}}>📞</a>
                  <a href={"https://wa.me/2"+c.phone.replace(/^0/,"")} target="_blank" style={{background:"#25D36622",border:"1px solid #25D36633",borderRadius:8,padding:"5px 10px",color:"#25D366",fontSize:12,textDecoration:"none"}}>💬</a>
                </div>
              </div>
            ))}
          </div>
        </div>}

        {/* BOOKING */}
        {!loading&&tab==="book"&&<div style={{animation:"slideUp 0.25s ease"}}>
          <div style={{color:C.text,fontWeight:700,fontSize:16,marginBottom:4}}>➕ احجز موعد</div>
          <div style={{color:C.muted,fontSize:12,marginBottom:16}}>اختر المكان والوقت المناسب</div>
          {bookDone?(
            <div style={{background:C.success+"22",border:"1px solid "+C.success,borderRadius:16,padding:"30px 20px",textAlign:"center",animation:"slideUp 0.3s ease"}}>
              <div style={{fontSize:52,marginBottom:12}}>✅</div>
              <div style={{color:C.success,fontWeight:800,fontSize:18,marginBottom:8}}>تم إرسال طلب الحجز!</div>
              <div style={{background:C.bg,borderRadius:12,padding:14,marginBottom:16,textAlign:"right"}}>
                {[["📍",bookForm.clinic],["📅",bookForm.date],["⏰",bookForm.time],["🔬",bookForm.type]].map(([icon,val])=>(
                  <div key={icon} style={{display:"flex",gap:8,marginBottom:6}}><span>{icon}</span><span style={{color:C.text,fontSize:13}}>{val}</span></div>
                ))}
              </div>
              <div style={{color:C.muted,fontSize:12,marginBottom:20}}>سيتم التواصل معك لتأكيد الموعد</div>
              <button onClick={()=>{setBookDone(false);setBookForm({clinic:"",date:"",time:"",type:"فحص روتيني",notes:"",isNew:patient.isGuest,newName:"",newPhone:""}); }}
                style={{background:`linear-gradient(135deg,${C.accent},${C.teal})`,border:"none",borderRadius:10,padding:"10px 24px",color:C.bg,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
                حجز موعد آخر
              </button>
            </div>
          ):<BookingForm patient={patient} bookForm={bookForm} setBookForm={setBookForm} booking={booking} onBook={doBook}/>}
        </div>}

        {/* APPOINTMENTS */}
        {!loading&&tab==="apts"&&<div style={{animation:"slideUp 0.25s ease"}}>
          <div style={{color:C.text,fontWeight:700,fontSize:16,marginBottom:16}}>📅 مواعيدي</div>
          {upcomingApts.length>0&&<>
            <div style={{color:C.accent,fontSize:12,fontWeight:700,marginBottom:10}}>القادمة</div>
            {upcomingApts.map(a=>(
              <div key={a.id} style={{background:C.card,border:"1px solid "+(a.confirmed?C.success:C.accent)+"44",borderRadius:16,padding:"14px",marginBottom:10,borderRight:"3px solid "+(a.confirmed?C.success:C.accent)}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                  <div>
                    <div style={{color:C.text,fontWeight:700,fontSize:14}}>{a.date}</div>
                    <div style={{color:C.muted,fontSize:12,marginTop:2}}>{a.type}</div>
                    {a.clinic&&<div style={{color:C.teal,fontSize:11,marginTop:2}}>🏥 {a.clinic}</div>}
                  </div>
                  <div style={{textAlign:"center"}}>
                    <div style={{color:C.accent,fontSize:18,fontWeight:800}}>{a.time}</div>
                    {a.confirmed
                      ?<div style={{color:C.success,fontSize:10,fontWeight:700}}>✓ مؤكد</div>
                      :<div style={{color:C.gold,fontSize:10}}>⏳ بانتظار التأكيد</div>
                    }
                  </div>
                </div>
                {a.notes&&<div style={{color:C.muted,fontSize:11}}>📝 {a.notes}</div>}
              </div>
            ))}
          </>}
          {pastApts.length>0&&<>
            <div style={{color:C.muted,fontSize:12,fontWeight:700,marginTop:16,marginBottom:10}}>السابقة</div>
            {pastApts.map(a=>(
              <div key={a.id} style={{background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:"12px 14px",marginBottom:8,opacity:0.75}}>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <div><div style={{color:C.text,fontSize:13}}>{a.date}</div><div style={{color:C.muted,fontSize:11}}>{a.type}</div></div>
                  <div style={{color:C.muted,fontSize:14,fontWeight:700}}>{a.time}</div>
                </div>
              </div>
            ))}
          </>}
          {appointments.length===0&&<div style={{color:C.muted,textAlign:"center",padding:40}}>لا توجد مواعيد</div>}
        </div>}

        {/* PRESCRIPTIONS */}
        {!loading&&tab==="rx"&&<div style={{animation:"slideUp 0.25s ease"}}>
          <div style={{color:C.text,fontWeight:700,fontSize:16,marginBottom:16}}>💊 روشتاتي ({prescriptions.length})</div>
          {prescriptions.length===0&&<div style={{color:C.muted,textAlign:"center",padding:40}}>لا توجد روشتات بعد</div>}
          {prescriptions.map(rx=>(
            <div key={rx.id} style={{background:C.card,border:"1px solid "+C.border,borderRadius:16,padding:16,marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={{color:C.accent,fontWeight:700,fontSize:14}}>{rx.date}</div>
                <div style={{color:C.muted,fontSize:11,background:C.bg,padding:"4px 10px",borderRadius:8}}>{rx.eye}</div>
              </div>
              <div style={{background:C.bg,borderRadius:10,padding:10,marginBottom:12,border:"1px solid "+C.border}}>
                <div style={{color:C.text,fontSize:11,fontWeight:700,marginBottom:8}}>👓 كشف النظارة</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,fontSize:10,textAlign:"center"}}>
                  <div style={{color:C.muted}}>العين</div><div style={{color:C.muted}}>SPH</div><div style={{color:C.muted}}>CYL</div><div style={{color:C.muted}}>AX</div>
                  <div style={{color:C.text,fontWeight:700}}>يمنى</div><div style={{color:C.text}}>{rx.sphR||"-"}</div><div style={{color:C.text}}>{rx.cylR||"-"}</div><div style={{color:C.text}}>{rx.axisR||"-"}</div>
                  <div style={{color:C.text,fontWeight:700}}>يسرى</div><div style={{color:C.text}}>{rx.sphL||"-"}</div><div style={{color:C.text}}>{rx.cylL||"-"}</div><div style={{color:C.text}}>{rx.axisL||"-"}</div>
                </div>
                {rx.add&&<div style={{color:C.gold,fontSize:11,marginTop:8}}>ADD: {rx.add}</div>}
              </div>
              {rx.medicines&&<div style={{background:C.teal+"11",borderRadius:10,padding:10,border:"1px solid "+C.teal+"33"}}>
                <div style={{color:C.teal,fontSize:11,fontWeight:700,marginBottom:6}}>💊 الأدوية</div>
                {rx.medicines.split("\n").filter(Boolean).map((m,i)=><div key={i} style={{color:C.text,fontSize:12,marginBottom:4}}>• {m}</div>)}
              </div>}
              {rx.notes&&<div style={{color:C.muted,fontSize:11,marginTop:10}}>📝 {rx.notes}</div>}
            </div>
          ))}
        </div>}

        {/* EXAMS */}
        {!loading&&tab==="exams"&&<div style={{animation:"slideUp 0.25s ease"}}>
          <div style={{color:C.text,fontWeight:700,fontSize:16,marginBottom:16}}>🔬 نتائج فحوصاتي ({exams.length})</div>
          {exams.length===0&&<div style={{color:C.muted,textAlign:"center",padding:40}}>لا توجد فحوصات بعد</div>}
          {exams.map(ex=>(
            <div key={ex.id} style={{background:C.card,border:"1px solid "+C.border,borderRadius:16,padding:16,marginBottom:14}}>
              <div style={{color:C.accent,fontWeight:700,fontSize:14,marginBottom:12}}>{ex.date} · {ex.doctor}</div>
              {ex.chiefComplaint&&<div style={{marginBottom:10}}><div style={{color:C.muted,fontSize:11,marginBottom:4}}>الشكوى</div><div style={{color:C.text,fontSize:13}}>{ex.chiefComplaint}</div></div>}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                {[["حدة الإبصار يمنى",ex.visualAcuityR],["حدة الإبصار يسرى",ex.visualAcuityL],["ضغط العين يمنى",ex.iopR],["ضغط العين يسرى",ex.iopL]].filter(([,v])=>v).map(([l,v])=>(
                  <div key={l} style={{background:C.bg,borderRadius:8,padding:"8px"}}>
                    <div style={{color:C.muted,fontSize:10}}>{l}</div>
                    <div style={{color:C.text,fontWeight:700,fontSize:13}}>{v}</div>
                  </div>
                ))}
              </div>
              {ex.diagnosis&&<div style={{background:C.accent+"11",borderRadius:10,padding:10,border:"1px solid "+C.accent+"33",marginBottom:8}}>
                <div style={{color:C.accent,fontSize:11,fontWeight:700,marginBottom:4}}>التشخيص</div>
                <div style={{color:C.text,fontSize:13}}>{ex.diagnosis}</div>
              </div>}
              {ex.treatmentPlan&&<div style={{marginTop:8}}><div style={{color:C.muted,fontSize:11,marginBottom:4}}>خطة العلاج</div><div style={{color:C.text,fontSize:12}}>{ex.treatmentPlan}</div></div>}
              {ex.followUp&&<div style={{color:C.gold,fontSize:11,marginTop:8}}>📅 موعد المتابعة: {ex.followUp}</div>}
            </div>
          ))}
        </div>}
        <div style={{height:80}}/>
      </div>

      {/* Bottom Nav */}
      <div style={{background:C.surface,borderTop:"1px solid "+C.border,display:"flex",justifyContent:"space-around",padding:"8px 0 20px",flexShrink:0}}>
        {TABS.map(t=>(
          <div key={t.id} onClick={()=>setTab(t.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer",padding:"4px 12px",borderRadius:10,background:tab===t.id?C.accent+"22":"transparent"}}>
            <div style={{fontSize:20,filter:tab===t.id?"drop-shadow(0 0 6px "+C.accent+")":"none",transform:tab===t.id?"scale(1.15)":"scale(1)",transition:"all 0.2s"}}>{t.icon}</div>
            <div style={{color:tab===t.id?C.accent:C.muted,fontSize:9,fontWeight:tab===t.id?700:400}}>{t.label}</div>
          </div>
        ))}
      </div>

      {/* Rating Modal */}
      {ratingTarget&&<Modal title="⭐ قيّم زيارتك" onClose={()=>setRatingTarget(null)}>
        <RatingPrompt visit={ratingTarget} patient={patient} onDone={()=>markVisitRated(ratingTarget.id)}/>
      </Modal>}

      {toast&&<Toast msg={toast.msg} color={toast.color} onDone={()=>setToast(null)}/>}
    </div>
  );
}

function App(){
  const [patient,setPatient]=useState(()=>{try{const p=sessionStorage.getItem("iapp_patient");return p?JSON.parse(p):null;}catch{return null;}});
  const login=p=>{sessionStorage.setItem("iapp_patient",JSON.stringify(p));setPatient(p);};
  const logout=()=>{sessionStorage.removeItem("iapp_patient");setPatient(null);};
  if(!patient)return <Login onLogin={login}/>;
  return <PatientApp patient={patient} onLogout={logout}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
