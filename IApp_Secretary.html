<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0A0F1E">
  <title>I App - المواعيد</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;background:#0A0F1E;overflow:hidden;font-family:'Segoe UI',Tahoma,Arial,sans-serif;}
    #root{height:100%;display:flex;flex-direction:column;}
    ::-webkit-scrollbar{display:none;}
    input,select,textarea,button{font-family:inherit;}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback } = React;

const C = {
  bg:"#0A0F1E", surface:"#111827", card:"#141E30", border:"#1E2D45",
  accent:"#00C2FF", teal:"#00E5CC", gold:"#FFB830",
  text:"#E8F4FF", muted:"#6B8CAE", danger:"#FF4D6D", success:"#00E5B0",
};

const SB_URL = "https://mofdveiwlaymlabvsypu.supabase.co";
const SB_KEY = "sb_publishable_tVZ1mUOyb3vOjRV1jBpq6g_P2u-xIqF";
const PIN = "0000"; // PIN للسكرتيرة — غيّره حسب احتياجك

let _sb = null;
function getSB() {
  if (!_sb && window.supabase) _sb = window.supabase.createClient(SB_URL, SB_KEY);
  return _sb;
}

async function sbGet(key) {
  try {
    const sb = getSB();
    if (!sb) return null;
    const { data } = await sb.from("iapp_store").select("value").eq("key", key).maybeSingle();
    return data?.value ?? null;
  } catch { return null; }
}

async function sbSet(key, value) {
  try {
    const sb = getSB();
    if (!sb) return;
    await sb.from("iapp_store").upsert({ key, value }, { onConflict: "key" });
  } catch {}
}

const inp = (ex={}) => ({
  width:"100%", background:C.bg, border:`1px solid ${C.border}`,
  borderRadius:10, padding:"10px 12px", color:C.text, fontSize:13,
  outline:"none", direction:"rtl", fontFamily:"inherit", ...ex
});

function Btn({children, onClick, danger, full, outline, small}) {
  return <button onClick={onClick} style={{
    background: outline ? "transparent" : danger ? `linear-gradient(135deg,${C.danger},#aa0020)` : `linear-gradient(135deg,${C.accent},${C.teal})`,
    border: outline ? `1px solid ${C.border}` : "none",
    borderRadius:10, padding: small ? "6px 14px" : "11px 18px",
    color: outline ? C.muted : C.bg, fontWeight:700, fontSize: small ? 11 : 13,
    cursor:"pointer", width: full ? "100%" : "auto", fontFamily:"inherit"
  }}>{children}</button>;
}

function Modal({title, onClose, children}) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.surface,borderRadius:"20px 20px 0 0",padding:"20px 16px 44px",width:"100%",maxWidth:480,maxHeight:"92vh",overflowY:"auto",border:`1px solid ${C.border}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <span style={{color:C.text,fontWeight:700,fontSize:15}}>{title}</span>
          <span onClick={onClose} style={{color:C.muted,fontSize:28,cursor:"pointer"}}>×</span>
        </div>
        {children}
      </div>
    </div>
  );
}

function PinLock({onUnlock}) {
  const [pin,setPin]=useState("");
  const [error,setError]=useState(false);
  const press = d => {
    if(pin.length>=4) return;
    const next = pin+d;
    setPin(next);
    if(next.length===4){
      if(next===PIN){ onUnlock(); }
      else { setError(true); setTimeout(()=>{setPin("");setError(false);},600); }
    }
  };
  const del = () => setPin(p=>p.slice(0,-1));
  return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <div style={{fontSize:44,marginBottom:12}}>👁</div>
      <div style={{color:C.accent,fontWeight:800,fontSize:20,marginBottom:4}}>I App</div>
      <div style={{color:C.muted,fontSize:12,marginBottom:40}}>عيادة د. عبدالستار صقر</div>
      <div style={{display:"flex",gap:14,marginBottom:32,direction:"ltr"}}>
        {[0,1,2,3].map(i=>(
          <div key={i} style={{width:18,height:18,borderRadius:"50%",background:i<pin.length?(error?C.danger:C.accent):C.border,transition:"all 0.2s"}}/>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,maxWidth:240,direction:"ltr"}}>
        {[1,2,3,4,5,6,7,8,9,"⌫",0,""].map((d,i)=>(
          <div key={i} onClick={()=>d===""?null:d==="⌫"?del():press(String(d))}
            style={{width:68,height:68,borderRadius:18,background:d===""?"transparent":C.card,border:d===""?"none":`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:d===""?"default":"pointer",color:d==="⌫"?C.danger:C.text,fontSize:22,fontWeight:700}}>
            {d}
          </div>
        ))}
      </div>
    </div>
  );
}

function AptForm({initial, onSave, onClose, patients=[]}) {
  const blank = {patient:"",patientId:null,time:"09:00",date:new Date().toISOString().slice(0,10),type:"فحص روتيني",doctor:"د. عبدالستار",room:"1",notes:""};
  const [f,setF] = useState(initial ? {...initial} : blank);
  const s = k => e => setF(v=>({...v,[k]:e.target.value}));
  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div>
        <label style={{color:C.muted,fontSize:11,display:"block",marginBottom:5}}>المريض</label>
        <select style={inp()} value={f.patientId||""} onChange={e=>{
          const p=patients.find(p=>p.id===Number(e.target.value));
          setF(v=>({...v,patientId:Number(e.target.value),patient:p?.name||""}));
        }}>
          <option value="">اختر مريض</option>
          {patients.map(p=><option key={p.id} value={p.id}>{p.name} — {p.patientCode}</option>)}
        </select>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div>
          <label style={{color:C.muted,fontSize:11,display:"block",marginBottom:5}}>التاريخ</label>
          <input style={inp()} type="date" value={f.date} onChange={s("date")}/>
        </div>
        <div>
          <label style={{color:C.muted,fontSize:11,display:"block",marginBottom:5}}>الوقت</label>
          <input style={inp()} type="time" value={f.time} onChange={s("time")}/>
        </div>
      </div>
      <div>
        <label style={{color:C.muted,fontSize:11,display:"block",marginBottom:5}}>نوع الموعد</label>
        <select style={inp()} value={f.type} onChange={s("type")}>
          {["فحص روتيني","متابعة","استشارة","قياس نظر","فحص شبكية","عملية"].map(t=><option key={t}>{t}</option>)}
        </select>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div>
          <label style={{color:C.muted,fontSize:11,display:"block",marginBottom:5}}>الطبيب</label>
          <input style={inp()} value={f.doctor} onChange={s("doctor")}/>
        </div>
        <div>
          <label style={{color:C.muted,fontSize:11,display:"block",marginBottom:5}}>الغرفة</label>
          <input style={inp()} value={f.room} onChange={s("room")}/>
        </div>
      </div>
      <div>
        <label style={{color:C.muted,fontSize:11,display:"block",marginBottom:5}}>ملاحظات</label>
        <textarea style={{...inp(),minHeight:60,resize:"none"}} value={f.notes||""} onChange={s("notes")}/>
      </div>
      <div style={{display:"flex",gap:10,marginTop:8}}>
        <Btn outline full onClick={onClose}>إلغاء</Btn>
        <Btn full onClick={()=>{
          if(!f.patient && !f.patientId) {alert("اختر مريضاً"); return;}
          onSave({...f, id:f.id||Date.now()});
        }}>✓ حفظ</Btn>
      </div>
    </div>
  );
}

function App() {
  const [unlocked,setUnlocked] = useState(()=>sessionStorage.getItem("sec_unlocked")==="1");
  const [appointments,setAppointments] = useState([]);
  const [patients,setPatients] = useState([]);
  const [modal,setModal] = useState(null);
  const [search,setSearch] = useState("");
  const [loading,setLoading] = useState(true);
  const today = new Date().toISOString().slice(0,10);
  const [filterDate,setFilterDate] = useState(today);

  useEffect(()=>{
    if(!unlocked) return;
    (async()=>{
      const [apts, pats] = await Promise.all([
        sbGet("iapp_appointments"),
        sbGet("iapp_patients")
      ]);
      if(apts) setAppointments(apts);
      if(pats) setPatients(pats);
      setLoading(false);
    })();
  },[unlocked]);

  const save = async (apts) => {
    setAppointments(apts);
    await sbSet("iapp_appointments", apts);
  };

  const add = f => save([...appointments, f]);
  const edit = f => save(appointments.map(a=>a.id===f.id?f:a));
  const del = id => save(appointments.filter(a=>a.id!==id));
  const confirm = id => save(appointments.map(a=>a.id===id?{...a,confirmed:!a.confirmed}:a));

  const filtered = appointments.filter(a=>{
    const matchDate = filterDate ? a.date===filterDate : true;
    const matchSearch = !search || a.patient.includes(search);
    return matchDate && matchSearch;
  }).sort((a,b)=>a.time?.localeCompare(b.time));

  if(!unlocked) return <PinLock onUnlock={()=>{sessionStorage.setItem("sec_unlocked","1");setUnlocked(true);}}/>;

  return (
    <div style={{height:"100%",background:C.bg,direction:"rtl",display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg,${C.surface},#0D1929)`,borderBottom:`1px solid ${C.border}`,padding:"0 16px",display:"flex",alignItems:"center",justifyContent:"space-between",height:64,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${C.accent},${C.teal})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>👁</div>
          <div>
            <div style={{color:C.text,fontWeight:700,fontSize:14}}>I App</div>
            <div style={{color:C.muted,fontSize:10}}>نسخة السكرتيرة</div>
          </div>
        </div>
        <Btn small onClick={()=>setModal("add")}>+ موعد جديد</Btn>
      </div>

      {/* Filter bar */}
      <div style={{padding:"10px 16px",background:C.surface,borderBottom:`1px solid ${C.border}`,flexShrink:0,display:"flex",gap:8}}>
        <input type="date" value={filterDate} onChange={e=>setFilterDate(e.target.value)}
          style={{...inp(),flex:1,fontSize:12}}/>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="🔍 بحث بالاسم..." style={{...inp(),flex:1,fontSize:12}}/>
      </div>

      {/* Stats */}
      <div style={{padding:"8px 16px",display:"flex",gap:10,flexShrink:0}}>
        {[
          {label:"اليوم",val:appointments.filter(a=>a.date===today).length,color:C.accent},
          {label:"المحددة",val:filtered.length,color:C.teal},
          {label:"مؤكدة",val:filtered.filter(a=>a.confirmed).length,color:C.success},
        ].map((s,i)=>(
          <div key={i} style={{flex:1,background:C.card,borderRadius:10,padding:"8px",textAlign:"center",border:`1px solid ${C.border}`}}>
            <div style={{color:s.color,fontSize:20,fontWeight:800}}>{s.val}</div>
            <div style={{color:C.muted,fontSize:10}}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* List */}
      <div style={{flex:1,overflowY:"auto",padding:"0 16px 20px"}}>
        {loading && <div style={{color:C.muted,textAlign:"center",padding:30}}>جاري التحميل...</div>}
        {!loading && filtered.length===0 && <div style={{color:C.muted,textAlign:"center",padding:30}}>لا توجد مواعيد</div>}
        {filtered.map(a=>(
          <div key={a.id} style={{background:C.card,border:`1px solid ${a.confirmed?C.success:C.border}`,borderRadius:14,padding:"12px 14px",marginBottom:10,borderRight:`4px solid ${a.confirmed?C.success:C.accent}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div>
                <div style={{color:C.text,fontWeight:700,fontSize:14}}>{a.patient}</div>
                <div style={{color:C.muted,fontSize:11,marginTop:2}}>{a.type} · {a.doctor}</div>
              </div>
              <div style={{background:C.accent+"22",borderRadius:8,padding:"4px 10px",textAlign:"center"}}>
                <div style={{color:C.accent,fontSize:14,fontWeight:800}}>{a.time}</div>
                <div style={{color:C.muted,fontSize:9}}>غرفة {a.room}</div>
              </div>
            </div>
            {a.notes&&<div style={{color:C.muted,fontSize:11,marginBottom:8}}>📝 {a.notes}</div>}
            <div style={{display:"flex",gap:6}}>
              <div onClick={()=>confirm(a.id)} style={{flex:1,background:a.confirmed?C.success+"33":C.card,border:`1px solid ${a.confirmed?C.success:C.border}`,borderRadius:8,padding:"6px 0",color:a.confirmed?C.success:C.muted,fontSize:11,fontWeight:700,cursor:"pointer",textAlign:"center"}}>
                {a.confirmed?"✓ مؤكد":"تأكيد"}
              </div>
              <div onClick={()=>setModal({edit:a})} style={{background:C.accent+"22",borderRadius:8,padding:"6px 12px",color:C.accent,fontSize:11,cursor:"pointer"}}>✏</div>
              <div onClick={()=>del(a.id)} style={{background:C.danger+"22",borderRadius:8,padding:"6px 12px",color:C.danger,fontSize:11,cursor:"pointer"}}>🗑</div>
            </div>
          </div>
        ))}
      </div>

      {/* Modals */}
      {modal==="add"&&<Modal title="موعد جديد" onClose={()=>setModal(null)}>
        <AptForm patients={patients} onSave={f=>{add(f);setModal(null);}} onClose={()=>setModal(null)}/>
      </Modal>}
      {modal?.edit&&<Modal title="تعديل الموعد" onClose={()=>setModal(null)}>
        <AptForm patients={patients} initial={modal.edit} onSave={f=>{edit(f);setModal(null);}} onClose={()=>setModal(null)}/>
      </Modal>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
